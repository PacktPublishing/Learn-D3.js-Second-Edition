<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        svg {border: solid 1px gray;}
        path {
            fill: olive;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3'
    import {presimplify, simplify} from 'https://cdn.skypack.dev/topojson-simplify@3';

    const width = 960;
    const height = 500;

    const color = d3.scaleOrdinal(d3.schemeCategory10);

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    const geoPath = d3.geoPath().projection(d3.geoMercator());


    d3.json('../data/africa/africa.topojson')
            .then(function(data) {

        const polygon = topojson.merge(data, data.objects['africa'].geometries)

        svg.append("path").datum(polygon).attr('d', geoPath)
    })
</script>

</body>
</html>
