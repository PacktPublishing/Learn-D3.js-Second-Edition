<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="../css/tissot.css">
    <link rel="stylesheet" href="../css/projections.css">
</head>
<body>
<div class="container">
    <div id="sidebar"></div>
    <svg id="map" width="960" height="500">
        <defs/>
    </svg>
</div>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    import * as d3_geo_polygon from "https://cdn.skypack.dev/d3-geo-polygon@1";
    const d3 = Object.assign({}, d3_all, d3_geo_projection, d3_geo_polygon);
    import * as map from "../js/projection-albers.js";

    const width = 960, height = 500;
    const projections = [
        {
            name: "Conic Albers",
            projection: d3.geoAlbers().scale(350),
            tissot: {radius: 1.5, stepLon: 20},
            file: "world-medres.topojson",
            key: "world"
        },{
            name: "Conic Albers USA",
            projection: d3.geoAlbersUsa(),
            tissot: {radius: 1.5, stepLon: 20},
            file: "world-medres.topojson",
            key: "world",
            filter: d => d.properties.ISO_A3 === 'USA'
        }
    ];

    projections.forEach(function(d,i) {
        d3.select("#sidebar")
                .append("p")
                .attr("id", "p"+i)
                .on("click", () => map.showMap(d, i))
        .text(d.name);
    })

    map.showMap(projections[0], 0);
</script>

</body>
</html>
