<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .hemisphere {
            stroke-width: 3;
            stroke-opacity: .2;
        }
        .east {
            stroke: red;
            fill: rgba(100%,0%,0%,.2);
        }
        .west {
            stroke: blue;
            fill: rgba(0%,0%,100%,.2);
        }
        .country {
            stroke: white;
            stroke-width: .25;
            fill: gray;
            fill-opacity: .7;
        }
        .graticule {
            fill: none;
            stroke-width: .25;
            stroke: green;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3';

    const width = 960;
    const height = 500;
    const file = "world-medres.topojson";
    const key  = "world";

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    // choose a projection
    const projection = d3.geoOrthographic()
           .fitExtent([[0,5],[width, height-10]], {type: "Sphere"});

    // create a path generator function for the projection
    const geoPath = d3.geoPath()
            .projection(projection)

    const map = {};

    d3.json('../Data/' + file)
            .then(function(topology) {

                map.topology   = topology.objects[key];
                map.geometries = map.topology.geometries;
                map.features   = topojson.feature(topology, map.topology).features

                drawGraticules();
                draw();

            });

    function draw() {
        svg.selectAll("path.country")
                .data(map.features).enter()
                .append("path").attr("class","country")
                .attr("d", geoPath);
    }

    const graticule = d3.geoGraticule();

    function drawGraticules() {

        svg.append("path").attr("class", "graticule")
                .datum(graticule())
                .attr("d", geoPath);

        svg.append("path").attr("class", "east hemisphere")
                .datum(d3.geoCircle().center([90, 0])) // eastern hemisphere [0,90] = northern
                .attr("d", geoPath);

        svg.append("path").attr("class", "west hemisphere")
                .datum(d3.geoCircle().center([-90, 0])) // western hemisphere [0,-90] = southern
                .attr("d", geoPath);
    }
</script>

</body>
</html>
