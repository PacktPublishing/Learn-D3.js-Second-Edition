<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using GeoJSON to draw other shapes on a sphere</title>
    <style>
        svg {border: solid 1px gray;}
        .shape {
            fill-opacity: .9;
            stroke: white;
        }
    </style>
</head>
<body>
<h1>Using GeoJSON to draw other shapes on a sphere</h1>
<p>Take a look at the GeoJSON file!</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const width = 960;
    const height = 500;

    const dataFile = '../data/geojson/border-example.geojson';

    // This file contains simple shapes on a sphere
    d3.json(dataFile).then(function(data) {

        console.log(data);

        const color = d3.scaleOrdinal(d3.schemeCategory10);

        const svg = d3.select("body").append("svg")
                      .attr("width", width).attr("height", height);

        const geoPath = d3.geoPath().projection(d3.geoMercator());

        svg.selectAll("g.shape")
                .data(data.features)
                .join("g").attr("class","shape")
                .style("fill", (d,i) => color(i))
                .append("path")
                    .attr('d', geoPath)
    })
</script>

</body>
</html>
