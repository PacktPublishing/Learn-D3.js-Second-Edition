<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using nodeSize() and separation() in a radial tree</title>
    <style>
        path {
            stroke: black;
            fill: none;
        }
        text {
            font-family: 'Arial narrow', sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body>
<h1>Using <code>nodeSize()</code> and <code>separation()</code> in a radial tree</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {dim, chart, root} from "./js/treedata-json.js";

    const rotation = 90; // in degrees (used in CSS)
    chart.attr("transform", `translate(${[dim.width * .6, dim.height * .75]})`);

    root.eachBefore(d => d.number = d.parent ? `${d.parent.number}.${d.parent.children.indexOf(d) + 1}` : 1);
    root.sort((a,b) => d3.descending(a.height, b.height) );  // taller nodes first

    d3.tree().nodeSize([30 * Math.PI/180, 120])  // 30 degrees for each node
             .separation((a,b) => (a.parent === b.parent ? 1 : 2) / a.depth)
             (root);

    const nodes = root.descendants();
    const links = root.links();
    const color = d3.scaleOrdinal(d3.schemeCategory10).domain(d3.extent(nodes, n => n.depth));
    const width = d3.scaleLinear().range([1,16]).domain(d3.extent(links, k => k.target.height));

    const radialLink = d3.linkRadial()
                         .angle(d => d.x)
                         .radius(d => d.y);

    drawLinks();
    drawNodes();
    drawLabels();

    function drawNodes() {
        const toDeg = x => x * 180/Math.PI - rotation;
        chart.selectAll("g")
             .data(nodes)
                .join("g").attr("class", "node")
                    .attr("transform", d => `rotate(${toDeg(d.x)}) translate(${d.y})`)  // will also rotate text nodes
                    .append("circle")
                        .attr("r", d => (d.height + 3) * 5)
                        .style("fill", d => color(d.height));
    }

    function drawLinks() {
        chart.selectAll("path")
             .data(links)
                .join("path")
                    .attr("d", radialLink)
                    .style("stroke-width", d => width(d.target.height))
                    .style("opacity", d => d.target.depth *.15 + .4);
    }

    function drawLabels() {
        const upsideDown = d => d.x > Math.PI/180; // text is upside down if x > 0 (in radians)
        chart.selectAll("g.node")
             .append("text")
                .text(d => d.number) // number was generated using eachBefore()
                .attr("fill", d => d.height !== 0 ? 'white' : 'black')
                .attr("transform", d => d.height === 0
                                        ? `rotate(${upsideDown(d) ? 0 : 180}) translate(${upsideDown(d) ? 20 : -20},5)`
                                        : `rotate(${-d.x * 180/Math.PI + rotation}) translate(0,5)`)
                .style("text-anchor", d => d.height !== 0 ? "middle" : upsideDown(d) ? "start" : "end")
                .style("font-size", d => 14 + (d.height*d.height));
    }

</script>
</body>
</html>
