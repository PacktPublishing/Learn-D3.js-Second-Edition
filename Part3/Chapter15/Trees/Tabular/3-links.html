<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trees: drawing links from link objects</title>
    <style>
        line {
            stroke: black;
        }
    </style>
</head>
<body>
<h1>Trees: drawing links from link objects</h1>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {cht, chart, root} from "./js/treedata-csv.js";

    // Code for dimensions, SVG and data are now in treedata-csv.js

    // Tree
    d3.tree().size([cht.w, cht.h])(root);

    // Links
    const links = root.links();
    const width = d3.scaleLinear().range([1,16]).domain(d3.extent(links, k => k.target.height));

    drawLinks();

    // Functions
    function drawLinks() {
        chart.selectAll("line")
             .data(links)
                .join("line")
                    .attr("x1", d => d.source.x)  // getting data from each link object
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y)
                    .style("stroke-width", d => width(d.target.height))
                    .style("opacity", d => d.target.depth *.15 + .4);
    }

    // To allow inspection in the browser console
    window.root = root;
    window.d3 = d3;
</script>
</body>
</html>
