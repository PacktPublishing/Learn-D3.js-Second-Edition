<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change tree root</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .leaf {
            pointer-events: none;
        }
    </style>
</head>
<body>
<h1>Interactive tree: copying a node to make it a root</h1>
<p>Click on a node to make it the new root. Double-click to return to initial tree.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {cht, chart, root} from "./js/treedata-json.js";

    const tree = d3.cluster().size([cht.w, cht.h]);

    const nodes = root.descendants();
    const links = root.links();
    const color = d3.scaleOrdinal(d3.schemeCategory10).domain(d3.extent(nodes, n => n.depth));
    const width = d3.scaleLinear().range([1,16]).domain(d3.extent(links, k => k.target.height));

    // The current root
    let currentRoot = root;

    // Draws the initial tree
    changeRoot(null, root);

    // Draws a tree with d as the new root; resets to the initial root if d is already the current root
  function changeRoot(evt, node) {
      currentRoot = (node === currentRoot) ? root : node;
      tree(currentRoot);
      draw(currentRoot);
  }

    function draw(rootNode) {
        // links
        chart.selectAll("path")
                .data(rootNode.links()).join("path")
                .attr("d", d3.linkVertical().x(d => d.x).y(d => d.y))
                .style("stroke-width", d => width(d.target.height))
                .style("opacity", d => d.target.depth *.15 + .4);

        // nodes
        chart.selectAll("g.node")
            .data(rootNode.descendants(), d => d.data.id) // required since nodes are added/removed out of order!
            .join(enter =>
               enter.append("g").attr("class","node")
                    .each(function(d) {
                        const n = d3.select(this);
                        n.append("circle")
                         .attr("r", (d.height + 1) * 9)
                         .style("fill", color(d.depth));
                        n.append("text").attr("transform", "translate(0,5)")
                         .text(d.data.id)
                         .style("fill", d.height !== 0 ? 'white' : 'black')
                         .style("font-size", 18 + (d.height*d.height))
                         .attr("transform", d.height === 0 ? `rotate(-90) translate(-15,5)` : "translate(0,5)")
                         .style("text-anchor", d.height !== 0 ? "middle" : "end")
                     }),
            )
            .attr("transform", d => `translate(${[d.x, d.y]})`)
            .classed("leaf", d => !d.children)
            .on("click", changeRoot);                       // changes root to this node

        chart.selectAll("g.node").raise();
    }
</script>
</body>
</html>
