<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive tree: show path between nodes</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        path.faded {
            stroke: lightgray;
        }
        path.highlighted {
            stroke: red;
        }
        .faded circle {
            opacity: .4;
        }
        .highlighted circle {
            stroke: black;
            stroke-width: 3;
        }
        .highlighted text {
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>Interactive tree: show path between nodes</h1>
<p>Hover a node to highlight its path to the root. Click on any other node to use it as the new destination,
   and hover over other nodes to highlight the path between them.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {dim, cht, chart, root} from "./js/treedata-json.js";

    d3.cluster().size([cht.w, cht.h])(root);

    const nodes = root.descendants();
    const links = root.links();
    const color = d3.scaleOrdinal(d3.schemeCategory10).domain(d3.extent(nodes, n => n.depth));
    const width = d3.scaleLinear().range([2,32]).domain(d3.extent(links, k => k.target.height));
    const verticalLink = d3.linkVertical().x(d => d.x).y(d => d.y);

    let targetNode = root;

    chart.append("text").attr("class", "destination").text("Destination: ")
         .attr("x", 0).attr("y", -dim.margin/2)
         .style("font-size", 20)
         .append("tspan").text(targetNode.data.id);

    chart.append("text").attr("class", "path").text("Path: ")
         .attr("x", 0).attr("y", -dim.margin/2 + 20)
         .style("font-size", 20)
         .append("tspan").text(targetNode.data.id);

    drawLinks();  // draw links under the circles
    drawNodes();
    drawLabels();

    // Functions
    function drawNodes() {
        chart.selectAll("g")
             .data(nodes)
               .join("g").attr("class", "node")
                  .attr("transform", d => `translate(${[d.x, d.y]})`)
                     .append("circle")
                        .attr("r", d => (d.height + 1) * 10)
                        .style("fill", d => color(d.depth))
                        .on("click", changeTargetNode) // click to change target node to this node
                        .on("mouseover", highlightPath) // highlight path to target node from this node
                        .on("mouseout", reset);
    }

    function drawLinks() {
        chart.selectAll("path")
             .data(links)
               .join("path").attr("class", "link")
                 .attr("d", verticalLink)
                 .style("stroke-width", d => width(d.target.height))
                 .style("stroke-opacity", d => d.target.depth *.15 + .4);
    }

    function drawLabels() { // relative to node <g>
        chart.selectAll("g.node")
             .append("text")
                .text(d => d.data.id) // number generated using eachBefore()
                .style("fill", d => d.height !== 0 ? 'white' : 'black')
                .attr("transform", d => d.height === 0 ? `rotate(-90) translate(-15,5)` : "translate(0,5)")
                .style("text-anchor", d => d.height !== 0 ? "middle" : "end")
                .style("font-size", d => 14 + (d.height*d.height));
    }

    // Event handlers
    function changeTargetNode(event, node) {
        if(node === targetNode) {
            targetNode = root;
        }
        targetNode = node;
        d3.select("text.destination").select("tspan").text(targetNode.data.id);
    }

    function highlightPath(event, node) {
        const steps = node.path(targetNode);

        d3.selectAll(".node").classed('highlighted', d => steps.indexOf(d) >= 0);
        d3.selectAll(".node").classed('faded', d => steps.indexOf(d) < 0);

        d3.selectAll(".link").classed('faded', d => steps.indexOf(d.target) < 0 || steps.indexOf(d.source) < 0)
        d3.selectAll(".link").classed('highlighted', d => steps.indexOf(d.target) >= 0 && steps.indexOf(d.source) >= 0)

        d3.select("text.path").select("tspan").text(steps.map(d => d.data.id).join(" → "));
    }
    function reset() {
        d3.selectAll(".node, .link").classed('faded highlighted', false);
    }

    // To allow inspection in the browser console
    window.root = root;
    window.d3 = d3;
</script>
</body>
</html>
