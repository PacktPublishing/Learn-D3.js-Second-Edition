<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tree rendered in Canvas</title>
</head>
<body>
<h1>Tree rendered in Canvas</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {dim, cht, root} from "./js/treedata-json.js";

    // Set up canvas
    d3.select("svg").remove(); // remove previous SVG
    const canvas = d3.select("body").append("canvas")
                     .attr("height", dim.height)
                     .attr("width", dim.width);
    const ctx = canvas.node().getContext("2d");
    ctx.translate(dim.margin, dim.margin);

    // Generate tree
    d3.cluster().size([cht.w, cht.h])(root);

    // Nodes, links, scales
    const nodes = root.descendants();
    const links = root.links();
    const color = d3.scaleOrdinal(d3.schemeCategory10).domain(d3.extent(nodes, n => n.depth));
    const width = d3.scaleLinear().range([1,16]).domain(d3.extent(links, k => k.target.height));

    // Pathlinks
    const verticalLink = d3.linkVertical()
                           .x(d => d.x).y(d => d.y)
                           .context(ctx); // generate path commands for canvas

    drawLinks();
    drawNodes();
    drawLabels();

    // Canvas rendering functions
    function drawNodes() {
        ctx.save();
        ctx.strokeStyle = "black";
        ctx.fillStyle = "none";
        nodes.forEach(function(d) {
            ctx.fillStyle = color(d.depth);
            ctx.beginPath();
            ctx.arc(d.x, d.y, (d.height + 1) * 10, 0, 2 * Math.PI);
            ctx.stroke();
            ctx.fill();
        });
        ctx.restore();
    }

    function drawLinks() {
        ctx.save();
        ctx.fillStyle = "transparent";
        links.forEach(function(d) {
            ctx.lineWidth = width(d.target.height);
            ctx.globalAlpha =  d.target.depth *.15 + .4;
            ctx.beginPath();
            verticalLink(d);
            ctx.stroke();
        });
        ctx.restore();
    }

    function drawLabels() {
        const font = 'px "Arial narrow", sans-serif';
        ctx.textBaseline = "baseline";

        nodes.forEach(function(d,i) {
            ctx.save(); // save current canvas state
            ctx.fillStyle = d.height !== 0 ? 'white' : 'black';
            ctx.textAlign = d.height !== 0 ? "center" : "end";

            const fontSize = 14 + d.height*d.height;
            ctx.font = fontSize + font;

            ctx.translate(d.x, d.y);
            if(d.height === 0) {
                ctx.rotate(-Math.PI / 2);
                ctx.translate(-15,5);
            } else {
                ctx.translate(0,5);
            }
            ctx.fillText(d.data.id, 0, 0);
            ctx.restore(); // recover saved canvas state
        });
    }

</script>
</body>
</html>
