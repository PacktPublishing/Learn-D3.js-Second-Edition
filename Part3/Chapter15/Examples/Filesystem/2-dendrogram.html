<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filesystem example</title>
</head>
<body>
<h1>Filesystem example</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {root} from "./js/filesystem.js";

    console.log("D3 hierarchy", root);

    // Make dendrogram
    d3.cluster().size([1000, 1000])(root);

    // Draw the tree
    const chart = d3.select("body").append("svg")
                    .attr("width", 1200)
                    .attr("height", 1200)
                    .append("g")
                        .attr("transform", "translate(50, 50)");

    chart.selectAll("path")
        .data(root.links())
        .join("path")
            .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x))
            .style("fill", "none")
            .style("stroke", "black");

    const node = chart.selectAll("g.node")
        .data(root.descendants())
        .join("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${d.y}, ${d.x})`);

    node.filter(d => d.children).append("rect")
        .attr("y", -7.5)
        .attr("width", 60)
        .attr("height", 15)
        .attr("fill", "gold") // different colors for parent and leaf nodes
        .style("stroke", "black");

    node.append("text")
                .text(d => d.data.path.substring(d.data.path.lastIndexOf("/") + 1) + (d.children ? "/" : ""))
                .attr("y", 3)
                .attr("x", 5)
                .style("font-family", "Arial")
                .style("alignment-baseline", "baseline")
                .style("fill", "blue")
                .style("font-size", d => d.children ? "10px" : "8px");


</script>

</body>
</html>
