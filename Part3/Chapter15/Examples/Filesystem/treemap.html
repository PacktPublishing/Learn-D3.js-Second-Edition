<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filesystem example</title>
</head>
<body>
<h1>Filesystem example</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {root} from "./js/filesystem.js";

    console.log("D3 hierarchy", root);

    root.sum(d => d.fileSize); // sum the file sizes for each node
    console.log(root)

    // Make tidy tree
    d3.treemap().size([1500, 700]).paddingOuter(5)(root);

    const color = d3.scaleOrdinal(d3.schemeObservable10);

    // Draw the treemap
    const chart = d3.select("body").append("svg")
                    .attr("width", 1600)
                    .attr("height", 800)
                    .append("g")
                        .attr("transform", "translate(50, 50)");

    const node = chart.selectAll("g")
        .data(root.descendants())
        .join("g")
            .attr("transform", d => `translate(${d.x0}, ${d.y0})`)

    node.append("rect")
        .attr("width", d => d.x1 - d.x0)
        .attr("height", d => d.y1 - d.y0)
        .attr("fill", d => d.children ? d3.gray(color(d.height), .5) : color(d.parent))
        .style("stroke", "gray");


    node.append("text").filter(d => d.height === 0) // only show text for leaf nodes
        .text(d => d.data.path.substring(d.data.path.lastIndexOf("/") + 1) + (d.children ? "/" : ""))
        .attr("x", 2).attr("y", 7)
        .style("font-family", "nk57 monospace cd sb")
        .style("alignment-baseline", "middle")
        .style("fill", "black")
        .style("font-size", 8);

</script>

</body>
</html>
