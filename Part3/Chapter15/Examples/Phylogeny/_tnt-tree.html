<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dendrogram from tabular data</title>
</head>
<body>
<h2>Cladogram: Headden/Campos (2015) phylogeny of pterosaurs</h2>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {addHighlightPath} from "../../TreeExamples/cladogram/js/highlight-path.js";
    import {parseTree} from "../../TreeExamples/cladogram/js/phylotree.js";

    const dim = {width: 1200, height: 1000};
    const margin = {top: 10, right: 10, bottom: 250, left: 100};
    const cht = {w: dim.width - margin.left - margin.right, h: dim.height - margin.top - margin.bottom};

    const chart = d3.select("body").append("svg")
                    .attr("width", dim.width)
                    .attr("height", dim.height)
                    .style("font", "10px sans-serif")
                    .append("g")
                       .attr("transform", `translate(${margin.left}, ${margin.top})`);

    const styles = {
        leafRadius: 4,
        groupRadius: 3,
        strokeWidth: 2,
        dotLeafColor: "orange",
        dotGroupColor: "green",
        pathColor: "#ccc"
    }

    const data = "(Ornithosuchus_woodwardi ,(Herrerasaurus_ischigualastensis ,(Scleromochlus_taylori ,(Anurognathus_ammoni ,(Rhamphorhynchus_muensteri ,(Pterodactylus_antiquus ,(Nyctosaurus_gracilis ,((Pteranodon_longiceps ,((Tropeognathus_mesembrinus ,(Anhanguera_blittersdorffi ,Anhanguera_piscator ,Anhanguera_santanae )),(Ludodactylus_sibbicki ,Guidraco_venator ),(Nurhachius_ignaciobritoi ,Istiodactylus_latidens ))),((Banguela_oberlii ,(Dsungaripterus_weii ,Noripterus_parvus )),(((Azhdarcho_lancicollis ,Wellnhopterus_brevirostris ,Zhejiangopterus_linhaiensis ),(Chaoyangopterus_zhangi ,Shenzhoupterus_chaoyangensis )),(Vectidraco_daisymorrisae ,((Thalassodromeus_sethi ,Tupuxuara_leonardii ),((Tupandactylus_imperator ,Tapejara_wellnhoferi ),(Sinopterus_dongi ,Eopteranodon_lii ,(Huaxipterus_benxiensis ,Huaxiadraco_corollatus )))))))))))))))";

    const objData = parseTree(data);
    const root = d3.hierarchy(objData);

    d3.cluster().size([cht.w, cht.h])(root);

    draw(chart, root);
    addHighlightPath(chart, styles);

    // Functions
    function draw(chart, tree) {
        drawLinks(chart, tree.links(), styles.strokeWidth, styles.pathColor);
        drawNodes(chart, tree.descendants(), styles.leafRadius, styles.groupRadius, styles.dotLeafColor, styles.dotGroupColor);
    }

    function drawLinks(chart, data, strokeWidth, pathColor) {
        chart.selectAll("path")
             .data(data)
                .join("path")
                    .attr("class", d => `${d.target.node}`)
                    .style("fill", "none")
                    .style("stroke-width", strokeWidth)
                    .style("stroke", pathColor)
                    .attr("d", d3.link(d3.curveStepBefore).x(d => d.y).y(d => d.x));  // using step curve
    }

    function drawNodes(chart, data, radiusLeaf, radiusGroup, dotLeafColor, dotGroupColor) {
        const node = chart.selectAll("g")
                          .data(data)
                             .join("g")
                                 .attr("class", d => d.children ? "group" : "leaf")
                                 .attr("transform", d => `translate(${d.y},${d.x})`);

        node.append("circle")
            .attr("r", d => d.children ? radiusGroup : radiusLeaf)
            .attr("fill", d => d.children ? dotGroupColor : dotLeafColor);

        node.append("text")
            .attr("alignment-baseline", d => d.children ? "baseline" : "middle")
            .attr("y", d => d.children ? -3 : 0)
            .attr("x", d => d.children ? -6 : 6)
            .attr("text-anchor", d => d.children ? "end" : "start")
            .attr("fill", d => d.children ? 'purple' : 'black')
            .text(d => d.data.name);
    }

    const input = "(Ornithosuchus_woodwardi ,(Herrerasaurus_ischigualastensis ,(Scleromochlus_taylori ,(Anurognathus_ammoni ,(Rhamphorhynchus_muensteri ,(Pterodactylus_antiquus ,(Nyctosaurus_gracilis ,((Pteranodon_longiceps ,((Tropeognathus_mesembrinus ,(Anhanguera_blittersdorffi ,Anhanguera_piscator ,Anhanguera_santanae )),(Ludodactylus_sibbicki ,Guidraco_venator ),(Nurhachius_ignaciobritoi ,Istiodactylus_latidens ))),((Banguela_oberlii ,(Dsungaripterus_weii ,Noripterus_parvus )),(((Azhdarcho_lancicollis ,Wellnhopterus_brevirostris ,Zhejiangopterus_linhaiensis ),(Chaoyangopterus_zhangi ,Shenzhoupterus_chaoyangensis )),(Vectidraco_daisymorrisae ,((Thalassodromeus_sethi ,Tupuxuara_leonardii ),((Tupandactylus_imperator ,Tapejara_wellnhoferi ),(Sinopterus_dongi ,Eopteranodon_lii ,(Huaxipterus_benxiensis ,Huaxiadraco_corollatus )))))))))))))))";
    const tree = parseTree(input);
    console.log(JSON.stringify(tree, null, 2));

</script>

</body>
</html>
