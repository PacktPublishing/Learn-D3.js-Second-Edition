<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunburst partition</title>
    <style>
        text {font-family: 'Arial', sans-serif; font-size: 9px}
        rect {stroke: white; stroke-width: 1}
        h1 {font-family: 'Arial', sans-serif; font-size: 30px}
        path {stroke: white}
    </style>
</head>
<body>
<h1>Geological time scale: Cenozoic era, periods, epochs, and ages</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const dim = {width: 1100, height: 560};
    const margin = {top: 10, right: 10, bottom: 10, left: 10};
    const cht = {w: dim.width - margin.left - margin.right, h: dim.height - margin.top - margin.bottom};

    const chart = d3.select("body").append("svg")
                    .attr("width", dim.width)
                    .attr("height", dim.height)
                    .style("font", "10px sans-serif")
                    .append("g")
                        .attr("transform", `translate(${dim.width/2}, ${dim.height/2})`);

    const nested = await d3.json("../../data/geotime.json");

    // Root is Cenozoic era
    const subtree = nested.children.find(d => d.id === "Phanerozoic") // super-eon
                          .children.find(d => d.id === "Phanerozoic") // eon
                          .children.find(d => d.id === "Cenozoic") // era

    const root = d3.hierarchy(subtree);
    // root.count();
    root.sum(d => d.start - d.end);  // proportional to the time span

    d3.partition().size([Math.PI, cht.w/2])(root);

    // Remove slices too small to be visible
    const removed = root.find(d => d.data.id === "Quaternary").children.map(d => d.data.id)
    removed.forEach(id => removeChildren(root, id));

    // Adjust for a half-circle chart
    const displayChart = chart.append("g")
                              .attr("class", "partition")
                              .attr("transform", `translate(0,${dim.height/2 - 10}) rotate(-90)`);

    const displayData = root.descendants();

    draw(displayChart, displayData);

    function removeChildren(node, id) {
        const n1 = node.find(d => d.data.id === id);
        n1.children = [];
        n1.height = 0;
    }

    function draw(g, data) {
        const arc = d3.arc().startAngle(d => d.x0)
                            .endAngle(d => d.x1)
                            .innerRadius(d => d.y0)
                            .outerRadius(d => d.height === 0 && d.depth !== 6 ? cht.w/2 : d.y1);
        const start = arc.startAngle();
        const end   = arc.endAngle();

        const cell = g.selectAll("g.slice")
                      .data(data)
                      .join("g")
                      .attr("class", "slice");

        cell.append('path')
            .attr('d', arc)
            .attr("fill", d => d.data.color);

        cell.append("text")
            .text(d => d.data.id)
            .style("text-anchor", "middle")
            .style("fill", d => d3.hsl(d.data.color).l > 0.45 ? "black" : "white")
            .attr("transform", d =>
                   `translate(${arc.centroid(d)}) rotate(${(180/Math.PI * (start(d) + end(d))/2 + (d.x1 >= Math.PI/2 ? -90 : 90))})`)
            .style("alignment-baseline", "middle");
    }

</script>

</body>
</html>
