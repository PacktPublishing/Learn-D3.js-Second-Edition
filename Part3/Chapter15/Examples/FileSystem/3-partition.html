<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filesystem example</title>
</head>
<body>
<h1>Filesystem example</h1>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {root} from "../../../Chapter16/Examples/Filesystem/js/filesystem.js";

    console.log("D3 hierarchy", root);

    root.sum(() => 1);

    // Make tidy tree
    d3.partition().size([1600, 800])(root);

    const color = d3.scaleOrdinal(d3.schemeOranges[7].reverse().slice(1))
                    .domain(d3.extent(root.descendants(), d => d.depth));

    // Draw the treemap
    const chart = d3.select("body").append("svg")
                    .attr("width", 1800)
                    .attr("height", 900)
                    .append("g")
                        .attr("transform", "translate(50, 50)");

    chart.selectAll("rect")
        .data(root)
        .join("rect")
            .attr("x", d => d.x0)
            .attr("y", d => d.y0)
            .attr("width", d => d.x1 - d.x0)
            .attr("height", d => d.y1 - d.y0)
            .attr("fill", d => d.children ? color(d.depth) : "lightblue") // different colors for parent and leaf nodes
            .style("stroke", "gray");

    chart.selectAll("text")
        .data(root)
        .join("text")
            .attr("transform", d => `rotate(90, ${d.x0}, ${d.y0})`)
            .text(d => d.data.substring(d.data.lastIndexOf("/") + 1) + (d.children ? "/" : ""))
            .attr("x", d => d.x0 + 5)
            .attr("y", d => d.y0 - 4)
            .style("font-family", "nk57 monospace cd sb")
            .style("alignment-baseline", "center")
            .style("fill", "black")
            .style("font-size", 8);

</script>

</body>
</html>
