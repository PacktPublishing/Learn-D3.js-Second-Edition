<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circle pack enclosure</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<h1>Circle pack enclosure</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {cht, chart, root} from "./js/treedata-json.js";

    // Must configure either sum() or count()
    root.sort((a,b) => b.height - a.height )
        .sum(d => d.weight*d.weight);

    const color = d3.scaleOrdinal(d3.schemeObservable10)
                     .domain(d3.extent(root, n => n.height));

    d3.pack().size([cht.w, cht.h])(root);

    chart.selectAll("circle")
        .data(root)
        .join("circle")
           .attr("cx", d => d.x)
           .attr("cy", d => d.y)
           .attr("r", d => d.r)
           .style("fill", d => color(d.height));

</script>
</body>
</html>
