<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partition: sunburst chart with radial labels</title>
    <style>
        text {
            font-family: 'Arial narrow', sans-serif;
            text-anchor: middle;
            fill: white;
            font-size: 10px;
        }
        path {
            stroke: white;
            stroke-width: 2px;
        }
    </style>
</head>
<body>
<h1>Partition: sunburst chart with radial labels</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {cht, dim, chart, root} from "./js/treedata-json.js";

    chart.attr("transform", `translate(${[dim.width/2, dim.height/2]}) rotate(-90) `);

    root.sort((a,b) => d3.ascending(a.height, b.height))
        .sum(d => d.weight);

    const partition = d3.partition().size([Math.PI * 2, cht.h * .6])(root);

    const nodes = root.descendants();

    const arc = d3.arc()
                  .startAngle(d => d.x0)
                  .endAngle(d => d.x1)
                  .innerRadius(d => d.y0)
                  .outerRadius(d => d.y1);

    const color = d3.scaleOrdinal(d3.schemeYlOrRd[7].slice(2));

    const font = d3.scaleLinear()
                   .domain(d3.extent(root.descendants(), d => d.depth).reverse())
                   .range([12,22]);

    drawPartition();
    drawLabels();

    function drawPartition() {
        chart.selectAll("path")
            .data(nodes)
            .join("path")
                .attr("d", arc)
                .attr("fill", d => color(d.depth));
    }

    function drawLabels() {
        const label = chart.selectAll("text")
            .data(nodes)
            .join("text")
            .attr("x", d => arc.centroid(d)[0])
            .attr("y", d => d.depth === 0 ? arc.centroid(d)[1] - 20 : arc.centroid(d)[1] - 10)
            .style("alignment-baseline", "middle")
            .attr("transform", d => d.depth === 0 ? 'rotate(90)' : `rotate(${(d.x1 + d.x0) * 90/Math.PI}, ${arc.centroid(d)})`)

        label.append("tspan")
            .text(d => d.x1 - d.x0 > Math.PI/10 ? d.data.id : '')
            .style("font-size", d => font(d.depth));
        label.append("tspan")
            .attr("x", d => arc.centroid(d)[0])
            .attr("y", d => arc.centroid(d)[1] + 2)
            .text(d => !d.children && d.x1 - d.x0 > Math.PI/10 ? d.data.weight : '');

    }

</script>
</body>
</html>
