<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partition: icicle chart with labels</title>
    <style>
        rect {
            stroke: white;
            stroke-width: 1;
        }
    text {
        font-family: 'Arial narrow', sans-serif;
        text-anchor: middle;
        alignment-baseline: middle;
        fill: white;
        font-size: 12px;
    }
    </style>
</head>
<body>
<h1>Partition: flame chart with labels</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {cht, chart, root} from "./js/treedata-json.js";

    root.sort((a,b) => d3.ascending(a.height, b.height))
        .sum(d => d.weight);  // adding values

    // Generating labels
    root.eachBefore(d => d.number = d.parent ? `${d.parent.number}.${d.parent.children.indexOf(d) + 1}` : 1);

    // Generate partition properties (x0, y0, x1, y1) for each node in root
    d3.partition().size([cht.w, cht.h])(root);

    const nodes = root.descendants();
    const color = d3.scaleOrdinal(d3.schemeYlOrRd[6].slice(1).reverse());
    const font = d3.scaleLinear()
                   .domain(d3.extent(root.descendants(), d => d.depth).reverse())
                   .range([14,40]);

    drawPartition();
    drawLabels();

    chart.attr("transform", `translate(${[0, cht.h]}) scale(1,-1)`); // flip the chart
    chart.selectAll("text")
         .attr("transform", `translate(0, ${cht.h}) scale(1, -1)`)

    function drawPartition() {
        chart.selectAll("rect")
            .data(nodes)
            .join("rect")
                .attr("x", d => d.x0)
                .attr("y", d => d.y0)
                .attr("width", d => d.x1 - d.x0)
                .attr("height", d => d.y1 - d.y0)
                .style("fill", d => d3.color(color(d.depth)).darker());
    }

    function drawLabels() {
        const label = chart.selectAll("text")
            .data(nodes)
            .join("text")
            .attr("x", d => (d.x0 + d.x1) / 2)
            .attr("y", d => cht.h - (d.y0 + d.y1) / 2 + 8);

        label.append("tspan")
             .text(d => d.x1 - d.x0 > 20 ? d.data.id : '')
             .style("font-size", d => font(d.depth));
        label.append("tspan")
             .attr("dy", "1.2em")
             .attr("x", d => (d.x0 + d.x1) / 2)
             .text(d => !d.children && d.x1 - d.x0 > 20 ? d.data.weight : '');


    }
</script>
</body>
</html>
