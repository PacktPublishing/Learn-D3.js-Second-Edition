<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data generated by layout functions</title>
  <style>
    svg {
        border: solid 1px green;
    }
  </style>
</head>
<body>
<h1>Data generated by a d3.stratify() function from a tabular data source</h1>
<p>See source-code and console output for details</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    // A sample hierarchical dataset
    const data = [
        {id: "root", context: null},
        {id: "a", context: "root"},
        {id: "b", context: "root"},
        {id: "aa", context: "a"},
        {id: "ab", context: "a"}
    ];

    console.log("tabular-data", data);

    // Create a custom hierarchy function from the tabular data
    const hierarchy = d3.stratify(data)
                        .id(d => d.id)
                        .parentId(d => d.context);

    // 1) Saves all existing properties in `data` object: {}
    // 2) Adds `depth`, `height` and `parent` properties
    // 3) Creates parent nodes and places corresponding child nodes in a `children` array.
    // 4) Adds methods: ancestors, copy, count, descendants, each,eachAfter, eachBefore, find, leaves, links, path, sort, sum
    const root = hierarchy(data);
    console.log("root", root);

    console.log("root.links", root.links());
    console.log("root.descendants", root.descendants());

    // Remove the generated parent property (circular reference) to allow JSON.stringify to work
    const noParentRoot = root.copy().each(d => d.parent = '#link_to_parent#');
    console.log("Generated object (methods not shown):\n", JSON.stringify(noParentRoot, null, 3));

    // To allow inspection in the browser console
    window.root = root;
    window.d3 = d3;
</script>
</body>
</html>
