<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple interactive d3.tree()</title>
  <style>
    svg {
        border: solid 1px green;
    }
    text {
        alignment-baseline: middle;
        text-anchor: middle;
        font-family: sans-serif;
        font-size: 20px;
        font-weight: bold;
        fill: white;
    }
  </style>
</head>
<body>
<h1>Interactive <code>d3.tree()</code> function</h1>
<p>Click to expand and collapse nodes.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import { drawChartSize } from "./js/chart-data.js";

    const width = 600, height = 300, margin = 50;
    const chart = d3.select("body").append("svg").attr("height", height).attr("width", width)
                    .append("g").attr("transform", `translate(${[margin,margin]})`);
    const chartSize = [width - margin*2, height - margin*2]; // [500, 200]

    // A d3.hierarchy()
    const data = {
        id: "root",
        items: [
            {id: "a", items: [{id: "aa"}, {name: "ab"}]},
            {id: "b"}
        ]
    };
    console.log("nested-data", data);

    const root = d3.hierarchy(data, d => d.items);
    root.count();

    // Call the tree or cluster layout function to add x and y coordinates to each node
    d3.tree().size(chartSize)(root);
    console.log("root", root);

    // Draw a rectangle showing the computed chart size and a 100x100px grid for reference
    drawChartSize(chart, chartSize);

    const color = d3.scaleOrdinal(d3.schemeObservable10)
        .domain(d3.extent(root, n => n.depth));
    const radius = d3.scaleSqrt()
        .domain(d3.extent(root.descendants(), d => d.value))
        .range([10, 30]);

    draw(root, 0);

    // Draw nodes - this code is purposely kept as simple as possible. For larger trees,
    // refer to the examples in the TreeInteractive/ folder.
    function draw(node, maxDepth) {

        // Nodes to show
        const nodes = [...node.descendants().filter(d => d.depth <= maxDepth),             // direct descendants
                       ...node.ancestors(),                                                // ancestors
                       ...root.descendants().filter(d => d.parent && d.parent.expanded)];  // already expanded

        // Show all links between the displayed nodes
        const links = root.links().filter(d => nodes.includes(d.source) && nodes.includes(d.target));

        chart.selectAll("path")
             .data(links)
                .join("path")
                    .attr("d", d3.linkVertical().x(d => d.x).y(d => d.y))
                    .attr("fill", "none")
                    .attr("stroke", "black").lower();

        chart.selectAll("circle")
             .data(nodes)
                .join("circle")
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y)
                    .attr("r", d => radius(d.value))
                    .style("fill", d => color(d.depth));

        chart.selectAll("text")
             .data(nodes)
                .join("text")
                    .attr("x", d => d.x)
                    .attr("y", d => d.y)
                    .text(d => d.height === 0 ? '' : d.value)
                    .style("pointer-events", "none");

        chart.selectAll("circle")
             .style("pointer-events", d => d.children ? "all" : "none")
             .on("click", toggle);
    }

    // show or hide descendants
    function toggle(evt, d) {
        if (d.expanded) {
            d.each(d => d.expanded = false);
            draw(d, d.depth);
        } else {
            d.expanded = true;
            draw(d, d.depth + 1);
        }
    }

    // To allow inspection in the browser console
    window.root = root;
    window.d3 = d3;
</script>
</body>
</html>
