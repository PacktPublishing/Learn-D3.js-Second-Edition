<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data generated by the <code>count()</code> method</title>
  <style>
    svg {
        border: solid 1px green;
    }
  </style>
</head>
<body>
<h1>Data generated by the <code>count()</code> method</h1>
<p>See source-code and console output for details</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    // A sample hierarchical dataset
    const data = [
        {id: "root", parent: null},
        {id: "a", parent: "root"},
        {id: "b", parent: "root"},
        {id: "aa", parent: "a"},
        {id: "ab", parent: "a"}
    ];

    const hierarchy = d3.stratify(data)
                        .id(d => d.id)
                        .parentId(d => d.parent);
    const root = hierarchy(data);

    // Generates a `value` property for each node containing the number of leaves
    root.count();

    console.log("root", root);

    // Remove the generated parent property (circular reference) to allow JSON.stringify to work
    const noParentRoot = root.copy().each(d => d.parent = '#link_to_parent#');
    console.log("Generated object (methods not shown):\n", JSON.stringify(noParentRoot, null, 3));

    // To allow inspection in the browser console
    window.root = root;
    window.d3 = d3;
</script>
</body>
</html>
