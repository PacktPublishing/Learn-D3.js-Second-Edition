<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data generated by layout functions: d3.tree()</title>
  <style>
    svg {
        border: solid 1px green;
    }
  </style>
</head>
<body>
<h1>Data generated by the <code>d3.tree()</code> function</h1>
<p>See source-code and console output for details.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import { drawChartSize } from "./js/chart-data.js";

    const width = 600, height = 300, margin = 50;
    const chart = d3.select("body").append("svg").attr("height", height).attr("width", width)
                    .append("g").attr("transform", `translate(${[margin,margin]})`);
    const chartSize = [width - margin*2, height - margin*2]; // [500, 200]

    // A d3.hierarchy()
    const data = {
        id: "root",
        items: [
            {id: "a", items: [{id: "aa"}, {name: "ab"}]},
            {id: "b"}
        ]
    };
    console.log("nested-data", data);

    const root = d3.hierarchy(data, d => d.items);

    // Call the tree or cluster layout function to add x and y coordinates to each node
    d3.tree().size(chartSize)(root);
    console.log("root", root);

    // Draw a rectangle showing the computed chart size and a 100x100px grid for reference
    drawChartSize(chart, chartSize);

    const color = d3.scaleOrdinal(d3.schemeObservable10)
                         .domain(d3.extent(root, n => n.depth));

    chart.selectAll("path")
         .data(root.links())  // an array of {source, target} nodes
            .join("path")
                .attr("d", d3.linkVertical().x(d => d.x).y(d => d.y))
                .attr("fill", "none")
                .attr("stroke", "black");

    chart.selectAll("circle")
         .data(root.descendants())
            .join("circle")
                .attr("cx", d => d.x)
                .attr("cy", d => d.y)
                .attr("r", 15)
                .style("fill", d => color(d.depth));

    // Remove the generated parent property (circular reference) to allow JSON.stringify to work
    const noParentRoot = root.each(d => d.parent = '#link_to_parent#');
    console.log("Generated object (methods not shown):\n", JSON.stringify(noParentRoot, null, 3));

    // To allow inspection in the browser console
    window.root = root;
    window.d3 = d3;

</script>
</body>
</html>
