<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        svg {border: solid 1px gray;}
        .continent {
            stroke: white;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3'

    const width = 960;
    const height = 500;

    const color = d3.scaleOrdinal(d3.schemeCategory10);

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    const geoPath = d3.geoPath()
                      .projection(d3.geoMercator())
                      .pointRadius(3);

    d3.json('../data/africa/africa-simple.topojson').then(function(data) {

        console.log(data);

        const geodata = topojson.feature(data, data.objects["africa-simple"]);

        svg.selectAll("path.continent")
                .data(geodata.features).enter()
                .append("path").attr("class","continent")
                .style("fill", (d,i) => isLine(d) ? 'none' : color(i))
                .attr("d", geoPath);
    })

    function isLine(d) {
        return d.geometry.type == 'LineString' || d.geometry.type == 'MultiLineString';
    }

</script>

</body>
</html>
