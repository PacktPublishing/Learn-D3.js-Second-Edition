<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        svg {border: solid 1px gray;}
        .country {
            stroke: white;
        }
        .faded {
            opacity: .3;
        }
        .highlighted {
            fill: black;
            stroke-width: 2
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3';

    const width = 960;
    const height = 500;

    const color = d3.scaleOrdinal(d3.schemeCategory10);
    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    const geoPath = d3.geoPath().projection(d3.geoMercator());

    const map = {};

    d3.json('../data/africa/africa.topojson')
            .then(function(data) {

        const object   = data.objects['africa'];

        const geodata = topojson.feature(data, object);
        map.neighbors = topojson.neighbors(object.geometries);

        svg.selectAll("path.country")
                .data(geodata.features).enter()
                .append("path").attr("class","country")
                .attr("d", geoPath)
                .style("fill", (d,i) => color(i))
                .on('mouseover', showNeighbors)
                .on('mouseout', showAll);
    });

    function showNeighbors(evt, d) {
        const countries = d3.selectAll('.country');
        const idx = countries.data().indexOf(d);
        countries.classed('faded', (k,j) => !(map.neighbors[idx].includes(j) || k === d))
                 .classed('highlighted', k => k === d);
    }
    function showAll() {
        d3.selectAll('.country')
                .classed('faded', false)
                .classed('highlighted', false);
    }
</script>

</body>
</html>
