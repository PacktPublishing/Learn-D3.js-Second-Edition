<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drawing lines, points and shapes with GeoJSON</title>
    <style>
        svg {border: solid 1px gray;}
        text {
            font-family: "Arial Narrow", sans-serif;
            font-size: 10px;
            text-anchor: middle;
            alignment-baseline: hanging;
        }
        .continent {
            fill: #94923c;
        }
        .river {
            fill: none;
            stroke: aquamarine;
        }
        .city circle {
            fill: yellow;
            stroke: black;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const width = 960;
    const height = 500;

    const dataFile = '../data/geojson/africa-simple.geojson';

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    const projection = d3.geoMercator();
    const geoPath = d3.geoPath().projection(projection);

    d3.json(dataFile).then(function(data) {

        const rivers    = data.features.filter(d => d.geometry.type === 'LineString' || d.geometry.type === 'MultiLineString');
        const continent = data.features.filter(d => d.geometry.type === 'Polygon' || d.geometry.type === 'MultiPolygon');
        const cities    = data.features.filter(d => d.geometry.type === 'Point');

        svg.selectAll("path.continent").data(continent)
                .join("path").attr("class","continent")
                .attr("d", geoPath)

        svg.selectAll("path.river").data(rivers)
                .join("path").attr("class","river")
                .attr("d", geoPath);

        const geo2Pixel = d => geoPath.projection()(d.geometry.coordinates);
        svg.selectAll("g.city").data(cities)
            .join("g").attr("class","city")
            .attr("transform", d => `translate(${geo2Pixel(d)})`)
            .each(function(d) {
                d3.select(this).append("circle").attr('r', 3);
                d3.select(this).append("text").attr('y', 2).text(d.properties.name);
            });

    })
</script>

</body>
</html>
