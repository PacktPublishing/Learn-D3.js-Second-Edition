<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .graticule {
            fill: none;
            stroke: green;
            stroke-width: .25;
        }
        .ocean {
            fill: lightblue;
        }
        .country {
            stroke: white;
            stroke-width: .25;
            fill: gray;
        }
    </style>
</head>
<body>
<h1>ggg</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3';
    import versor from "https://cdn.skypack.dev/versor@0.2";

    const width = 960;
    const height = 500;
    const file = "world-medres.topojson";
    const key  = "world";

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    const projection = d3.geoOrthographic();

    const scale = projection.scale(),
          geoPath = d3.geoPath().projection(projection);

    const map = {};

    const zoom = d3.zoom()
            .scaleExtent([.5,40])
            .on("start", zoomStart)
            .on("zoom", zooming);

    const globe = svg.append("g")
            .attr("class","globe")
            .call(zoom);

    const state = {}

    // https://observablehq.com/@d3/d3-versor-dragging
    // library: https://github.com/Fil/versor/blob/master/src/versor.js
    // https://www.jasondavies.com/maps/rotate/
    function zoomStart(evt) {
        const mouse = projection.invert(d3.pointer(evt, globe));
        state.v0 = versor.cartesian(mouse);
        state.r0 = projection.rotate();
        state.q0 = versor(state.r0);
    }

    function zooming(evt) {
        projection.rotate(state.r0);
        const mouse = projection.invert(d3.pointer(evt));
        const v1 = versor.cartesian(mouse);

        const mouseDelta = versor.delta(state.v0, v1);
        const q1   = versor.multiply(state.q0, mouseDelta)

        projection.rotate(versor.rotation(q1));
        projection.scale(scale * evt.transform.k);
        requestAnimationFrame(() => {
            render();
        });
    }

    d3.json('../Data/' + file)
        .then(function(data) {
            map.topology   = data.objects[key];
            map.features   = topojson.feature(data, map.topology).features;

            drawGraticules();
            draw();
        });

    function drawGraticules() {
        globe.append("path").attr("class","ocean")
                .datum({type: 'Sphere'})
                .attr("d", geoPath);
        globe.append("path").attr("class","graticule")
                .datum(d3.geoGraticule10())
                .attr("d", geoPath);
    }

    function draw() {
        globe.selectAll("path.country")
                .data(map.features)
                .join("path")
                .attr("class","country")
                .attr("d", geoPath)
    }

    function render() {
        globe.selectAll("path.country, path.graticule, path.ocean").attr('d', geoPath);
    }

</script>
</body>
</html>
