<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .graticule {
            fill: none;
            stroke: green;
            stroke-width: .25;
        }
        .ocean {
            fill: lightblue;
        }
        .country {
            stroke: white;
            stroke-width: .25;
            fill: gray;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3';
    import * as d3_inertia from 'https://cdn.jsdelivr.net/npm/d3-inertia@0.4.0/+esm';  // See https://github.com/Fil/d3-inertia
    const d3 = Object.assign({}, d3_all, d3_inertia);

    // Check the exported names from d3-inertia
    const exportedNames = Object.keys(d3_inertia);
    console.log(exportedNames);

    const width = 960;
    const height = 500;
    const file = "world-medres.topojson";
    const key  = "world";

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);
    const globe = svg.append("g").attr("class","globe");

    var projection = d3.geoOrthographic();

    const scale = projection.scale(),
            geoPath = d3.geoPath().projection(projection);

    let currentTransform= d3.zoomIdentity;



    const zoom = d3.zoom()
        .filter((event) => event.type === 'wheel')
        .scaleExtent([.5,40])
        .on("zoom", zooming);
    svg.call(zoom);

    // Scaling only - dragging will be handled by d3.geoInertiaDrag
    function zooming(evt) {
        var t = evt.transform;
        projection.scale(scale * t.k)
        t.x = currentTransform.x;
        t.y = currentTransform.y;
        render();
    }

    d3.geoInertiaDrag(svg, () => render(), projection);

    const map = {};

    d3.json('../Data/' + file)
            .then(function(data) {
                map.topology   = data.objects[key];
                map.features   = topojson.feature(data, map.topology).features;

                drawGraticules();
                draw();
            });

    function drawGraticules() {
        globe.append("path").attr("class","ocean")
                .datum({type: 'Sphere'})
                .attr("d", geoPath);
        globe.append("path").attr("class","graticule")
                .datum(d3.geoGraticule10())
                .attr("d", geoPath);
    }

    function draw() {
        globe.selectAll("path.country")
                .data(map.features).enter()
                .append("path")
                .attr("class","country")
                .attr("d", geoPath)
    }

    function render() {
        globe.selectAll("path.country").attr('d', geoPath);
        globe.selectAll("path.graticule").attr('d', geoPath);
        globe.selectAll("path.ocean").attr('d', geoPath);
    }
</script>

</body>
</html>
