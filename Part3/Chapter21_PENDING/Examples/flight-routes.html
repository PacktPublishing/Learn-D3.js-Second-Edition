<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Airports and flight routes</title>
    <link rel="stylesheet" href="./css/maps.css">
    <style>
        .airport path {
            fill: lightgreen;
        }
    </style>
</head>
<body>
<h1>Airports and flight routes</h1>
<p>Blue dots are airports and lines are routes. The busier the route, the thicker, darker and redder is the line.
Try using a different projection (e.g. Mercator, Gnomonic and Orthographic) for other views.</p>
<div id="switcher"></div>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);

    import versor from "https://cdn.skypack.dev/versor@0.2";

    import {loadShapeFile, renderMap, updateMap, createProjectionSwitcher} from "./js/maps.js";

    const dim = {width: 960, height: 500};
    const file = "../data/world-medres.topojson";
    const key  = "world";

    const airportsFile = "../data/airports.csv";
    const routesFile = "../data/routes.csv";

    const projections = [
        {name: "Robinson", p: d3.geoRobinson().fitExtent([[0,5],[dim.width, dim.height-10]], {type: "Sphere"})},
        {name: "Mercator", p: d3.geoMercator()},                                          // Shows routes as curves
        {name: "Orthographic North Pole", p: d3.geoOrthographic().rotate([0, -90, 0])},   // Showing northern hemisphere
        {name: "Gnomonic North Pole", p: d3.geoGnomonic().rotate([0, -90, 0])}            // Shows routes as straight lines
    ];
    let projection = projections[0].p;

    createProjectionSwitcher(projections, "switcher", changeProjection);

    // create a path generator function for the projection
    const geoPath = d3.geoPath().projection(projection);

    // Zooming
    const zoom = d3.zoom()
                   .scaleExtent([.5,40])
                   .on("start", zoomStart)
                   .on("zoom", zooming);

    // Viewport and zoomable layer
    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);
    const globe = svg.append("g").attr("class","globe").call(zoom);

    // Load and render map
    await loadShapeFile(file, key);
    renderMap(dim, geoPath, globe);

    // Load airports
    const airports = await d3.csv(airportsFile, function(row) {
        if(!row.IATA || row.IATA.length !== 3 || !row.Longitude || !row.Latitude)
            return undefined;
        return {
            id: row.IATA,
            name: row.Name,
            city: row.City,
            coordinates: [+row.Longitude, +row.Latitude],
        };
    });

    // Render the airports
    globe.selectAll("g.airport")
         .data(airports)
          .join("g").attr("class","airport")
           .append("path")
             .datum(makePoint)  // Create a Point feature collection GeoJSON dataset (see function below)
             .attr('d', geoPath.pointRadius(1));

    // Load and prepare routes file, then render the routes
    // This is a large file and may take long to load
    const routes = await d3.csv(routesFile, row => {
            row.airline_count = +row.airlines;
            return row;
        })

    // Add airport coordinates to routes
    routes.forEach(function(route) {
        const s = airports.filter(a => a.id === route.iata_src);   // match IATA ID from airport to route
        const t = airports.filter(a => a.id === route.iata_dest);
        route.source = t ? t[0] : undefined;   // add coordinates for each point to routes dataset
        route.target = s ? s[0] : undefined;
    });

    // Creating scales to change color, width and transparency of the routes
    // based on the number of airlines flying that route.
    const colorScale = d3.scaleLog()
                        .range(['yellow', 'red'])
                        .domain(d3.extent(routes, d => d.airline_count));
    const widthScale = d3.scaleLinear()
                        .range([.1, 2])
                        .domain(colorScale.domain());
    const transparencyScale = d3.scaleLinear()
                        .range([.5, 1])
                        .domain(colorScale.domain());

    // Render the routes
    globe.selectAll("g.route")
         .data(routes.filter(k => k.source && k.target && k.airline_count > 1))
           .join("g")
           .attr("class","route")
           .append("path")
              .datum(makeLineString)  // Create a LineString feature GeoJSON with the routes (see function below)
                .attr("d", geoPath)
                .style("fill", 'none')
                .style("stroke-opacity", d => transparencyScale(d.properties.airline_count))
                .style("stroke", d => colorScale(d.properties.airline_count))
                .style('stroke-width', d => widthScale(d.properties.airline_count));

    // GEOJSON FEATURE FUNCTIONS
    // Make a GeoJSON LineString for each route, with the number of airlines as a property
    function makeLineString(d) {
        return {
            id: d.id,
            properties: {
                airline_count: d.airline_count
            },
            type: "LineString",
            coordinates: [
                    d.source.coordinates,
                    d.target.coordinates
            ]
        }
    }

    // Make a GeoJSON Point for each airport - this is better than placing circles with a transform,
    // because points are clipped at the edge of the globe (in an Orthographic projection, for example)
    function makePoint(d) {
        return {
            id: d.id,
            properties: {
                name: d.name,
                city: d.city
            },
            type: "Point",
            coordinates: d.coordinates
        }
    }

    // Change projection handler
    function changeProjection(evt) {
        projection = projections[+evt.target.value].p;
        geoPath.projection(projection);
        render();
    }

    // update the map after geoPath changes
    function render() {
        updateMap(geoPath, svg);
        globe.selectAll("g.airport, g.route")
             .selectAll("path")
             .attr('d', geoPath);
    }

    // Zooming functions (using versor drag)
    const state = {}
    function zoomStart(evt) {
        const mouse = projection.invert(d3.pointer(evt, globe));
        state.v0 = versor.cartesian(mouse);
        state.r0 = projection.rotate();
        state.q0 = versor(state.r0);
    }

    const scale = projection.scale();
    function zooming(evt) {
        projection.rotate(state.r0);
        const mouse = projection.invert(d3.pointer(evt, globe));
        const v1 = versor.cartesian(mouse);

        const mouseDelta = versor.delta(state.v0, v1);
        const q1 = versor.multiply(state.q0, mouseDelta)

        projection.rotate(versor.rotation(q1));
        projection.scale(scale * evt.transform.k);
        requestAnimationFrame(() => {
            render();
        });
    }
</script>
</body>
</html>
