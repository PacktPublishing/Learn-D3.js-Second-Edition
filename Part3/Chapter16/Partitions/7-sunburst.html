<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partition: sunburst chart</title>
    <style>
        text {
            font-family: 'Arial narrow', sans-serif;
            text-anchor: middle;
            fill: white;
        }
        path {
            stroke: white;
            stroke-width: 2px;
        }
    </style>
</head>
<body>
<h1>Partition: sunburst chart</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {cht, dim, chart, root} from "./js/treedata-json.js";

    chart.attr("transform", `translate(${[dim.width/2, dim.height/2]})`);

    root.sort((a,b) => d3.ascending(a.height, b.height))
        .sum(() => 1);    // counting nodes

    d3.partition().size([Math.PI * 2, cht.h * .6])(root);

    const nodes = root.descendants();

    const arc = d3.arc()
                  .startAngle(d => d.x0)
                  .endAngle(d => d.x1)
                  .innerRadius(d => d.y0)
                  .outerRadius(d => d.y1);

    const color = d3.scaleOrdinal(d3.schemeYlOrRd[6].slice(1));

    drawPartition();

    function drawPartition() {
        chart.selectAll("path")
            .data(nodes)
            .join("path")
                .attr("d", arc)
                .attr("fill", d => color(d.depth));
    }

    // To allow inspection in the browser console
    window.root = root;
</script>
</body>
</html>
