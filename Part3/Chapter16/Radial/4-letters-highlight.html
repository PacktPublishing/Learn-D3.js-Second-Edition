<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Radial network: circle diagram - using radial pathlinks</title>
    <style>
        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 20px;
            alignment-baseline: central;
            text-anchor: middle;
            fill: white;
            font-weight: bold;
            pointer-events: none;
        }
        .faded {
            opacity: .3;
        }
        .active {
            opacity: 1;
        }
    </style>
</head>
<body>
<h1>Radial network: circle diagram - using radial pathlinks</h1>
<p>This chart uses a custom layout generator available in the <code>js/network-utils.js</code> module.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as nwu from "../js/network-utils.js";

    const dim = {width: 600, height: 600, margin: 50};
    const chart = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height)
                    .append("g").attr("transform", `translate(${[dim.width/2, dim.height/2]})`);

    const color = d3.scaleOrdinal(d3.schemeCategory10);

    const edges = [
        {source: 0, target: 4, value: 3},
        {source: 4, target: 8, value: 3},
        {source: 8, target: 14, value: 3},
        {source: 14, target: 20, value: 3},
        {source: 0, target: 1, value: 1},
        {source: 1, target: 2, value: 1},
        {source: 2, target: 3, value: 1},
        {source: 3, target: 4, value: 1},
        {source: 4, target: 5, value: 1},
        {source: 5, target: 6, value: 1},
        {source: 6, target: 7, value: 1},
        {source: 7, target: 8, value: 1},
        {source: 8, target: 9, value: 1},
        {source: 9, target: 10, value: 1},
        {source: 10, target: 11, value: 1},
        {source: 11, target: 12, value: 1},
        {source: 12, target: 13, value: 1},
        {source: 13, target: 14, value: 1},
        {source: 14, target: 15, value: 1},
        {source: 15, target: 16, value: 1},
        {source: 16, target: 17, value: 1},
        {source: 17, target: 18, value: 1},
        {source: 18, target: 19, value: 1},
        {source: 19, target: 20, value: 1},
        {source: 20, target: 21, value: 1},
        {source: 21, target: 22, value: 1},
        {source: 22, target: 23, value: 1},
        {source: 23, target: 24, value: 1},
        {source: 24, target: 25, value: 1},
        {source: 16, target: 15, value: 2},
        {source: 17, target: 16, value: 2},
        {source: 18, target: 17, value: 2},
        {source: 19, target: 18, value: 2}
    ];

    const nodes = [
        {node: 'A', value: 79},
        {node: 'B', value: 15},
        {node: 'C', value: 24},
        {node: 'D', value: 44},
        {node: 'E', value: 125},
        {node: 'F', value: 22},
        {node: 'G', value: 20},
        {node: 'H', value: 64},
        {node: 'I', value: 69},
        {node: 'J', value: 2},
        {node: 'K', value: 8},
        {node: 'L', value: 40},
        {node: 'M', value: 26},
        {node: 'N', value: 69},
        {node: 'O', value: 77},
        {node: 'P', value: 17},
        {node: 'Q', value: 1},
        {node: 'R', value: 58},
        {node: 'S', value: 63},
        {node: 'T', value: 91},
        {node: 'U', value: 29},
        {node: 'V', value: 10},
        {node: 'W', value: 23},
        {node: 'X', value: 2},
        {node: 'Y', value: 20},
        {node: 'Z', value: 1},
    ];

    const circleLayout = nwu.circleDiagram()
                            .size([dim.width - dim.margin, dim.height - dim.margin]);

    const data = circleLayout(nodes, edges);

    color.domain([0, d3.max(edges, d => d.value)]);

    const widthScale = d3.scaleLinear()
                         .range([2,10])
                         .domain([0, d3.max(edges, d => d.value)]);

    const radialLink = d3.linkRadial().angle(d => d.angle).radius(d => d.radius);

    chart.selectAll("path")
         .data(data.links())
            .join("path")
                .attr("d", radialLink)
                .style("stroke-width", d => widthScale(d.value))
                .style("stroke", d => color(d.source.index))
                .style("stroke-opacity", .3)
                .style("fill", 'none');

    chart.selectAll("g.node")
         .data(data.nodes())
            .join("g")
                .attr("class", "node")
                .attr("transform", d => `translate(${d3.pointRadial(d.angle, d.radius)})`)
                .each(function(d) {
                    d3.select(this).append("circle")
                        .attr("r", 15)
                        .style("fill", color(d.index))
                    d3.select(this).append("text")
                        .text(d.node);
        });

    d3.selectAll("g.node")
        .on("mouseover", highlight)
        .on("mouseout", () => d3.selectAll("path, circle").classed('faded', false));

    function highlight(evt, d) {
        d3.selectAll("path")
            .classed('faded', s => !(s.source === d || s.target === d));
        d3.selectAll("circle")
            .classed('faded', n => !(n === d || n.sources.filter(s => s.target === d).length > 0
                                             || n.targets.filter(s => s.source === d).length > 0));
    }
</script>
</body>
</html>
