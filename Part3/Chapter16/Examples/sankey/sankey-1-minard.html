<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Yanone+Kaffeesatz">
    <style>
        text {
            font-family: 'Yanone Kaffeesatz', sans-serif;
            alignment-baseline: hanging;
            text-anchor: middle;
            fill: black;
        }
        .node rect { /* increase clickable area for dragging */
            stroke-width: 20px;
            stroke: transparent;
        }
        svg {
            border: solid 1px #ccc;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as d3x from "https://cdn.skypack.dev/d3-sankey@0";
    import * as ui from "./js/sankey-interactive.js";

    const width = 3900;
    const height = 1500;
    const margin = 50;

    const color = d3.scaleSequential(d3.interpolateCool);

    const nodeSet = new Set();
    let nodes = [];
    const links = [];

    ui.sankey.nodeWidth(10)
             .nodePadding(600)
             .extent([[margin,margin], [width-margin, height-margin]])
             .nodeAlign(d3x.sankeyJustify)
             .iterations(20);

    let graph = [];

    d3.csv("../../data/minard-steps.csv", function(row) {
        nodeSet.add(row.from);
        nodeSet.add(row.to);
        return row;
    }).then(function(rows) {
        const nodes = Array.from(nodeSet).map(d => ({node: d}));

        rows.forEach(function(row) {
            const obj = {
                value: +row.survivors,
                direction: +row.direction,
                target: nodes.map(n => n.node).indexOf(row.to),
                source: nodes.map(n => n.node).indexOf(row.from)
            }
            links.push(obj);
        });

        color.domain([0, nodes.length]);

        ui.sankey.nodes(nodes).links(links)

        ui.sankey.graph = ui.sankey();

        draw();
    });

    function draw() {
        const svg = d3.select("body")
                .append("svg")
                .attr("width",1200)
                .attr("height",300)
                .attr('viewBox','0 0 4000 1000');
        const chart = svg.append("g").attr("class", '.chart');

        chart.selectAll('path.link')
                .data(ui.sankey.graph.links)
                .enter()
                .append("path").attr("class","link")
                .attr("d", d3x.sankeyLinkHorizontal())
                .style("stroke", 'red')
                .style("opacity", .3)
                .style("stroke-width", d => d.width)
                .style("stroke", (d,i) => d.target.node === 'Dead' ? d3.rgb(color(d.source.index)).darker(.75) : d.direction > 0 ? "#c97b20" : "#252523")
                .style("fill", 'none');

        chart.selectAll('g.node')
                .data(ui.sankey.graph.nodes)
                .enter()
                .append("g").attr("class",'node')
                .attr("transform", d => `translate(${[d.x0, d.y0]})`)
                .each(function(d, i) {
                    d3.select(this)
                        .append("rect")
                        .attr("width", d.node === 'Kovno' || d.node === 'Moscow' || d.node === 'Dead' || d.node === 'Survived' ? 20 : d.x1 - d.x0)
                        .attr("height", d.y1 - d.y0)
                        .style("fill", d.node === 'Dead' || d.node === 'Survived' ? 'blue' : d3.rgb(color(i)).darker(.75));

                    d3.select(this)
                        .append("text").attr("class",'places')
                        .attr("x", (d.x1 - d.x0)/2)
                        .attr("y", (d.y1 - d.y0)/2 + 40)
                        .attr("transform",`rotate(${-90},${[(d.x1 - d.x0)/2,(d.y1 - d.y0)/2]})`)
                        .style("font-size", d.node === 'Kovno' || d.node === 'Moscow' || d.node === 'Dead' || d.node === 'Survived' ? 60 : 40)
                        .style("opacity", d.node.length > 3 ? 1 : 0)
                        .text(d.node);

                    d3.select(this)
                        .append("text").attr("class",'survivors')
                        .attr("x", (d.x1 - d.x0)/2)
                        .attr("y", (d.y1 - d.y0)/2 + ((d.node === 'Kovno' || d.node === 'Moscow' || d.node === 'Dead' || d.node === 'Survived') ? 20 : 10))
                        .attr("transform", `rotate(${-90},${[(d.x1 - d.x0)/2,(d.y1 - d.y0)/2]})`)
                        .style("font-size", 24)
                        .text(d.value);
                })
                .call(d3.drag()
                        .on('start', ui.dragStart)
                        .on('drag', ui.dragging)
                        .on('end', ui.dragEnd)
                );

    }

</script>
</body>
</html>
