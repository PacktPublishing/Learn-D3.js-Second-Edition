<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Yanone+Kaffeesatz">
    <style>
        text {
            font-family: 'Yanone Kaffeesatz', sans-serif;
            font-size: 10px;
            alignment-baseline: middle;
            text-anchor: middle;
            fill: black;
            pointer-events: none;
        }
        .faded {
            opacity: .5;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as d3x from "https://cdn.skypack.dev/d3-sankey@0";
    import * as ui from "./js/sankey-interactive.js";

    const width = 1200;
    const height = 600;
    const margin = 100;

    //const color = d3.scaleOrdinal(d3.schemeCategory10);
    const color = d3.scaleSequential(d3.interpolateRainbow);

    const links = [];

    const svg = d3.select("body").append("svg").attr("width",1200).attr("height",600).attr("viewBox", "0 0 1200 600");

    ui.sankey.nodePadding(19)
            .nodeWidth(70)
            .extent([[margin/2, margin/2], [width-margin, height-margin]])
            .nodeAlign(d3x.sankeyJustify)
            .nodeId(d => d.Id)
            .iterations(500);

    let graph = [];

    d3.csv("../../data/EuropeUSSR_1990_2010_nodes.csv", function(row) {
        if(row.Containers.length > 0 &&  row.Id != 'WB') { // don' include West berlin
            const groups = row.Containers.split('|');
            groups.forEach(function(group) {
                const link = {}
                if(group == 'DEU' || group.indexOf('EU') == 0) { // join
                    link.target = group;
                    link.source = row.Id;
                } else { // split
                    link.target = row.Id;
                    link.source = group;
                }
                if(row.Unit == 1) {
                    link.value = 1;
                }
                links.push(link);
            });
        } else if(+row.Unit == 1) {
            return undefined;
        }
        return row;
    }).then(function(nodes) {
        links.forEach(function(link) {
            link.value  = computeValue(links, link);
        });

        color.domain([0, nodes.length].reverse());

        ui.sankey.graph = ui.sankey({nodes: nodes, links: links});

        draw();
    });

    function computeValue(links, link) {
        if (link.value > 0) {
            return link.value;
        } else {
            const children = links.filter(k => k.target == link.source || k.source == link.target);
            let total = 0;
            children.forEach(function(d) {
                total += computeValue(children, d);
            });
            return total;
        }
    }

    function draw() {
        const chart = svg.append("g");

        chart.selectAll('path.link')
            .data(ui.sankey.graph.links)
            .enter()
            .append("path").attr("class", "link")
            .attr("d", d3x.sankeyLinkHorizontal())
            .style("stroke-opacity", .5)
            .style("stroke-width", d => d.width)
            .style("stroke", d => d.target.Id.indexOf('EU') == 0 || d.target.Id == 'DEU' ? color(d.source.index) : color(d.target.index))
            .style("fill", 'none')
            .on("mouseover", ui.highlightPath)
            .on("mouseout", ui.sfade);

        chart.selectAll('g.node')
            .data(ui.sankey.graph.nodes)
            .enter()
            .append("g").attr("class", 'node')
                .attr("transform", d => `translate(${[d.x0,d.y0]})`)
                .each(function(d,i) {
                    d3.select(this).append("rect")
                        .attr("y", function() {
                            if(d.y1 - d.y0 < 12) {
                                return (d.y1 - d.y0)/2 - 5;
                            }
                            return 0;
                        })
                        .attr("width", d.x1 - d.x0)
                        .attr("height", function() {
                            if(d.y1 - d.y0 < 12) {
                                return 10;
                            }
                            return d.y1 - d.y0;
                        })
                        .attr("rx", d.y1 - d.y0 < 4?10:0).attr("ry", d => d.y1 - d.y0 < 4?5:0)
                        .style("fill", d3.rgb(color(i)).darker(.5))
                        .style('fill-opacity', .8)

                d3.select(this).append("text")
                        .attr("x", (d.x1 - d.x0)/2)
                        .attr("y", (d.y1 - d.y0)/2 + 1)
                        .attr("transform", function() {
                            if(d.y1 - d.y0 > 60) {
                                return `rotate(-90,${[(d.x1 - d.x0)/2, (d.y1 - d.y0)/2 + 2]})`;
                            }
                        })
                        .text(d.Country)
                        .style("fill", contrast(d3.rgb(color(i)).darker(.5)));
            })
            .on("mouseover", ui.highlightNode)
            .on("mouseout", ui.fade)
            .call(d3.drag()
                    .on('start', ui.dragStart)
                    .on('drag', ui.dragging)
                    .on('end', ui.dragEnd)
            );
    }

    function contrast(color) {
        const c = d3.rgb(color);
        return (c.r * 0.299 + c.g * 0.587 + c.b * 0.114) > 120 ? '#333' : 'lightyellow';
    }
 </script>

</body>
</html>
