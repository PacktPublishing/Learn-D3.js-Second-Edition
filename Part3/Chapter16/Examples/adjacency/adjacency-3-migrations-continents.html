<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Migrations between and within continents (UN data, 2024)</title>
    <style>
        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 12px;
            alignment-baseline: middle;
            text-anchor: middle;
        }
        .faded {
            opacity: .3;
        }
        .highlight {
            font-weight: bold;
            font-size: 150%;
        }
        .highlight rect {
            stroke-width: 1px;
        }
        text.node {
            pointer-events: none;
        }
        .tooltip text {
            font-size: 130%;
        }
    </style>
</head>
<body>
<h1>Migrations between and within continents (in millions)</h1>
<p>Move mouse over a cell for details. Source: United Nations Data (2024)</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as nwu from "../../js/network-utils.js";
    import {draw} from "./js/adjacency-countries.js";

    const dim = {width: 900, height: 900, margin: 250};

    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);
    export const chart = svg.append("g").attr("transform", `translate(${[dim.margin/2, dim.margin/2]})`);

    const migrationsFile = "../../data/migrations_2024.csv";
    const continentsFile = "../../data/un_population_continents_2025.csv"; // Load continent data

    // Creating map to retrieve continent names by code
    const continentMap = new Map();
    await d3.csv(continentsFile, function(row) {
        continentMap.set(row.Code, row.Continent);
    });
    const continents = [...new Set(continentMap.values())]; // Unique continents

    // Load migration data and assign values to continents
    const entries = await d3.csv(migrationsFile, function(row) {
       if(row.Origin === "Others" || row.Destination === "Others") {
           return null;
       }
       const destContinent = continentMap.get(row.DestCode);
       const origContinent = continentMap.get(row.OrigCode);
       return {
           source: origContinent,
           target: destContinent,
           value: +row.Immigrants, // Total migrants
       }
    });

    // group entries with same source and target, and sum the values to get the data per continent
    const groups = d3.rollups(entries, v => d3.sum(v, d => d.value), d => d.source, d => d.target);

    // Create nodes and calculate total in and out values for each continent
    const nodes = [... new Set(entries.map(d => d.source))]
        .map(n => ({node: n,
            totalIn: groups.filter(e => e.target === n)
                .reduce((sum, e) => sum + e.value, 0),
            totalOut: groups.filter(e => e.source === n)
                .reduce((sum, e) => sum + e.value, 0)}));

    // Create links from the grouped data
    const links = [];
    groups.forEach(function(item) {
        item[1].forEach(function(subItem) {
            links.push({source: item[0], target: subItem[0], value: subItem[1]});
        });
    });

    // Sort nodes by total in or out values
    nodes.sort((a,b) => d3.descending(Math.max(a.totalIn, a.totalOut), Math.max(b.totalIn, b.totalOut)));

    // Create adjacency matrix
    const matrixLayout = nwu.adjacencyMatrix().size([dim.width-dim.margin, dim.height-dim.margin]);

    // Prepare matrix data
    links.forEach(link => {
        link.source = nodes[nodes.map(n => n.node).indexOf(link.source)];
        link.target = nodes[nodes.map(n => n.node).indexOf(link.target)];
    });
    const matrix = nwu.linksToMatrix(nodes, links, true); // Alternative: using objects as IDs (true)

    // Generate the matrix layout
    const result = matrixLayout(nodes, matrix);

    // Coloring
    const color = d3.scaleSqrt().range(['lightyellow','red'])
                    .domain([0,d3.max(result, d => d.value)]);

    // Paint nodes with colors based on their values or white if no value
    result.forEach(item => item.color = item.value ? color(item.value) : 'white');

    draw(dim, chart, nodes, result);

</script>
</body>
</html>
