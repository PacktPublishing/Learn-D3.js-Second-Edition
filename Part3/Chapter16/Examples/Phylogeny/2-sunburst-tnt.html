<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunburst partition from tabular data</title>
    <style>
        svg {position: absolute; top: 0; left: 0;}
        text{font-family: 'Helvetica', sans-serif; font-size: 12px}
        path {stroke: white; stroke-width: 1}
        h1 {font-family: 'Helvetica', sans-serif; font-size: 30px; z-index: 1; position: absolute; top: 10px; left: 10px;}
    </style>
</head>
<body>
<h1>Sunburst: Headden/Campos (2015) phylogeny of pterosaurs</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {addRotateDrag} from "../../js/rotate-drag.js";
    import {parseTree} from "./js/phylotree.js";

    const dim = {width: 1100, height: 1000};
    const margin = {top: 100, right: 10, bottom: 300, left: 150};
    const cht = {w: dim.width - margin.left - margin.right, h: dim.height - margin.top - margin.bottom};

    const chart = d3.select("body").append("svg")
                    .attr("width", dim.width)
                    .attr("height", dim.height)
                    .style("font", "10px sans-serif")
                    .append("g")
                        .attr("transform", `translate(${dim.width/2}, ${dim.height/2})`);

    chart.append("circle")
         .attr("r", cht.h *.9)
         .attr("fill", "white")
         .style("cursor", "grab");

    // This phylogeny is provided as a TNT-style Newick string. The parseTree function converts it to a nested object.
    const data = "(Ornithosuchus_woodwardi ,(Herrerasaurus_ischigualastensis ,(Scleromochlus_taylori ,(Anurognathus_ammoni ,(Rhamphorhynchus_muensteri ,(Pterodactylus_antiquus ,(Nyctosaurus_gracilis ,((Pteranodon_longiceps ,((Tropeognathus_mesembrinus ,(Anhanguera_blittersdorffi ,Anhanguera_piscator ,Anhanguera_santanae )),(Ludodactylus_sibbicki ,Guidraco_venator ),(Nurhachius_ignaciobritoi ,Istiodactylus_latidens ))),((Banguela_oberlii ,(Dsungaripterus_weii ,Noripterus_parvus )),(((Azhdarcho_lancicollis ,Wellnhopterus_brevirostris ,Zhejiangopterus_linhaiensis ),(Chaoyangopterus_zhangi ,Shenzhoupterus_chaoyangensis )),(Vectidraco_daisymorrisae ,((Thalassodromeus_sethi ,Tupuxuara_leonardii ),((Tupandactylus_imperator ,Tapejara_wellnhoferi ),(Sinopterus_dongi ,Eopteranodon_lii ,(Huaxipterus_benxiensis ,Huaxiadraco_corollatus )))))))))))))))";

    const objData = parseTree(data);    // Parse the Newick string to a nested object (see phylotree.js)
    const root = d3.hierarchy(objData);

    root.sum(d => 1)  // number of nodes

    d3.partition().size([2 * Math.PI, 480])(root);

    draw(chart.append("g").attr("class", "partition"), root.descendants());
    d3.selectAll("g.slice").filter(d => !d.data.name || d.height === 0).lower();

    addRotateDrag(chart, dim, -169);

    function draw(g, data) {
        const colorScale = d3.scaleSequential(d3.interpolateYlGnBu)
                             .domain([30, -40]);

        const arc = d3.arc().startAngle(d => d.x0)
                            .endAngle(d => d.x1)
                            .innerRadius(d => d.y0)
                            .outerRadius(d => d.y1);
        const start = arc.startAngle();
        const end   = arc.endAngle();

        const cell = g.selectAll("g.slice")
                      .data(data)
                      .join("g")
                      .attr("class", "slice")
                      .style("pointer-events", "none");

        cell.append('path')
            .attr('d', arc)
            .attr("fill", d => d.height !== 0 ? colorScale(d.height) : 'orange');

        // get the arc that runs between the inner and outer radius of the path above
        const midArc = d3.arc()
                         .startAngle(d => d.x0 - 90 * Math.PI / 180)     // to fit all text
                         .endAngle(d => d.x1 + 90 * Math.PI / 180)
                         .innerRadius(d => (d.y0 + d.y1) / 2)
                         .outerRadius(d => (d.y0 + d.y1) / 2);

        cell.append('path')
            .attr('id', d => `${d.data.name}`)
            .attr('d', midArc)
            .style("fill", "none")
            .style("stroke", "none");

        cell.filter(d => d.height !== 0)
            .append("text")
            .attr("dy", 2)
            .append("textPath").attr("startOffset", "25%").attr("href", d => `#${d.data.name}`)
            .text(d => d.data.name)
            .style("text-anchor", "middle");

        cell.filter(d => d.height === 0)
            .append("text")
            .text(d => d.data.name.replace(/_/, " "))
            .style("text-anchor", "start")
            .attr("x", 15)
            .attr("transform", d =>
                    `translate(${arc.centroid(d)}) rotate(${(180/Math.PI * (start(d) + end(d))/2 - 90)})`)
            .style("pointer-events", "none")
            .style("alignment-baseline", "middle");
    }

    d3.select("svg").lower();

</script>

</body>
</html>
