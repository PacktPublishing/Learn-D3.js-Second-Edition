<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunburst partition from tabular data</title>
    <!-- Yannone Kaffeesatz fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Yanone+Kaffeesatz:200,400,700">
    <style>
        svg {position: absolute; top: 0; left: 0;}
        text{font-family: 'Arial', sans-serif; font-size: 10px}
        path {stroke: white; stroke-width: 1}
        h1 {font-family: 'Yanone Kaffeesatz', sans-serif; font-size: 30px; z-index: 1; position: absolute; top: 10px; left: 10px;}
    </style>
</head>
<body>
<h1>Sunburst: Kellner's phylogeny of pterosaurs</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {addRotateDrag} from "../../js/rotate-drag.js";

    const dim = {width: 1100, height: 1000};
    const margin = {top: 100, right: 10, bottom: 300, left: 150};
    const cht = {w: dim.width - margin.left - margin.right, h: dim.height - margin.top - margin.bottom};

    const chart = d3.select("body").append("svg")
                    .attr("width", dim.width)
                    .attr("height", dim.height)
                    .style("font", "10px sans-serif")
                    .append("g")
                        .attr("transform", `translate(${dim.width/2}, ${dim.height/2})`);

    chart.append("circle")
         .attr("r", cht.h *.9)
         .attr("fill", "white")
         .style("cursor", "grab");

    // This phylogeny is provided as a CSV file.
    const tabular = await d3.csv("../../data/Kellner.csv");

    const root = d3.stratify()
                   .id(d => d.node)
                   .parentId(d => d.parent)(tabular);

    //root.count();   // counts the number of leaf nodes - doesn't work well with this data
    root.sum(() => 1)  // number of nodes (best for this data)

    // Sorting by depth is not a good representation of the phylogeny
    // root.sort((a,b) => b.height - a.height || a.value - b.value);

    // Some adjustments to fit the labels better (before generating the partition layout)
    root.descendants().filter(d => d.data.name === "Germanodactylidae")[0].value = 4;
    root.descendants().filter(d => d.data.name === "Ctenochasmatidae")[0].value = 4;
    root.descendants().filter(d => d.data.name === "Campylognathoididae")[0].value = 6;
    root.descendants().filter(d => d.data.name === "Rhamphorhynchidae")[0].value = 5;

    // Generate the partition layout
    d3.partition().size([2 * Math.PI, 480])(root);

    draw(chart.append("g").attr("class", "partition"), root.descendants());
    d3.selectAll("g.slice").filter(d => !d.data.name || d.height === 0).lower();

    addRotateDrag(chart, dim, -169);

    function draw(g, data) {
        const colorScale = d3.scaleSequential(d3.interpolateYlGnBu)
                             .domain([30, -40]);

        const arc = d3.arc().startAngle(d => d.x0)
                            .endAngle(d => d.x1)
                            .innerRadius(d => d.y0)
                            .outerRadius(d => d.y1);
        const start = arc.startAngle();
        const end   = arc.endAngle();

        const cell = g.selectAll("g.slice")
                      .data(data)
                      .join("g")
                      .attr("class", "slice")
                      .style("pointer-events", "none");

        cell.append('path')
            .attr('d', arc)
            .attr("fill", d => d.height !== 0 ? colorScale(d.height) : 'orange');

        // get the arc that runs between the inner and outer radius of the path above
        const midArc = d3.arc()
                         .startAngle(d => d.x0 - 90 * Math.PI / 180)     // to fit all text
                         .endAngle(d => d.x1 + 90 * Math.PI / 180)
                         .innerRadius(d => (d.y0 + d.y1) / 2)
                         .outerRadius(d => (d.y0 + d.y1) / 2);

        cell.append('path')
            .attr('id', d => `${d.data.name}`)
            .attr('d', midArc)
            .style("fill", "none")
            .style("stroke", "none");

        cell.filter(d => d.height !== 0)
            .append("text")
            .attr("dy", 2)
            .append("textPath").attr("startOffset", "25%").attr("href", d => `#${d.data.name}`)
            .text(d => d.data.name)
            .style("text-anchor", "middle");

        cell.filter(d => d.height === 0)
            .append("text")
            .text(d => d.data.name)
            .style("text-anchor", "start")
            .attr("x", 15)
            .attr("transform", d =>
                    `translate(${arc.centroid(d)}) rotate(${(180/Math.PI * (start(d) + end(d))/2 - 90)})`)
            .style("pointer-events", "none")
            .style("alignment-baseline", "middle");
    }

    d3.select("svg").lower();

</script>

</body>
</html>
