<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chord layout - using data in node-link format - alphabet</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .faded {
            opacity: .2 !important;
        }
        .tooltip {
            pointer-events: none;
        }
        .tooltip text {
            font-weight: normal;
            text-anchor: start;
            alignment-baseline: baseline;
            fill: black;
        }
        text tspan {
            font-size: 80%
        }
    </style>
</head>
<body>
<h1>Chord layout - using data in node-link format - alphabet</h1>
<p>This example uses data in a node-link format (<code>{source, target, value}</code>) instead of a matrix.
    The data is converted to a matrix using a custom function from the <code>js/network-utils.js</code> module.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import * as nwu from "../js/network-utils.js";
    import {dim, color, draw} from "./js/chord-example.js";

    // DATA
    const edges = [
        {source: 0, target: 4, value: 3},
        {source: 4, target: 8, value: 3},
        {source: 8, target: 14, value: 3},
        {source: 14, target: 20, value: 3},
        {source: 0, target: 1, value: 1},
        {source: 1, target: 2, value: 1},
        {source: 2, target: 3, value: 1},
        {source: 3, target: 4, value: 1},
        {source: 4, target: 5, value: 1},
        {source: 5, target: 6, value: 1},
        {source: 6, target: 7, value: 1},
        {source: 7, target: 8, value: 1},
        {source: 8, target: 9, value: 1},
        {source: 9, target: 10, value: 1},
        {source: 10, target: 11, value: 1},
        {source: 11, target: 12, value: 1},
        {source: 12, target: 13, value: 1},
        {source: 13, target: 14, value: 1},
        {source: 14, target: 15, value: 1},
        {source: 15, target: 16, value: 1},
        {source: 16, target: 17, value: 1},
        {source: 17, target: 18, value: 1},
        {source: 18, target: 19, value: 1},
        {source: 19, target: 20, value: 1},
        {source: 20, target: 21, value: 1},
        {source: 21, target: 22, value: 1},
        {source: 22, target: 23, value: 1},
        {source: 23, target: 24, value: 1},
        {source: 24, target: 25, value: 1},
        {source: 16, target: 15, value: 2},
        {source: 17, target: 16, value: 2},
        {source: 18, target: 17, value: 2},
        {source: 19, target: 18, value: 2}
    ];

    // Value here (relative frequency) is not used
    const nodes = [
        {node: 'A', value: 79},
        {node: 'B', value: 15},
        {node: 'C', value: 24},
        {node: 'D', value: 44},
        {node: 'E', value: 125},
        {node: 'F', value: 22},
        {node: 'G', value: 20},
        {node: 'H', value: 64},
        {node: 'I', value: 69},
        {node: 'J', value: 2},
        {node: 'K', value: 8},
        {node: 'L', value: 40},
        {node: 'M', value: 26},
        {node: 'N', value: 69},
        {node: 'O', value: 77},
        {node: 'P', value: 17},
        {node: 'Q', value: 1},
        {node: 'R', value: 58},
        {node: 'S', value: 63},
        {node: 'T', value: 91},
        {node: 'U', value: 29},
        {node: 'V', value: 10},
        {node: 'W', value: 23},
        {node: 'X', value: 2},
        {node: 'Y', value: 20},
        {node: 'Z', value: 1},
    ];

    // Generate the data in matrix format from the node-link data (custom function in network-utils.js)
    // false = use indices, true = copy forward value if reverse links are missing (default will leave them as zero)
    const matrix = nwu.linksToMatrix(nodes.map(n => n.node), edges, false, true);

    color.domain([0, matrix.length]);

    console.log('matrix', matrix); // inspect the generated matrix in the console

    const chord = d3.chord()
                    .padAngle(.005)  // Too large a pad angle will cause the chords to overlap and vanish
                    .sortGroups((a,b) => d3.descending(a,b))
                    .sortSubgroups((a,b) => d3.descending(a,b));

    // Create the chords from the matrix data
    const chords = chord(matrix);

    // Create the ribbon generator
    const radius = dim.height / 2 - dim.margin;
    const ribbon = d3.ribbon().radius(radius);

    // The code was moved to the draw() function in js/chord-example.js to avoid duplication
    draw(chords, nodes.map(d => d.node), true); // chords, headers, true = will use interactive highlighting

</script>
</body>
</html>
