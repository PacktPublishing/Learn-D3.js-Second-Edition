<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chord layout - static chart using Canvas</title>
</head>
<body>
<h1>Chord layout - static chart using Canvas</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const dim = {width: 800, height: 800, margin: 120};

    // DATA
    const matrix = [
        [0,3,3,3,0,0,0,2,4],
        [3,0,5,0,0,0,0,0,0],
        [8,5,0,6,0,0,4,0,0],
        [9,0,8,0,9,0,0,0,0],
        [0,0,0,9,0,8,0,0,0],
        [0,0,0,0,9,0,7,8,0],
        [0,0,9,0,0,7,0,7,0],
        [3,0,0,0,0,8,6,0,7],
        [4,0,0,0,0,0,0,9,0]
    ];
    const headers = ['A','B','C','D','E','F','G','H','I'];

    const chord = d3.chord()
            .padAngle(.3)
            .sortGroups((a,b) => d3.descending(a,b))
            .sortSubgroups((a,b) => d3.descending(a,b));
    const chords = chord(matrix);

    const radius = dim.height/2 - dim.margin/2;

    const ribbon = d3.ribbon().radius(radius);

    const color = d3.scaleSequential(d3.interpolateRainbow).domain([0, matrix.length]);
    const arc = d3.arc()
                  .innerRadius(radius+2)
                  .outerRadius(radius+30);

    const canvas = d3.select("body")
                     .append("canvas")
                     .attr("width", dim.width)
                     .attr("height", dim.height);
    const ctx = canvas.node().getContext("2d");
    ctx.translate(dim.width/2 + dim.margin/4, dim.height/2 + dim.margin/4);

    ribbon.context(ctx);
    arc.context(ctx);

    chords.forEach(function(d) {
        ctx.save();

        ctx.globalAlpha = 0.5;
        ctx.fillStyle = color(d.source.index);

        ctx.beginPath();
        ribbon(d);
        ctx.fill();
        ctx.restore();
    });

    chords.groups.forEach(function(d) {
        ctx.save();

        ctx.fillStyle = color(d.index);

        ctx.beginPath();
        arc(d);
        ctx.fill();
        ctx.restore();
    });

    chords.groups.forEach(function(d) {
        ctx.save();

        ctx.fillStyle = "white";
        ctx.font = "bold 18px 'Arial Narrow', sans-serif";
        ctx.textAlign = "middle";
        ctx.textBaseline = "middle";

        ctx.translate(arc.centroid(d)[0], arc.centroid(d)[1]);
        ctx.rotate((arc.endAngle()(d) + arc.startAngle()(d))/2);

        ctx.fillText(headers[d.index], 0, 0)

        ctx.restore();
    });

</script>

</body>
</html>
