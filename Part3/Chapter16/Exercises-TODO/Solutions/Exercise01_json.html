<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise</title>
    <style>
        rect {
            stroke: white;
            stroke-width: 1;
        }
        text {
            font-family: 'Arial', sans-serif;
            font-size: 10px;
            alignment-baseline: hanging;
        }
    </style>
</head>
<body>
<h1>Exercise</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    // 1) Raw hierarchical data
    const nestedFile = "../../data/venue.json";
    const hierarchy = await d3.json(nestedFile);

    // 2) Generate d3.hierarchy object (generates depth, length, and methods)
    const root = d3.hierarchy(hierarchy);
    console.log("D3 hierarchy", root);

    // EXERCISE: The file contains a capacity column. Use that to create a partition proportional to the capacity of each venue.

    // 4) Calculate the sum of the values for each node (stored in standard value property)
    root.sum(d => d.capacity);
    root.descendants().forEach(d => d.capacity = d.value);

    // 5) Draw the partition as an icicle chart.
    draw(root);

    function draw(root) {
        // Set up the SVG and chart dimensions
        const dim = {width: 1000, height: 300};
        const margin = {top: 10, right: 10, bottom: 10, left: 10};
        const cht = {w: dim.width - margin.left - margin.right, h: dim.height - margin.top - margin.bottom};

        const chart = d3.select("body").append("svg")
            .attr("width", dim.width)
            .attr("height", dim.height)
            .style("font", "10px sans-serif")
            .append("g").attr("transform", `translate(${margin.left}, ${margin.top})`);

        // Create the partition layout and compute the positions of each node
        d3.partition().size([cht.w, cht.h])(root);

        const nodes = root.descendants();
        const color = d3.scaleOrdinal(d3.schemeGnBu[6].slice(1).reverse());

        // Draw the rectangles
        chart.selectAll("rect")
            .data(nodes)
            .join("rect")
            .attr("x", d => d.x0)
            .attr("y", d => d.y0)
            .attr("width", d => d.x1 - d.x0)
            .attr("height", d => d.y1 - d.y0)
            .style("fill", d => color(d.depth));

        // Add horizontal labels at top left of each node.
        chart.selectAll("text")
            .data(nodes)
            .join("text")
            .attr("x", d => d.x0 + 5)
            .attr("y", d => d.y0 + 5)
            .text(d => d.data.name)
            .style("font-size", "10px")
            .style("fill", d => d3.hsl(color(d.depth)).l > 0.5 ? "black" : "white");

        // Fit labels inside nodes if possible, otherwise rotate or remove them.
        chart.selectAll("text").nodes()
            .forEach((textNode, i) => {
                const d = nodes[i];
                const width = d.x1 - d.x0, height = d.y1 - d.y0;
                const bbox = textNode.getBBox();
                if (bbox.width > width) { // doesnt fit - try to rotate
                    d3.select(textNode)
                        .attr("transform", `rotate(90, ${d.x0 + 5}, ${d.y0 + 5})`);
                    const rotatedBbox = textNode.getBBox();
                    if (rotatedBbox.width > height || rotatedBbox.width > width) {   // still doesn't fit - remove
                        d3.select(textNode).remove();
                    }
                }});
    }
</script>
</body>
</html>
