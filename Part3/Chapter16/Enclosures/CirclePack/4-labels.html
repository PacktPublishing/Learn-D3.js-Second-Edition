<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circle pack enclosure: labels</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<h1>Circle pack enclosure: labels</h1>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {cht, chart, root} from "./js/treedata-json.js";

    // Must configure either sum() or count()
    root.sort((a,b) => d3.descending(a.height, b.height) || d3.ascending(a.value, b.value))
        .sum(d => d.weight*d.weight);

    const color = d3.scaleOrdinal(d3.schemeObservable10)
                    .domain(d3.extent(root, n => n.height));

    d3.pack().size([cht.w, cht.h])(root);

    draw(root.descendants());

    function draw(nodes) {
        chart.selectAll("g")
             .data(nodes)
                .join("g")
                .attr("transform", d => `translate(${[d.x, d.y]})`)
                .each(function(d) {
                    const cell = d3.select(this);
                    cell.append("circle")
                        .attr("r", d.r)
                        .style("fill", color(d.height));
                    cell.append("text")
                        .text(d.data.id)
                        .attr("y", d.height === 0 ? 3 : -d.r + 16) // places in center if leaf
                        .style("opacity", d.r > 12 ? 1 : 0); // don't show labels for small circles
                    });
    }

    // To allow inspection in the browser console
    window.root = root;
</script>
</body>
</html>
