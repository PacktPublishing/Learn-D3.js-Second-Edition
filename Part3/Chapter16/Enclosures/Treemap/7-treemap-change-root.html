<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive treemap</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<h1>Interactive treemap</h1>
<p>Click to change root. Click again to reset.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    import {cht, chart, root} from "./js/treedata-json.js";

    root.sort((a,b) => d3.descending(a.height, b.height) )
        .sum(d => d.weight);

    const treemap = d3.treemap()
                      .size([cht.w, cht.h])
                      .paddingInner(2)
                      .paddingOuter(5)
                      .paddingTop(40);
    treemap(root);

    const colorScale = d3.scaleOrdinal(d3.schemeCategory10)
                         .domain(d3.extent(root.descendants(), n => n.height));
    const fontScale = d3.scaleLinear()
                        .domain(d3.extent(root.descendants(), d => d.depth).reverse())
                        .range([14,35]);

    draw(root);

    function draw(currentRoot) {
        chart.selectAll("g.node")
             .data(currentRoot, d => d.data.id)
                .join(enter => appendNodes(enter), update => update, exit => exit.remove())
                    .attr("transform", d => `translate(${[d.x0, d.y0]})`)
                    .on("click", (evt, d) => changeRoot(currentRoot, d))
                    .each(function(d) { updateNodes(d3.select(this), d); });
    }

    function appendNodes(enter) {
        return enter.append("g").attr("class", "node")
            .each(function() {
                d3.select(this).append("rect");
                d3.select(this).append("text").style("pointer-events", "none")
            });
    }

    function updateNodes(node, d) {
        node.select("rect")
            .attr("width", d.x1 - d.x0).attr("height", d.y1 - d.y0)
            .attr("fill", colorScale(d.height));
        node.select("text")
            .style("alignment-baseline", d.children ? "hanging" : "middle")
            .attr("x", (d.x1 - d.x0) / 2)
            .attr("y", d.children ? 10 : (d.y1 - d.y0 + 5)/2)
            .text(d.x1 - d.x0 > 50 ? d.data.id : '')
            .style("font-size", d => fontScale(d.depth));
    }

    function changeRoot(currentRoot, target) {
        if (!target) return;
        if (target === currentRoot) { // click on current root resets to global root
            draw(root);
            return;
        }

        // copy subtree at clicked node, recompute the treemap and redraw
        const subtree = target.copy();
        treemap(subtree);
        draw(subtree);
    }

    // To allow inspection in the browser console
    window.root = root;
</script>
</body>
</html>
