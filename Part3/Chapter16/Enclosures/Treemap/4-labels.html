<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Treemap with labels</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<h1>Treemap with labels</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {cht, chart, root} from "./js/treedata-json.js";

    root.sort((a,b) => d3.descending(a.height, b.height) )
        .sum(d => d.weight);

    const treemap = d3.treemap()
                      .size([cht.w, cht.h])
                      .paddingInner(2)
                      .paddingOuter(d => d.children.length === 1 ? 3 : 5)
                      .paddingTop(40);
    treemap(root);

    const nodes = root.descendants();

    const color = d3.scaleOrdinal(d3.schemeCategory10)
                         .domain(d3.extent(nodes, n => n.height));
    const font = d3.scaleLinear()
                        .domain(d3.extent(root.descendants(), d => d.depth).reverse())
                        .range([16,40]);

    drawTreemap();
    drawLabels();

    function drawTreemap() {
        chart.selectAll("rect")
             .data(nodes)
                .join("rect")
                    .attr("x", d => d.x0)
                    .attr("y", d => d.y0)
                    .attr("width", d => d.x1 - d.x0)
                    .attr("height", d => d.y1 - d.y0)
                    .attr("fill", d => color(d.height));
    }

    function drawLabels() {
        const label = chart.selectAll("text")
             .data(nodes)
                .join("text")
                .attr("x", d => (d.x0 + d.x1) / 2)
                .attr("y", d => d.y0 + 48 - (d.depth + 4) * 4);

        label.append("tspan")
            .text(d => d.x1 - d.x0 > 20 ? d.data.id : '')
            .style("font-size", d => d.x1 - d.x0 > 30 ? font(d.depth) : '12px');
        label.append("tspan")
            .attr("dy", "1.2em")
            .attr("x", d => (d.x0 + d.x1) / 2)
            .text(d => !d.children && d.x1 - d.x0 > 20 ? d.data.weight : '');
    }

    // To allow inspection in the browser console
    window.root = root;
</script>
</body>
</html>
