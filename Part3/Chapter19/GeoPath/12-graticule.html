<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using graticules</title>
    <link rel="stylesheet" href="css/map.css">
    <style>
        svg {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<h1>Using graticules</h1>
<p>Graticules add context. Try this code in different projections. A graticule is a network of parallels and meridians.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as topojson from "https://cdn.skypack.dev/topojson-client@3"; // import the client library

    // 1) Load the TopoJSON file (inspect it!)
    const tjdata = await d3.json('../data/world/world-lowres.topojson');

    // 2) Discover the name of the object in the TopoJSON file that contains the features.
    //    Inspect the file to discover this name in the "objects" property.
    const key = "world";

    // 3) Convert to GeoJSON using the topojson-client library
    const data = topojson.feature(tjdata, tjdata.objects[key]);

    // The rest of the code is unchanged, since now data is in GeoJSON format.

    // An array with 10 cities, populations and their coordinates in the form [longitude, latitude].
    const cities = [
        {name: "New York", coordinates: [-74.006, 40.7128], population: 8336817},
        {name: "London", coordinates: [-0.1276, 51.5074], population: 8982000},
        {name: "Tokyo", coordinates: [139.6917, 35.6895], population: 13960000},
        {name: "Sydney", coordinates: [151.2093, -33.8688], population: 5312000},
        {name: "Cairo", coordinates: [31.2357, 30.0444], population: 10250000},
        {name: "Rio de Janeiro", coordinates: [-43.1729, -22.9068], population: 6211000},
        {name: "Moscow", coordinates: [37.6173, 55.7558], population: 13100000},
        {name: "Mexico City", coordinates: [-99.1332, 19.4326], population: 9200000},
        {name: "Beijing", coordinates: [116.4074, 39.9042], population: 21890000},
        {name: "Mumbai", coordinates: [72.8777, 19.076], population: 12440000},
        {name: "Lagos", coordinates: [3.3792, 6.5244], population: 15300000},
    ];

    // Set up the view
    const dim = {width: 960, height: 500};
    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);

    // Set up geoPath with Mercator
    let globe = false;
    let projection = d3.geoMercator();
    const geoPath = d3.geoPath().projection(projection);

    // Create a GeoJSON object for the cities.
    const geocities = {
        type: "FeatureCollection",
        features: cities.map(d => ({
            type: "Feature",
            geometry: {
                type: "Point",
                coordinates: d.coordinates
            },
            properties: {
                name: d.name
            }
        }))
    };

    // Click to try a different projection (orthographic)
    svg.on("click", function() {
        if(!globe) {
            projection = d3.geoOrthographic().rotate([20, -20, 0]);
        } else {
            projection = d3.geoMercator();
        }
        geoPath.projection(projection);

        // redraw the features and city groups with the new projection
        svg.selectAll("path").attr("d", geoPath);
        svg.selectAll("g.city text")
            .attr("transform", d => `translate(${geoPath.centroid(d)})`)
        globe = !globe; // Toggle the globe state
    });

    // Render the map
    svg.append("path")
        .datum({type: "Sphere"})
        .attr("d", geoPath)
        .style("fill", "lightblue")
        .style("stroke", "none");

    svg.selectAll("path.feature")
        .data(data.features)
        .join("path")
        .attr("class", "feature")
        .attr("d", geoPath)
        .style("stroke-width", .5).style("stroke", "blue");


    // Graticules - between the map and the text / cities

    // A basic graticule grid: every 10 degrees (same as d3.geoGraticule10() or d3.geoGraticule().step([10,10]))
    const graticule = d3.geoGraticule();

    svg.append("path").attr("class", "graticule")
       .datum(graticule()) // lines every 10 degrees
       .attr("d", geoPath);  // styles in CSS


    // Another graticule set, this time just containing the equator
    const equator = d3.geoGraticule().step([0,90]);

    svg.append("path").attr("class", "graticule equator")
        .datum(equator()) // lines every 10 degrees
        .attr("d", geoPath)
        .style("stroke", "orange")
        .style("stroke-width", "2px");

    // Using a geoCircle to draw the tropic of cancer (23.5 degrees from equator
    const tropicOfCancer = d3.geoCircle().center([0, 90]).radius(90 - 23.5);

    svg.append("path").attr("class", "graticule tropic cancer")
        .datum(tropicOfCancer())
        .attr("d", geoPath)
        .style("stroke", "red")
        .style("stroke-width", "2px");

    // Using a geoGraticule to draw the tropic of capricorn (-23.5 degrees)
    const tropicOfCapricorn = d3.geoGraticule()
                                .step([0,23.5]) // draw latitude lines every 23.5 degrees
                                .extent([[-180, -30], [180, 0]]);   // only draw between -30 and 0 degrees lat.

    svg.append("path").attr("class", "graticule tropic capricorn")
        .datum(tropicOfCapricorn())
        .attr("d", geoPath)
        .style("stroke", "purple")
        .style("stroke-width", "2px");



    // Place the cities on top of the graticules
    svg.selectAll("g.city")
        .data(geocities.features)
        .join("g").attr("class", "city")    // styles applied to .city path
        .each(function(d) {
            d3.select(this).append("path")
                .attr("d", geoPath.pointRadius(3)) // projection applied automatically when using geoPath
            d3.select(this).append("text").text(d.properties.name)
                .attr("y", -10)
                .attr("transform", `translate(${geoPath.centroid(d)})`) // project point centroid to screen coords
        });


</script>

</body>
</html>
