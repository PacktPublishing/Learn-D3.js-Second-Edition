<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using TopoJSON</title>
    <link rel="stylesheet" href="css/map.css">
    <style>
        svg {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<h1>Using TopoJSON</h1>
<p>Rendering a world map from a TopoJSON dataset that contains the same data as the GeoJSON dataset.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as topojson from "https://cdn.skypack.dev/topojson-client@3"; // import the client library

    // 1) Load the TopoJSON file (inspect it!)
    const tjdata = await d3.json('../data/world/world-lowres.topojson');

    // 2) Discover the name of the object in the TopoJSON file that contains the features.
    //    Inspect the file to discover this name in the "objects" property.
    const key = "world";

    // 3) Convert to GeoJSON using the topojson-client library
    const data = topojson.feature(tjdata, tjdata.objects[key]);

    // The rest of the code is unchanged, since now data is in GeoJSON format.

    const dim = {width: 960, height: 500};
    const svg = d3.select("body").append("svg")
            .attr("width", dim.width).attr("height", dim.height);

    const geoPath = d3.geoPath().projection(d3.geoMercator());

    svg.append("path")
        .datum({type: "Sphere"})
        .attr("d", geoPath)
        .style("fill", "lightblue")
        .style("stroke", "none");

    svg.selectAll("path.feature")
       .data(data.features)
         .join("path")
           .attr("class", "feature")
           .attr("d", geoPath)
           .style("fill", "green")
           .style("stroke", "black");

</script>

</body>
</html>
