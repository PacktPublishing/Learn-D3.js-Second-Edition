<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rendering in Canvas</title>
    <style>
        svg {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<h1>Rendering in Canvas</h1>
<p>Instead of using <code>d3.geoPath()</code> to generate an SVG path string and rendering
    the map in SVG, this time we initialize it with a Canvas context so that it will
    render the features using Canvas.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as topojson from "https://cdn.skypack.dev/topojson-client@3"; // import the client library

    const tjdata = await d3.json('../data/world/world-lowres.topojson');
    const key = "world";
    const data = topojson.feature(tjdata, tjdata.objects[key]);

    const dim = {width: 960, height: 500};

    // Obtain the Canvas context
    const canvas = d3.select("body").append("canvas")
                     .attr("width", dim.width).attr("height", dim.height);
    const context = canvas.node().getContext("2d");

    // Initialize the geoPath generator with the Canvas context.
    const geoPath = d3.geoPath()
                      .projection(d3.geoMercator())
                      .context(context);

    // Canvas code (compare it to the SVG code in 6-topojson.html)
    // Draw the background sphere
    context.beginPath();
    geoPath({type: "Sphere"});       // render the sphere to the canvas context
    context.fillStyle = "lightblue"; // set fill color
    context.fill(); // fill the sphere

    data.features.forEach(feature => {
        context.beginPath(); // start a new path for each feature
        geoPath(feature);    // render the feature to the canvas context
        context.fillStyle = "green";
        context.fill();
        context.strokeStyle = "black";
        context.stroke();
    });

</script>

</body>
</html>
