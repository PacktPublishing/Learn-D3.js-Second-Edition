<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rendering in Canvas</title>
    <link rel="stylesheet" href="css/map.css">
</head>
<body>
<h1>Rendering in Canvas</h1>
<p>Instead of using <code>d3.geoPath()</code> to generate an SVG path string and rendering
    the map in SVG, this time we initialize it with a Canvas context so that it will
    render the features using Canvas.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import * as topojson from "https://cdn.skypack.dev/topojson-client@3"; // import the client library

    const tjdata = await d3.json('../data/world/world-lowres.topojson');
    const key = "world";
    const data = topojson.feature(tjdata, tjdata.objects[key]);

    // An array with 10 cities, populations and their coordinates in the form [longitude, latitude].
    const cities = [
        {name: "New York", coordinates: [-74.006, 40.7128], population: 8336817},
        {name: "London", coordinates: [-0.1276, 51.5074], population: 8982000},
        {name: "Tokyo", coordinates: [139.6917, 35.6895], population: 13960000},
        {name: "Sydney", coordinates: [151.2093, -33.8688], population: 5312000},
        {name: "Cairo", coordinates: [31.2357, 30.0444], population: 10250000},
        {name: "Rio de Janeiro", coordinates: [-43.1729, -22.9068], population: 6211000},
        {name: "Moscow", coordinates: [37.6173, 55.7558], population: 13100000},
        {name: "Mexico City", coordinates: [-99.1332, 19.4326], population: 9200000},
        {name: "Beijing", coordinates: [116.4074, 39.9042], population: 21890000},
        {name: "Mumbai", coordinates: [72.8777, 19.076], population: 12440000},
        {name: "Lagos", coordinates: [3.3792, 6.5244], population: 15300000},
    ];

    const dim = {width: 960, height: 500};

    // Obtain the Canvas context
    const canvas = d3.select("body").append("canvas")
                     .attr("width", dim.width).attr("height", dim.height);
    const context = canvas.node().getContext("2d");

    // Initialize the geoPath generator with the Canvas context.
    let globe = false;
    let projection = d3.geoMercator();
    const geoPath = d3.geoPath()
                      .projection(projection)
                      .context(context)
                      .pointRadius(3); // set a default point radius for rendering points

    // Create a GeoJSON object for the cities.
    const geocities = {
        type: "FeatureCollection",
        features: cities.map(d => ({
            type: "Feature",
            geometry: {
                type: "Point",
                coordinates: d.coordinates
            },
            properties: {
                name: d.name
            }
        }))
    };

    redraw(); // Initial render

    // Click to try a different projection (orthographic)
    canvas.on("click", function() {
        if(!globe) {
            projection = d3.geoOrthographic().rotate([20, -20, 0]);
        } else {
            projection = d3.geoMercator();
        }
        geoPath.projection(projection);
        redraw();
        globe = !globe; // Toggle the globe state
    });

    // Render the map
    // Canvas code (compare it to the SVG code in 10-topojson.html)
    // Draw the background sphere
    function redraw() {
        context.fillStyle = "white";
        context.fillRect(0, 0, dim.width, dim.height); // clear the canvas

        context.beginPath();
        geoPath({type: "Sphere"});       // render the sphere to the canvas context
        context.fillStyle = "lightblue"; // set fill color
        context.fill(); // fill the sphere

        data.features.forEach(feature => {
            context.beginPath(); // start a new path for each feature
            geoPath(feature);    // render the feature to the canvas context
            context.fillStyle = "lightgreen";
            context.fill();
            context.lineWidth = 0.5;
            context.strokeStyle = "blue";
            context.stroke();
        });

        geocities.features.forEach(feature => {
            context.beginPath(); // start a new path for each feature
            geoPath(feature);    // render the feature to the canvas context
            context.fillStyle = "red";
            context.strokeStyle = "black";
            context.fill();
            context.stroke();

            context.textAlign = "center";
            context.fillStyle = "darkblue";
            context.font = "bold 12px sans-serif";
            context.fillText(feature.properties.name,
                geoPath.centroid(feature)[0],
                geoPath.centroid(feature)[1] - 10); // place the text above the circle
        });
    }
</script>

</body>
</html>
