<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotating Earth night and day (Canvas)</title>
    <link rel="stylesheet" href="css/animations.css">
    <style>
        canvas {background-color: black;}
        input[type="range"] {
            width: 750px;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
<h1>Rotating Earth night and day (Canvas)</h1>
<div id="rotate-controls">
    <p>Yaw (shadow) <input type="number" name="yaw" id="yaw" min="-180" max="180" step="1" value="0">
        Pitch <input type="number" name="pitch" id="pitch" min="-90" max="90" step="1" value="0">
        Roll <input type="number" name="roll" id="roll" min="-180" max="180" step="1" value="0">
    </p>
</div>
<div id="season"></div>
<p></p>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, loadTopoJSON, renderMap, updateMap, createProjectionSwitcher} from "../js/maps-canvas.js";
    import {createDateSwitcher} from "./js/animations.js";

    map.dim = {width: 960, height: 500};
    const file = "../data/world/world-medres.topojson";
    const key = "world";

    map.optimize = true;
    map.projection = d3.geoMercator();
    map.geoPath = d3.geoPath().projection(map.projection);
    map.rotation = [0, 0, 0];
    map.shadow = {feature: null}; // Shadow as a GeoJSON feature to be drawn after the base map
    map.yaw = {spin: 0, viewer: 0}; // spinYaw drives day/night progression (animation); userYaw is camera/view rotation.
    map.tilt = 23.5; // Earth's axial tilt is 23.5 degrees - shadow tilts from -23.5 to +23.5 during the year

    let currentDate = new Date();
    let currentDayOfYear = d3.utcDay.count(d3.utcYear(currentDate), currentDate);

    await loadTopoJSON(file, key);
    renderMap();
    map.onAfterDraw = drawShadow; // Draw shadow after each base-map redraw in Canvas

    // Interactive rotation
    d3.selectAll("#rotate-controls input")
        .on("change", evt => {
            map.yaw.viewer = +d3.select("#yaw").node().value;
            map.rotation[1] = +d3.select("#pitch").node().value;
            map.rotation[2] = +d3.select("#roll").node().value;
            redraw();
        });

    // Projection switcher
    createProjectionSwitcher((evt, projections) => {
        map.projection = projections[+evt.target.value].config;
        if(map.projection.name === "Orthographic" || map.projection.name === "Gnomonic") {
            map.projection.config.fitExtent([[0,25],[map.dim.width, map.dim.height-25]], {type: 'Sphere'});
        }
        map.geoPath.projection(map.projection);
        redraw();
    });

    // Date switcher
    createDateSwitcher(currentDate, currentDayOfYear, dayOfYear => {
        currentDayOfYear = dayOfYear;
        redraw();
    });

    // Animation
    d3.interval(() => {
        map.yaw.spin = (map.yaw.spin + 1) % 360;
        redraw();
    }, 60);

    // FUNCTIONS
    function redraw() {
        map.rotation[0] = map.yaw.spin + map.yaw.viewer;
        map.projection.rotate(map.rotation);
        updateShadow(currentDayOfYear);
        updateMap(); // see ../js/maps-canvas.js
    }

    // Get tilt angle for day of year (23.5 degree tilt and March equinox at day 80).)
    function getTilt(dayOfYear) {
        return -map.tilt * Math.sin(2 * Math.PI * (dayOfYear - 80) / 365);
    }

    function updateShadow(dayOfYear) {
        const centerLon = -90 - map.yaw.spin;
        map.shadow.feature = d3.geoCircle().center([centerLon, getTilt(dayOfYear)])();
        d3.select(".shadow")
            .datum(map.shadow.feature)
            .attr('d', map.geoPath);
    }

    function drawShadow(ctx) {
        if (!map.shadow.feature) return;

        ctx.save();
        ctx.filter = "blur(5px)";
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.beginPath();
        map.geoPath(map.shadow.feature);
        ctx.fill();
        ctx.restore();
    }
</script>

</body>
</html>
