<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotating Earth night and day</title>
    <link rel="stylesheet" href="css/animations.css">
    <style>
        svg {background-color:black;}
        .background {fill: slategray;}
    </style>
</head>
<body>
<h1>Rotating Earth night and day</h1>
<div id="season"></div>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, loadTopoJSON, renderMap, updateMap, createProjectionSwitcher} from "../js/maps.js";

    map.dim = {width: 960, height: 500};
    const file = "../data/world/world-medres.topojson";
    const key  = "world";

    map.optimize = true;
    map.projection = d3.geoMercator();
    map.geoPath = d3.geoPath().projection(map.projection);

    const tilt = 23.5; // Earth's axial tilt is 23.5 degrees
    const tiltBySeason = [tilt, 0, -tilt];
    let currentSeason = 0; // Equinox by default
    let updateShadow = () => {};

    loadTopoJSON(file, key).then(() => {
        renderMap();
        map.view.append("defs").append("filter")
            .attr("id","blur")
            .append("feGaussianBlur")
            .attr("in", "SourceGraphic")
            .attr("stdDeviation", 5);

        const shadowPath = map.view.append("path").attr("class","shadow")
                .attr("filter", "url(#blur)")
                .style("fill", "rgb(0,0,0,.7)");

        updateShadow = function(season) {
            const yaw = map.projection.rotate()[0];
            const centerLon = -90 - yaw;
            shadowPath
                .datum(d3.geoCircle().center([centerLon, tiltBySeason[season]])())
                .attr('d', map.geoPath);
        };
        updateShadow(currentSeason);

        let i = 0;
        d3.interval(function() {
            if(i === 180) i = -180;
            map.projection.rotate([i++, map.projection.rotate()[1], map.projection.rotate()[2]])
            map.view.selectAll("path.mesh, .merged, .graticule").attr('d', map.geoPath)
            updateShadow(currentSeason);
        }, 120);

    });

    createProjectionSwitcher((evt, projections) => {
        map.projection = projections[+evt.target.value].config;
        if(map.projection.name === "Orthographic" || map.projection.name === "Gnomonic") {
            map.projection.config.fitExtent([[0,0+25],[map.dim.width, map.dim.height-25]], {type: 'Sphere'})
                .rotate([0, -tilt, 0]);
        }
        map.geoPath.projection(map.projection);
        updateMap(null, 0);
        updateShadow(currentSeason);
    });

    createSeasonSwitcher(evt => {
        currentSeason = +evt.target.value;
        updateShadow(currentSeason);
    });

    function createSeasonSwitcher(callback) {
        const form = d3.select("#season")
                       .append("form").attr("id", "season");
        ["December solstice", "Equinox", "June solstice"].forEach((season,i) => {
            const entry = form.append("label")
            entry.append("input")
                .attr("type", "radio")
                .attr("name", "season")
                .attr("value", i)
                .property("checked", i === 0)
                .on("change", evt => { callback(evt); updateMap() });
            entry.append("span")
                .html(season + '&nbsp;&nbsp;&nbsp;');
        })
    }
</script>

</body>
</html>
