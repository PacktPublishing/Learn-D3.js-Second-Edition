<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earth rotating on all axes at the same speed</title>
    <link rel="stylesheet" href="css/animations.css">
    <style>
        svg {background-color:black;}
    </style>
</head>
<body>
<h1>Earth rotating on all axes at the same speed</h1>
<p>Animating all angles in <code>projection.rotate([yaw, pitch, roll])</code>
to make the globe rotate on all three axes.</p>
<script type="module">
    import * as d3_all from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, loadTopoJSON, renderMap, updateMap, createProjectionSwitcher} from "../js/maps.js";

    map.dim = {width: 960, height: 500};
    const file = "../data/world/world-medres.topojson";
    const key  = "world";
    map.projection = d3.geoMercator();
    map.geoPath = d3.geoPath().projection(map.projection);
    map.optimize = true;
    map.rotation = [0, 0, 0];

    loadTopoJSON(file, key).then(() => {
        renderMap(map.view);
        createProjectionSwitcher((evt, projections) => {
            map.projection = projections[+evt.target.value].config;
            map.projection.rotate(map.rotation); // Apply current rotation
            map.geoPath.projection(map.projection);
            updateMap();
        });

        const degreesPerSecond = 1000 / 60; // 1 degree every 60ms
        const initialRotation = [...map.rotation];

        d3.timer((elapsed) => {
            const angle = (elapsed * degreesPerSecond) / 1000;
            map.rotation[0] = (initialRotation[0] + angle) % 360;
            map.rotation[1] = (initialRotation[1] + angle) % 360;
            map.rotation[2] = (initialRotation[2] + angle) % 360;
            map.projection.rotate(map.rotation);
            map.view.selectAll("path").attr("d", map.geoPath);
        });
    });
</script>
</body>
</html>
