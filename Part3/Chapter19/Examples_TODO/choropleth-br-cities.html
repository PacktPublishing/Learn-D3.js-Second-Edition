<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choropleth 1</title>
    <style>
        .region {
            fill: white;
            stroke: white;
            stroke-width: .05;
        }
        text {
            font-family: sans-serif;
            font-size: 20px;
            fill: gray;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    // For data processing in a separate thread
    const worker = new Worker('./js/choropleth-worker.js');

    const width = 960;
    const height = 500;

    const dataFolder = '../data/brazil/';
    const dataFiles = new Map([
        ["shapes", dataFolder + "municipios_br.geojson"],
        ["deaths", dataFolder + "municipios_mortes_acidentes_transito_2016.csv"],
        ["population", dataFolder + "municipios_populacao_2016.csv"]
    ]);

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);
    svg.append("text")
            .attr("class", "loading")
            .attr("x", width/2)
            .attr("y", height/2)
            .attr("text-anchor", "middle")
            .call(flashLoading);

    function flashLoading() {
        let dots = 0;
        const timer = d3.interval(() => {
            const text = svg.select("text.loading");
            if (text.empty()) {
                timer.stop();
                return;
            }
            dots++;
            text.text("Loading " + ".".repeat(dots));
        }, 100);
    }

    // choose a projection
    const projection = d3.geoMercator();

    // create a path generator function for the projection
    const geoPath = d3.geoPath()
            .projection(projection)

    const colorScale = d3.scaleSqrt(["hsla(240,100%,50%,.1)", "red"]);

    const map = {};

    Promise.all([
        d3.json(dataFiles.get("shapes")),
        d3.csv(dataFiles.get("deaths"), function(row) {
            return {
                cod_ibge: +row.cod_ibge.substring(0,6),
                deaths: +row.obitos
            }
        }),
        d3.csv(dataFiles.get("population"), function(row) {
            return {
                cod_ibge: +row.cod_ibge.substring(0,6),
                population: +row.populacao
            }
        })
    ]).then(function([shapes, deaths, population]) {

        console.log(shapes);   // shape data
        console.log(deaths); // death data
        console.log(population); // population data

        // Using a web-worker to do the data processing in a separate thread, so that the UI doesn't freeze
        worker.postMessage({ shapes, deaths, population });
        worker.onmessage = function(e) {
            map.features = e.data.features;  // save in a global context
            projection.fitSize([width, height], { type: 'FeatureCollection', features: map.features });
            colorScale.domain([0, d3.max(map.features, d => d.properties.deathsPerHab)]);
            draw();
            svg.selectAll("text.loading").remove();
        };
    }).catch(function(error) {
        svg.select("text.loading").text("Error loading data");
        console.log(error);
    });

    function draw() {
        svg.selectAll("path.region")
                .data(map.features)
                .join("path")
                .attr("class","region")
                .attr('d', geoPath)
                .style("fill", d => colorScale(d.properties.deathsPerHab))
    }
</script>

</body>
</html>
