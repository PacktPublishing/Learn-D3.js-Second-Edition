<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Making a choropleth</title>
    <link rel="stylesheet" href="css/map.css"> <!-- styles were moved to separate file for cleaner code -->
    <style>
        .feature {
            stroke: darkslategray;
            stroke-width: .7px;
        }
    </style>
</head>
<body>
<h1>Making a choropleth</h1>
<p>Using data contained in the properties of each feature to create a chart that compares country populations.
    The GeoJSON file contains a property called <code>pop</code> that contains the population of each country in 2016.
    You can access it from each feature as <code>d.properties.pop</code>.
</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const data = await d3.json('../data/world/world-lowres.geojson');
    const dim = {width: 960, height: 500};
    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);

    const geoPath = d3.geoPath().projection(d3.geoMercator());

    // Create an exponential scale to make the differences in population more visible.
    const color = d3.scaleSequentialPow(d3.interpolateOranges).exponent(0.25)
                    .domain(d3.extent(data.features, d => d.properties.pop));

    drawMap(svg, data, geoPath); // we put the map in a function to make the code cleaner.

    // FUNCTIONS
    function drawFeatures(view, data, geoPath) {
        view.selectAll("path.feature")
            .data(data.features)
            .join("path")
            .attr("class", "feature")
            .attr("d", geoPath)
            .style("fill", d => color(d.properties.pop)) // use the color scale to set the fill color based on population;
    }

    function drawMap(view, data, geoPath) {
        view.append("path").attr("class", "background") // styles were moved to CSS for cleaner code
            .datum({type: "Sphere"})
            .attr("d", geoPath);

        drawFeatures(view, data, geoPath);

        view.append("path").attr("class", "graticule")
            .datum(d3.geoGraticule())
            .attr("d", geoPath);
    }

</script>

</body>
</html>
