<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Making a multi-theme choropleth</title>
    <link rel="stylesheet" href="css/map.css"> <!-- styles were moved to separate file for cleaner code -->
    <style>
        .graticule {
            fill: none;
            stroke: lightgray;
            stroke-width: .5px;
        }
    </style>
</head>
<body>
<h1>Making a multi-theme choropleth</h1>
<p>This choropleth loads an additional file to obtain data that is not present in the GeoJSON file and
    adds more data to the <code>properties</code> object in each feature. The viewer can click buttons
    in the page to switch to a different theme.
</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const shapesFile = "../data/world/world-lowres.geojson";   // using file from this chapter's data folder.
    const themesFile = "../data/world/un_regions.csv";         // using file from this chapter's data folder.

    const [data, themes] = await Promise.all([
        d3.json(shapesFile),
        d3.csv(themesFile, function(row) {
            return {
                area: +row.Area_km2,
                hdi: +row.HDI_2017,
                code: row.Code
            }
        })
    ]);

    // Inspect the loaded data
    console.log(data);   // Shape data
    console.log(themes); // Thematic data

    // Add HDI, area and density to the properties array, matching by the country code
    data.features.forEach(function(d) {
        const entry = themes.filter(t => t.code === d.id)[0];
        if(entry) {
            d.properties.hdi = entry.hdi > 0 ? entry.hdi : undefined;   // "no data" is marked as -99 in the source file
            d.properties.area = entry.area;
            d.properties.density = d.properties.pop / entry.area;
        }
    });

    // Rendering the SVG - this is unchanged
    const dim = {width: 960, height: 500} ;         // standard width and height for most maps
    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);

    const geoPath = d3.geoPath();
    const projection = d3.geoMercator();
    geoPath.projection(projection);

    // An interactive HTML interface to change the theme.
    // Add HTML buttons to select the theme, and add event listeners to them
    const themesList = [
        {label: "Population", key: "pop"},
        {label: "Density", key: "density"},
        {label: "HDI", key: "hdi"}
    ];
    d3.select("body").append("div")
        .selectAll("button")
        .data(themesList)
        .join("button")
        .text(d => d.label)
        .on("click", (evt, d) => applyTheme(d.key));

    d3.select("body").append("h3").lower().text("No theme");

    // Render the map
    drawMap(svg, data, geoPath); // we put the map in a function to make the code cleaner.

    // Function to apply a different theme
    function applyTheme(t) {
        let colorScale;
        const extent = d3.extent(data.features, d => d.properties[t]);
        if (t === "hdi") { // use a different scale for HDI
            colorScale = d3.scaleSequential(d3.interpolateSpectral).domain(extent);
        } else {
            colorScale = d3.scaleSequentialPow(d3.interpolateRdYlBu).exponent(.2).domain(extent.reverse());
        }
        svg.selectAll("path.feature")
            .style("fill", d => colorScale(d.properties[t]));
        d3.select("h3").text(themesList.filter(d => d.key === t)[0].label);
    }

    // FUNCTIONS
    function drawFeatures(view, data, geoPath) {
        view.selectAll("path.feature")
            .data(data.features)
            .join("path").attr("class", "feature")
            .attr("d", geoPath);
    }

    function drawMap(view, data, geoPath) {
        view.append("path").attr("class", "background") // styles were moved to CSS for cleaner code
            .datum({type: "Sphere"})
            .attr("d", geoPath);

        drawFeatures(view, data, geoPath);

        view.append("path").attr("class", "graticule")
            .datum(d3.geoGraticule())
            .attr("d", geoPath);
    }
</script>

</body>
</html>
