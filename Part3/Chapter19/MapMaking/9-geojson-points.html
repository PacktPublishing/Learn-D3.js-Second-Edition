<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placing points using GeoJSON</title>
    <link rel="stylesheet" href="css/map.css"> <!-- styles were moved to separate file for cleaner code -->
</head>
<body>
<h1>Placing points using GeoJSON</h1>
<p>Points can also be provided as a GeoJSON file, and if they are not, you can add them to a GeoJSON
    object to render them using <code>d3.geoPath</code>. This file is identical to <a href="8-placing-points.html">8-placing-points.html</a>,
    but places the coordinates in <code>Point</code> GeoJSON geometries.
</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const data = await d3.json('../data/world/world-lowres.geojson');
    const dim = {width: 960, height: 500};
    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);

    const projection1 = d3.geoOrthographic().rotate([20,-20,0]);
    const projection2 = d3.geoMercator();
    const projection3 = d3.geoEquirectangular();

    const projection = projection2;

    const geoPath = d3.geoPath().projection(projection);

    drawMap(svg, data, geoPath); // we put the map in a function to make the code cleaner.

    // An array with 10 cities and their coordinates in the form [longitude, latitude].
    const cities = [
        {name: "New York", coordinates: [-74.006, 40.7128]},
        {name: "London", coordinates: [-0.1276, 51.5074]},
        {name: "Tokyo", coordinates: [139.6917, 35.6895]},
        {name: "Sydney", coordinates: [151.2093, -33.8688]},
        {name: "Cairo", coordinates: [31.2357, 30.0444]},
        {name: "Rio de Janeiro", coordinates: [-43.1729, -22.9068]},
        {name: "Moscow", coordinates: [37.6173, 55.7558]},
        {name: "Mexico City", coordinates: [-99.1332, 19.4326]},
        {name: "Beijing", coordinates: [116.4074, 39.9042]},
        {name: "Mumbai", coordinates: [72.8777, 19.076]},
        {name: "Lagos", coordinates: [3.3792, 6.5244]},
    ];

    // Create a GeoJSON object for the cities. Sometimes your data may already be in this format.
    const geocities = {
        type: "FeatureCollection",
        features: cities.map(d => ({
            type: "Feature",
            geometry: {
                type: "Point",
                coordinates: d.coordinates
            },
            properties: {
                name: d.name
            }
        }))
    };

    // You don't need to use the projection function anymore nor append circles,
    // but must set the radius using geoPath.pointRadius and place the label using the shape's centroid.
    svg.selectAll("g.city")
       .data(geocities.features)
         .join("g").attr("class", "city")    // styles applied to .city path
         .each(function(d) {
            d3.select(this).append("path")
                .attr("d", geoPath.pointRadius(3)) // projection applied automatically when using geoPath
            d3.select(this).append("text").text(d.properties.name)
                .attr("y", -10)
                .attr("transform", `translate(${geoPath.centroid(d)})`) // project point centroid to screen coords
        });

    // FUNCTIONS
    function drawMap(view, data, geoPath) {
        view.append("path").attr("class", "background") // styles were moved to CSS for cleaner code
            .datum({type: "Sphere"})
            .attr("d", geoPath);

        view.selectAll("path.feature")
            .data(data.features)
            .join("path")
            .attr("class", "feature")
            .attr("d", geoPath);

        view.append("path").attr("class", "graticules")
            .datum(d3.geoGraticule10())
            .attr("d", geoPath);
    }

</script>

</body>
</html>
