<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using graticules</title>
    <style>
        svg {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<h1>Using graticules</h1>
<p>Graticules add context. Try this code in different projections. A graticule is a network of parallels and meridians.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const data = await d3.json('../data/world/world-lowres.geojson');
    const dim = {width: 960, height: 500};
    const svg = d3.select("body").append("svg")
            .attr("width", dim.width).attr("height", dim.height);

    // Experiment with different projections.
    const projection1 = d3.geoOrthographic().rotate([20,-20,0]);
    const projection2 = d3.geoMercator();
    const projection3 = d3.geoEquirectangular();

    const geoPath = d3.geoPath().projection(projection1);

    // The sphere behind everything else, providing a background for the map.
    svg.append("path")
        .datum({type: "Sphere"})
        .attr("d", geoPath)
        .style("fill", "lightblue")
        .style("stroke", "none");

    // The features on top of the sphere.
    svg.selectAll("path.feature")
       .data(data.features)
         .join("path")
           .attr("class", "feature")
           .attr("d", geoPath)
           .style("fill", "green")
           .style("stroke", "black");

    // A basic graticule grid: every 10 degrees (same as d3.geoGraticule10() or d3.geoGraticule().step([10,10]))
    const graticule = d3.geoGraticule();

    svg.append("path")
       .datum(graticule()) // lines every 10 degrees
       .attr("d", geoPath)
       .style("fill", "none")
       .style("stroke", "blue")
       .style("stroke-width", "0.5px");

    // Another graticule set, this time just containing the equator
    const equator = d3.geoGraticule().step([0,90]);

    svg.append("path")
        .datum(equator()) // lines every 10 degrees
        .attr("d", geoPath)
        .style("fill", "none")
        .style("stroke", "orange")
        .style("stroke-width", "2px");
</script>

</body>
</html>
