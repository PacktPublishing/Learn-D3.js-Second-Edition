<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choropleth 2</title>
    <style>
        .region {
            fill: white;
            stroke: white;
            stroke-width: .05;
        }
        text {
            font-family: sans-serif;
            font-size: 20px;
            fill: gray;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const width = 960;
    const height = 500;

    const dataFolder = '../data/brazil/';
    const dataFiles = new Map([
        ["shapes", dataFolder + "estados_br.geojson"],
        ["deaths", dataFolder + "estados_mortes_acidentes_transito_2016.csv"],
        ["population", dataFolder + "estados_populacao_2016.csv"]
    ]);

    const svg = d3.select("body").append("svg")
                  .attr("width", width).attr("height", height);

    // choose a projection
    const projection = d3.geoMercator();

    // create a path generator function for the projection
    const geoPath = d3.geoPath()
            .projection(projection);

    const color = d3.scaleSqrt(["hsla(240,100%,50%,.1)", "red"]);

    const map = {};

    Promise.all([
        d3.json(dataFiles.get("shapes")),
        d3.csv(dataFiles.get("deaths"), function(row) {
            return {
                cod_ibge: +row.cod_ibge,
                deaths: +row.obitos
            }
        }),
        d3.csv(dataFiles.get("population"), function(row) {
            return {
                cod_ibge: +row.cod_ibge,
                population: +row.populacao
            }
        })
    ]).then(function([shapes, thematic1, thematic2]) {
        console.log(shapes);   // shape data
        console.log(thematic1); // death data
        console.log(thematic2); // population data

        // save in a global context
        map.features   = shapes.features;

        // add data to properties
        map.features.forEach(function(d) {
            const entry1 = thematic1.filter(t => +t.cod_ibge === +d.properties.codigo_ibg)[0];
            const entry2 = thematic2.filter(t => +t.cod_ibge === +d.properties.codigo_ibg)[0];
            if(entry1 && entry2) {
                d.properties.deaths = entry1.deaths;
                d.properties.population = entry2.population;
                d.properties.deathsPerHab = entry1.deaths / entry2.population;
            }
        })

        projection.fitSize([width, height], shapes);

        // configure the scale
        color.domain(d3.extent(map.features, d => d.properties.deathsPerHab))
        draw();
    });

    function draw() {
        svg.selectAll("path.region")
            .data(map.features)
            .join("path")
            .attr("class","region")
            .attr('d', geoPath)
            .style("fill", d => color(d.properties.deathsPerHab))
    }
</script>

</body>
</html>
