<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using polygons instead of the d3-geo module to draw a map</title>
    <style>
        svg {border: solid 1px gray;}
        .continent {
            stroke: white;
        }
    </style>
</head>
<body>
<h1>Using polygons instead of the d3-geo module to draw a map</h1>
<p>This map uses a cylindrical projection, but for Africa, it is very similar to Mercator. Instead of drawing a path, it uses polygons.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    const width = 960;
    const height = 500;

    const dataFile = '../data/geojson/africa-simple-multipolygon.geojson';

    d3.json(dataFile).then(function(data) {

        console.log(data);

        const color = d3.scaleOrdinal(d3.schemeCategory10);
        const latScale = d3.scaleLinear().domain([-90,90]).range([height,0]);
        const lonScale = d3.scaleLinear().domain([-180,180]).range([0,width])

        const svg = d3.select("body").append("svg")
                      .attr("width", width).attr("height", height);

        svg.selectAll("g.continent") // each Feature
                .data(data.features)
                .join("g").attr("class","continent")
                .style("fill", (d,i) => color(i))
                .selectAll("polygon") // each Geometry
                   .data(d => d.geometry.type === 'MultiPolygon' ? d3.merge(d.geometry.coordinates) : d.geometry.coordinates)
                   .join("polygon")
                   .attr("points", d => d3.merge(d.map(coord => [lonScale(coord[0]), latScale(coord[1])])))
    })
</script>

</body>
</html>
