<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic projection zoom</title>
    <link rel="stylesheet" href="../css/maps.css">
    <style>
        svg {border: solid 1px gray;}
    </style>
</head>
<body>
<h1>Semantic projection zoom</h1>
<p>Use the <b>mouse wheel</b> or <b>double-click/shift-double-click</b> to zoom in and out.
   This implementation provides semantic zooming and panning using projection scaling and translating.</p>
<div id="rotate-controls">
    Rotate the axis (yaw) <input type="number" name="yaw" id="yaw" min="-180" max="180" step="10" value="0">
</div><p></p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {map, renderMap, updateMap, loadTopoJSON, createProjectionSwitcher} from "../js/maps.js";

    map.dim = {width: 960, height: 500};
    const file = "../data/world/world-medres.topojson";
    const key  = "world";
    map.projection = d3.geoMercator();
    map.geoPath = d3.geoPath().projection(map.projection);
    map.optimize = true; // using mesh and merged instead of features to speed up rendering and zooming
    let currentTransform = d3.zoomIdentity; // to keep track of the current zoom transform

    // Save initial projection parameters
    map.scale = map.projection.scale();
    map.translate = map.projection.translate();

    // Setup zoomable container in the SVG viewport as the main view
    const svg = d3.select("body").append("svg")
                  .attr("width", map.dim.width).attr("height", map.dim.height);
    map.view = svg.append("g").attr("class", "globe");

    // Setup zoom and connect to the view container - call semantic function
    const zoom = d3.zoom()
        .scaleExtent([1, 40])
        .translateExtent([[0, 0], [map.dim.width, map.dim.height]])
        .extent([[0, 0], [map.dim.width, map.dim.height]])
        .on('zoom', projectionZoom);
    map.view.call(zoom);

    // Load and render the map, and setup other interactive controls
    await loadTopoJSON(file, key);
    renderMap(map.view);

    createProjectionSwitcher((evt, projections) => {
        map.projection = projections[+evt.target.value].config;
        const {k, x, y} = currentTransform;
        map.projection
            .scale(k * map.scale)
            .translate([x + map.translate[0] * k, y + map.translate[1] * k]);

        map.geoPath.projection(map.projection);
        updateMap(null, 250);
        d3.select("#yaw").node().value = map.projection.rotate()[0].toFixed(0);
    });

    // Interactive rotation
    d3.select("#yaw").on("change", () => {
        const value = +d3.select("#yaw").node().value;
        if(Math.abs(value) === 180) {
            d3.select("#yaw").node().value = -value;
        }
        const rotation = map.projection.rotate();
        map.projection.rotate([+d3.select("#yaw").node().value, rotation[1], rotation[2]]);
        updateMap();
    });

    // Semantic zoom using projection methods
    function projectionZoom(evt) {
        const {k, x, y} = evt.transform;
        map.projection.scale(k * map.scale)
                      .translate([
                          x + map.translate[0] * k,
                          y + map.translate[1] * k
                      ]);
        updateMap(); // performs map.view.selectAll(".feature path, .graticule, .background, .outline").attr("d", map.geoPath);
        currentTransform = evt.transform;
    }

</script>

</body>
</html>
