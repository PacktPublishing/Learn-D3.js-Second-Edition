<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        svg {border: solid 1px gray;}
    </style>
</head>
<body>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3';

    const width = 960;
    const height = 500;
    const file = "world-medres.topojson";
    const key  = "world";

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    // reference
    const projection = d3.geoRobinson().fitExtent([[0,5],[width, height-10]], {type: "Sphere"});

    // create a path generator function for the projection
    const geoPath = d3.geoPath()
            .projection(projection)

    const map = {};

    d3.json('../Data/' + file)
            .then(function(topology) {

                map.topology   = topology.objects[key];
                map.geometries = map.topology.geometries;
                map.features   = topojson.feature(topology, map.topology).features

                map.features.map(d => d.id = isNaN(d.id) ? d.properties.ISO_A3 : d.properties.ADMIN);

                drawGraticules();
                draw();

            });

    function draw() {
        const globe = svg.selectAll("g.country")
                .data(map.features)
                .join("g")
                .attr("class","country")
                .on('mouseenter', showBoundsAndCentroid)
                .on('mouseleave', hideBoundsAndCentroid)

        globe.append("path")
                .style("fill", '#333')
                .style("fill-opacity", .8)
                .attr('d', geoPath)
                .style("stroke", "white")
                .style('stroke-width', '.25')

        globe.append("rect").attr("class", "bounds")
                .style("stroke", "red")
                .style("fill", "orange")
                .style("fill-opacity", 0)
                .attr("width", 0)
                .attr("height", 0);

         globe.append("circle").attr("class", "centroid")
                .attr("r", 3)
                .style("fill", "white")
                .style("fill-opacity", 0)
                .style("stroke", "red")
                .style("stroke-width", 2)
                .attr("transform", `translate(0,0)`);
    }

    function showBoundsAndCentroid(evt, d) {
        showBounds(evt, d);
        showCentroid(evt, d);
    }

    function showCentroid(evt, d) {
        console.log('centroid', geoPath.centroid(d))
        d3.select(".centroid").raise()
                .style("fill-opacity", .7)
                .attr("transform", `translate(${geoPath.centroid(d)})`);
    }

    function showBounds(evt, d) {
      //  d3.event.stopPropagation();
        console.log('bounds', geoPath.bounds(d))

        const minXY = geoPath.bounds(d)[0];
        const maxXY = geoPath.bounds(d)[1];

        const minX = minXY[0];
        const minY = minXY[1];
        const maxX = maxXY[0];
        const maxY = maxXY[1];

        d3.select(evt.target).raise();
        d3.select(".bounds").raise()
                .style("fill-opacity", .5)
                .attr("width", maxX - minX)
                .attr("height", maxY - minY)
                .attr("transform", `translate(${[minX, minY]})`)
    }


    function hideBoundsAndCentroid(evt, d) {
        d3.select(evt.target).select("rect").remove();
        d3.select(evt.target).select("circle").remove();
    }

    const graticule = d3.geoGraticule();

    function drawGraticules() {

        svg.append("path").attr("class","graticule")
                .datum(graticule())
                .style("fill", 'none')
                .attr('d', geoPath)
                .style("stroke", "green")
                .style('stroke-width', .25);
    }

</script>

</body>
</html>
