<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        svg {border: solid 1px gray;}
        .mesh {
            stroke: black;
            fill: none;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as topojson from 'https://cdn.skypack.dev/topojson-client@3'

    const width = 960;
    const height = 500;

    const color = d3.scaleOrdinal(d3.schemeCategory10);

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    const geoPath = d3.geoPath().projection(d3.geoMercator());

    d3.json('../../../data/africa/africa.topojson')
            .then(function(data) {

        // only internal borders: a !== b; only external coastline: a === b
        const borders = topojson.mesh(data, data.objects['africa'], (a,b) => a !== b )

        svg.append("path").attr("class","mesh")
                .datum(borders)
                .attr("d", geoPath)
    })
</script>

</body>
</html>
