<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drawing lines and shapes with GeoJSON</title>
    <style>
        svg {border: solid 1px gray;}
        .continent {
            stroke: white;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const width = 960;
    const height = 500;

    const dataFile = '../../../data/geojson/africa-simple.geojson';

    d3.json(dataFile).then(function(data) {

        console.log(data);

        const color = d3.scaleOrdinal(d3.schemeCategory10);

        const svg = d3.select("body").append("svg")
                      .attr("width", width).attr("height", height);

        const geoPath = d3.geoPath()
                          .projection(d3.geoMercator())
                          .pointRadius(3);

        svg.selectAll("path.continent")
                .data(data.features)
                .join("path").attr("class","continent")
                .style("fill", (d,i) => isLine(d) ? 'none' : color(i))
                .attr("d", geoPath);
    })

    function isLine(d) {
        return d.geometry.type === 'LineString' || d.geometry.type === 'MultiLineString';
    }

</script>

</body>
</html>
