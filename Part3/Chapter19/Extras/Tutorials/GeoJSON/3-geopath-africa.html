<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drawing a GeoJSON as a single MultiPolygon</title>
    <style>
        svg {border: solid 1px gray;}
        .continent {
            fill: blue;
        }
    </style>
</head>
<body>
<h1>Drawing a GeoJSON as a single MultiPolygon containing 5 polygons (see JSON file)</h1>
<p>The polygons are three lakes, one island and one continent.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const width = 960;
    const height = 500;

    const dataFile = '../../../data/geojson/africa-simple-multipolygon.geojson';

    // This is a simplified GeoJSON file - look at its contents!
    d3.json(dataFile).then(function(data) {

        console.log(data);

        const svg = d3.select("body").append("svg")
                .attr("width", width).attr("height", height);

        const geoPath = d3.geoPath()
                .projection(d3.geoMercator());

        svg.selectAll(".continent")
                .data(data.features)
                .join("path").attr("class", "continent")
                .attr('d', geoPath);
    })
</script>

</body>
</html>
