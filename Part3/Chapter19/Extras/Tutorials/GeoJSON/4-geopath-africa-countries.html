<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drawing a complete geojson file with outlines of african countries</title>
    <style>
        svg {border: solid 1px gray;}
        .country {
            stroke: white;
            stroke-width: .5px;
        }
    </style>
</head>
<body>
<h1>Drawing a complete geojson file with outlines of african countries</h1>
<p>The viewport fits the entire world in the Mercator projector, but only the African continent is drawn, as the geojson file only contains data for Africa.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const width = 960;
    const height = 500;

    const dataFile = '../../../data/africa/africa.geojson';

    // This file contains outlines of african countries
    d3.json(dataFile).then(function(data) {

        const color = d3.scaleOrdinal(d3.schemeCategory10);
        const svg = d3.select("body").append("svg")
                      .attr("width", width).attr("height", height);

        const geoPath = d3.geoPath().projection(d3.geoMercator());

        svg.selectAll(".country")
                .data(data.features)
                .join("path").attr("class", "country")
                .attr('d', geoPath)
                .style("fill", (d,i) => color(i))
    })
</script>

</body>
</html>
