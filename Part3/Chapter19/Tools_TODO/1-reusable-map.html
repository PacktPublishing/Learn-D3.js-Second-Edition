<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reusable map demonstration</title>
    <link rel="stylesheet" href="../../css/maps.css">
    <link rel="stylesheet" href="../css/projection-config.css">
</head>
<body>
<h1>Reusable map demonstration</h1>
<p>This is a demonstration of the reusable map module used in several examples.</p>
<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, loadTopoJSON, renderMap} from "../js/maps.js";

    // These are all defaults
    map.dim = {width: 960, height: 500}; // overriding dimensions
    map.view = d3.select("body").append("svg").attr("width", map.dim.width).attr("height", map.dim.height); // overriding view
    map.projection = d3.geoMercator(); // overriding projection
    map.geoPath = d3.geoPath().projection(map.projection); // overriding geoPath
    map.optimize = false; // true will use mesh and merge to optimize rendering, but may not be suitable for all maps

    const file = "../data/world/world-medres.topojson";
    const key  = "world";

    // Load and parse
    await loadTopoJSON(file, key);
    // Render map using defaults
    renderMap();

    // call updateMap() to update the map after changing any properties

</script>

</body>
</html>
