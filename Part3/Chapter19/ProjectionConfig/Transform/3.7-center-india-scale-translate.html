<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zooming in and panning from India</title>
    <link rel="stylesheet" href="../css/projection-config.css">
    <link rel="stylesheet" href="../../css/maps.css">
</head>
<body>
<h1>Zooming in and panning from India</h1>
<p>Translating moves the place where the geographical center is anchored in the viewport.
The geo center is still in India, but now it was moved to x = 240 pixels (1/4 of the horizontal viewport).</p>

<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, renderMap, loadTopoJSON, drawViewportAxes} from "../../js/maps.js";

    map.dim = {width: 960, height: 500};
    const file = "../../data/world/world-medres.topojson";
    const key  = "world";

    map.projection = d3.geoMercator()
                        .translate([240,250])   // This is the default *viewport* center (pixels) for the world map
                        .center([78,22])        // This is the chosen *geographic* center (lon, lat)
                        .scale(750);

    map.geoPath = d3.geoPath().projection(map.projection);
    loadTopoJSON(file, key).then(() => {
        renderMap();
        drawViewportAxes(map);
    });

</script>

</body>
</html>
