<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setting the geographic center</title>
    <link rel="stylesheet" href="../css/projection-config.css">
    <link rel="stylesheet" href="../../css/maps.css">
</head>
<body>
<h1>Setting the geographic center</h1>
<p>Use <code>center()</code> to rotate the globe to a different center. Default is the point where the prime meridian and equator crosses. This is the default.</p>

<script type="module">
    import * as d3_all from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, renderMap, loadTopoJSON, drawViewportAxes} from "../../js/maps.js";

    map.dim = {width: 960, height: 500};
    const file = "../../data/world/world-medres.topojson";
    const key  = "world";

    map.projection = d3.geoMercator()          // you may need to rotate the globe in some projections (e.g. Orthographic)
                  //   .translate([480,250])   // This is the default *viewport* center (pixels) for the world map
                  //   .center([0,0])          // This is the default *geographic* center (lon, lat)
                  //   .scale(153);            // The default scale for Mercator in D3 (cutting at 70 latitude)

    map.geoPath = d3.geoPath().projection(map.projection);
    loadTopoJSON(file, key).then(() => {
        renderMap();
        drawViewportAxes(map);
    });

</script>

</body>
</html>
