<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zooming in to 480</title>
    <link rel="stylesheet" href="../css/projection-config.css">
    <link rel="stylesheet" href="../../css/maps.css">
</head>
<body>
<h1>Zooming in to 480</h1>
<p>Using <code>scale(480)</code> to zoom in at the geographical (default - blue lines) and viewport (default - red lines) centers.</p>
<script type="module">
    import * as d3_all from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, renderMap, loadTopoJSON, drawViewportAxes} from "../../js/maps.js";

    map.dim = {width: 960, height: 500};
    const file = "../../data/world/world-medres.topojson";
    const key  = "world";

    map.projection = d3.geoMercator()
                        .scale(480);

    map.geoPath = d3.geoPath().projection(map.projection);
    loadTopoJSON(file, key).then(() => {
        renderMap();
        drawViewportAxes(map);
    });
</script>

</body>
</html>
