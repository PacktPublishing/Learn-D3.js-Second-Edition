<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tilt rotation by -10 degrees (roll, gamma)</title>
    <link rel="stylesheet" href="../../css/maps.css">
    <link rel="stylesheet" href="../css/projection-config.css">
</head>
<body>
<h1>Tilt rotation by -10 degrees (roll, gamma)</h1>
<p>Using <code>rotate([0, 0, -10])</code>. Tilt the globe 10 degrees clockwise.</p>
<script type="module">
    import * as d3_all from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, loadTopoJSON, renderMap, updateMap, createProjectionSwitcher} from "../../js/maps.js";

    const rotation = [0, 0, -10];  //Rotation around the tilt axis (roll, gamma)

    map.dim = {width: 960, height: 500};
    const file = "../../data/world/world-medres.topojson";
    const key  = "world";
    map.projection = d3.geoMercator().rotate(rotation);
    map.geoPath = d3.geoPath().projection(map.projection);

    loadTopoJSON(file, key).then(() => {
        renderMap(map.view);
        createProjectionSwitcher((evt, projections) => {
            map.projection = projections[+evt.target.value].config;

            // Apply rotation around the tilt axis (roll, gamma):
            map.projection.rotate(rotation);

            map.geoPath.projection(map.projection);
            updateMap();
        });
    });
</script>

</body>
</html>
