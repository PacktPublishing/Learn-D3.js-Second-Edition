<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zooming in to the geographic center at Tokyo</title>
    <link rel="stylesheet" href="../css/projection-config.css">
    <link rel="stylesheet" href="../../css/maps.css">
</head>
<body>
<h1>Zooming in to the geographic center at Tokyo</h1>
<p>Use <code>center()</code> to rotate the globe to a different center.
    Default is the point where the prime meridian and equator crosses.
    Here the center was changed to Longitude 139, Latitude 35 (Tokyo) and scaled by 1000.</p>

<script type="module">
    import * as d3_all from "https://cdn.skypack.dev/d3@7";
    import * as d3_geo_projection from "https://cdn.skypack.dev/d3-geo-projection@4";
    const d3 = Object.assign({}, d3_all, d3_geo_projection);
    import {map, renderMap, loadTopoJSON, drawViewportAxes} from "../../js/maps.js";

    map.dim = {width: 960, height: 500};
    const file = "../../data/world/world-medres.topojson";
    const key  = "world";

    map.projection = d3.geoMercator()
                    //   .translate([480,250])   // This is the default *viewport* center (pixels) for the world map
                       .center([139,35])         // This is the chosen *geographic* center (lon, lat)
                       .scale(1000);

    map.geoPath = d3.geoPath().projection(map.projection);
    loadTopoJSON(file, key).then(() => {
        renderMap();
        drawViewportAxes(map);
    });

</script>

</body>
</html>
