<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Configuring major and minor graticules - step</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<h1>Configuring major and minor graticules - step</h1>
<p>Graticules configured using
<pre>d3.geoGraticule()
    .stepMinor([5,5])
    .stepMajor([20,20])
    .extentMinor([[-60,40], [60,0]])</pre>
generate different intervals and extents for major and minor graticule groups.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {map, createProjectionSwitcher, updateMap} from "./js/maps.js";

    map.dim = {width: 960, height: 500};
    map.view = d3.select("body").append("svg").attr("width", map.dim.width).attr("height", map.dim.height);
    map.projection = d3.geoMercator();
    map.geoPath = d3.geoPath().projection(map.projection);

    createProjectionSwitcher((evt, projections) => {
        map.projection = projections[+evt.target.value].config;
        map.geoPath.projection(map.projection);
        updateMap();
    });
    d3.select('#projection input[value="1"]').property("checked", true).dispatch("change"); // Orthographic

    // background
    map.view.append("path").attr("class","background")
       .datum({type: "Sphere"})
          .attr("d", map.geoPath);

    // 5 degree minor steps, 20 degree major steps, minor steps only between 40°N and 40°S
    map.view.append("path").attr("class","graticule")
        .datum(d3.geoGraticule()
            .stepMinor([5,5])
            .stepMajor([20,20])
            .extentMinor([[-60,40], [60,0]]))
        .attr("d", map.geoPath);
</script>

</body>
</html>
