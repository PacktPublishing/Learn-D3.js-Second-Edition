<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borders between South American countries</title>
    <style>
        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 17px;
            alignment-baseline: middle;
            text-anchor: middle;
            color: #e5fba1;
        }
        .faded {
            opacity: .1;
        }
        .highlight {
            font-weight: bold;
            font-size: 150%;
        }
        rect.highlight {
            stroke-width: 1px;
        }
        text.node {
            pointer-events: none;
        }
        .large {
            font-size: 150%;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>Lengths of borders and coastlines in thousands of km</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import * as nwu from "../../js/network-utils.js";

    // Data file
    const dataFile = "../../data/sa_borders.csv";

    // Page setup
    const dim = {width: 600, height: 600, margin: 200};

    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);
    const chart = svg.append("g").attr("transform", `translate(${[dim.margin/2, dim.margin/2]})`);
    chart.width = dim.width - dim.margin;
    chart.height = dim.height - dim.margin;

    // Color scales and functions
    const landColor = d3.scaleLinear().range(['#e5fba1','#4a5d2e']);
    const waterColor = d3.scaleLinear().range(['lightcyan','navy']);

    const isCoastline = node => node === 'Atlantic' || node === 'Pacific';
    const color = d => isCoastline(d.target) || isCoastline(d.source) ? waterColor(d.value) : landColor(d.value);

    // Number format
    const format = d3.format('0.1f');

    // Load and process data
    const rows = await d3.csv(dataFile, function(row) {
        const line = [];
        for(let key in row) {
            if(isNaN(row[key])) continue;
            line.push({value: +row[key], target: row.Country, source: key}); // adds only top diagonal
        }
        return line.filter(d => d.value !== 0);
    });

    // Create the links array (an array of objects with source, target, value)
    const links = rows.flat();

    // Create the nodes array (country names from the CSV header)
    const nodes = rows.columns.filter(d => d !== 'Country');

    ///////////////////////////////////////////////////////////
    // EXERCISE 2: Complete the adjacency matrix visualization
    // (a) Convert the node-link structure to an adjacency matrix required by the adjacency matrix layout.
    // Use the linksToMatrix function imported from network-utils.js.
    // Set the third parameter to true to use object keys instead of their indices.
    const matrix = nwu.linksToMatrix(nodes, links, true);

    // (b) Create the adjacency matrix layout in the chart area (call the imported adjacencyMatrix function
    // from network-utils.js and set the size with the size() method)
    const matrixLayout = nwu.adjacencyMatrix().size([chart.width, chart.height]);

    // (c) Generate the data for the adjacency matrix (call the function created in (b) with nodes and matrix)
    const data = matrixLayout(nodes, matrix);

    // (d) Draw the adjacency matrix (call the draw function with nodes and data)
    draw(nodes, data);
    ///////////////////////////////////////////////////////////

    // Draw the adjacency matrix
    function draw(nodes, data) {

        // Set color scale domains
        landColor.domain(d3.extent(data, d => d.value ? (!(isCoastline(d.target) || isCoastline(d.source)) ? d.value : 0) : undefined));
        waterColor.domain(d3.extent(data, d => d.value ? (isCoastline(d.target) || isCoastline(d.source) ? d.value : 0) : undefined));

        // Cells (the rectangles)
        chart.selectAll("rect")
             .data(data.filter(d => d.x > d.y)) // filters out lower diagonal and cells below it
                .join("rect")
                    .attr("x", d => d.x).attr("y", d => d.y)
                    .attr("height", d => d.h).attr("width", d => d.w)
                    .attr("rx",d => d.w/4).attr("ry", d => d.h/4)
                    .style("stroke", 'black').style("stroke-width", 0.25)
                    .style("fill", d => d.value ? color(d) : 'white')
                    .on("mouseover", highlight)
                    .on("mouseout", fade);

        // Cell labels (the values inside the cells)
        chart.selectAll('text.node')
             .data(data.filter(d => d.x > d.y)) // filters out lower diagonal and cells below it
                .join("text").attr("class",'node')
                    .attr("x", d => d.w/2 + d.x)
                    .attr("y", d => d.h/2 + d.y)
                    .text((d,i) => d.value ? format(d.value/1000) : '')
                    .style("fill", d => d.value ? contrast(color(d)) : 'white');

        // Source labels (left side)
        chart.selectAll('text.source')
             .data(data.filter(d => d.y === 0))
                .join("text").attr("class",'source')
                    .attr("y", d => d.x + d.w/2).attr("x", 5)
                    .style("text-anchor", 'start')
                    .attr("transform",`rotate(-90) `)
                    .text((d,i) => i>0 ? isCoastline(nodes[i]) ? nodes[i] + ' coast' : nodes[i] : '')
                    .on("mouseover", highlight)
                    .on("mouseout", fade);

        // Target labels (top side)
        chart.selectAll('text.target')
             .data(data.filter(d => d.x === 0))
                .join("text").attr("class",'target')
                    .attr("y", d => d.y + d.h/2)
                    .style("text-anchor", 'end')
                    .attr("x", (d,i) => d.w * (i+1) - 10)
                    .text((d,i) => i<nodes.length-1 ? isCoastline(nodes[i]) ? nodes[i] + ' coast' : nodes[i] : '')
                    .on("mouseover", highlight)
                    .on("mouseout", fade);
    }

    // Contrast color for text based on background color lightness
    function contrast(color) {
        if (!color) return '#333';
        const c = d3.hsl(color);
        return c.l > 0.6 ? '#333' : 'lightyellow';
    }

    // Event handler - Highlight row and column on mouseover
    function highlight(evt, d) {
        d3.selectAll("rect").classed('faded', k => !(k.x === d.x || k.y === d.y))
        d3.selectAll("rect").classed('highlight', k => k.x === d.x || k.y === d.y)
        d3.selectAll("text.node").classed('large', k => k === d)
        d3.selectAll("text.source").classed('highlight', k => k.x === d.x)
        d3.selectAll("text.target").classed('highlight', k => k.y === d.y)
    }

    // Event handler - Remove highlight on mouseout
    function fade() {
        d3.selectAll("rect, text").classed('faded highlight large', false);
    }
</script>
</body>
</html>
