<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Migrations </title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        text {
            font-size: 12px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as nwu from "../../js/network-utils.js"; // custom module for network utilities
    import * as highlight from "./js/chord-highlight.js"; // custom module for highlighting nodes and ribbons
    import * as gradient from "./js/chord-gradient.js"; // custom module for creating gradients for ribbons

    const dim = {width: 800, height: 800, margin: 100};
    const radius = dim.height/2 - dim.margin/2;

    const svg = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height);
    const chart = svg.append("g")
        .attr("class", 'chart')
        .attr("transform", `translate(${[dim.width/2 + dim.margin/4, dim.height/2 + dim.margin/4]})`);

    const format = d3.format(',');

    const minimum = 100000; // show only countries with at least this amount of immigrants

    const data =
        await d3.csv("../../data/migrations_2024.csv", row => {
            const obj = {
                value: +row.Immigrants,
                target: row.Destination,
                source: row.Origin,
            }
            return obj.value > minimum ? obj : null; // filter out countries with less than minimum immigrants
        });

    const filtered = data.filter(d => d.target !== "Others" && d.source !== "Others"); // filter out items where Destination and Origin are "Others"

    // group by destination, then origin
    const groups = d3.rollups(filtered, d => d[0].value, d => d.target, d => d.source);
    const countries = [... new Set(data.map(d => d.source))];

    const links = [];
    groups.forEach(function(item) {
        item[1].forEach(function(subItem) {
            links.push({source: item[0], target: subItem[0], value: subItem[1]});
        });
    });

    const matrix = nwu.linksToMatrix(countries, links, true);

    const chords =
        d3.chord().padAngle(.005)
                  .sortGroups((a,b) => d3.descending(a,b))
                  .sortSubgroups((a,b) => d3.descending(a,b))(matrix);

    const ribbon = d3.ribbon().radius(radius);
    const arc = d3.arc().innerRadius(radius+2).outerRadius(radius+20);

    // Setup color function and gradient for ribbons
    const color = d3.scaleSequential(d3.interpolateRainbow).domain([0,matrix.length]);
    gradient.setup(svg.append("defs"), radius, color, chords);

    // Draw the chords and arcs
    chart.selectAll('path.ribbon')
         .data(chords)
            .join("path").attr("class",'ribbon')
                .attr("d", ribbon)
                .style("fill", d => gradient.url(d));

    chart.selectAll('path.arc')
         .data(chords.groups)
            .join("path").attr("class",'arc')
                .attr("d", arc)
                .style("fill", d => color(d.index));

    chart.selectAll("text")
         .data(chords.groups)
            .join("text")
                .attr("x", d => arc.centroid(d)[0])
                .attr("y", d => arc.centroid(d)[1])
                .text(d => d.value > 4500000 ? countries[d.index] : '')
                .style("fill", d => contrast(color(d.index)))
                .attr("transform",d => `rotate(${(arc.endAngle()(d) + arc.startAngle()(d))*90/Math.PI},${arc.centroid(d)})`);

    // Setup highlighting and tooltips
    highlight.setup(chords, countries, color, minimum);


    // Luminance contrast function for text on nodes
    export function contrast(color, darker = false) {
        const c = d3.hsl(darker ? color : d3.color(color).darker());
        return c.l < .5 ? 'black' : 'white';
    }

</script>

</body>
</html>
