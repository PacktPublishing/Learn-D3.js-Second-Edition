<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>forceLink - To center</title>
    <link rel="stylesheet" href="../css/force-examples.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {drawReferenceBackgroundGrid, updateChart, drawChart} from "../js/force-examples.js";

    export const nodes = [
        {node: 'A', value: 79},
        {node: 'B', value: 15},
        {node: 'C', value: 24},
        {node: 'D', value: 44},
        {node: 'E', value: 125},
        {node: 'F', value: 22},
        {node: 'G', value: 20},
        {node: 'H', value: 64},
        {node: 'I', value: 69},
    ];

    // Links to center node (index 4)
    const links = [
        {source: 0, target: 4, value: 1},
        {source: 1, target: 4, value: 1},
        {source: 2, target: 4, value: 1},
        {source: 3, target: 4, value: 1},
        {source: 4, target: 4, value: 1},
        {source: 5, target: 4, value: 1},
        {source: 6, target: 4, value: 1},
        {source: 7, target: 4, value: 1},
        {source: 8, target: 4, value: 1}
    ];

    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    sim.force("link", d3.forceLink(links).strength(.03));

    // Setup reference grid
    drawReferenceBackgroundGrid(nodes, links);

    // Update on ticks
    sim.on("tick", updateChart);

    // Results
    drawChart(nodes);
</script>
</body>
</html>
