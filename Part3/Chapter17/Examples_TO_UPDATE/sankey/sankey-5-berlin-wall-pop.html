<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Yanone+Kaffeesatz">
    <style>
        text {
            font-family: 'Yanone Kaffeesatz', sans-serif;
            font-size: 10px;
            alignment-baseline: middle;
            text-anchor: middle;
            fill: black;
            pointer-events: none;
        }
        .faded {
            opacity: .5;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3_all from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import * as d3_sankey from "https://cdn.skypack.dev/d3-sankey@0";
    const d3 = Object.assign({}, d3_all, d3_sankey);
    import * as ui from "./js/sankey-interactive.js";

    const width = 1000;
    const height = 1000;
    const margin = 100;

    const color = d3.scaleOrdinal(d3.schemeCategory10);

    const links = [];

    ui.sankey.nodePadding(10)
             .nodeWidth(110)
             .nodeId(d => d.Id)
             .extent([[margin/2, margin/2], [width-margin, height-margin]])
             .nodeAlign(d3.sankeyJustify)
             .iterations(500);

    const svg = d3.select("body").append("svg").attr("width",width).attr("height",height);

    d3.csv("../../data/EuropeUSSR_1990_2010_nodes.csv", function(row) {
        if(+row.State === 1) {
            if (row.Containers.length > 0 && row.Id !== 'WB') {
                const groups = row.Containers.split('|');
                groups.forEach(function (group) {
                    if(group.length !== 4 && group !== 'WSP' && group !== 'EEC') {
                        const link = {}
                        if (group === 'DEU') { // join
                            link.target = group;
                            link.source = row.Id;
                        } else { // split
                            link.target = row.Id;
                            link.source = group;
                        }
                        link.value = Math.sqrt(+row.Area);
                        links.push(link);
                    }
                });
            } else if (+row.Unit === 1) {
                return undefined;
            }
            row.Area = +row.Area;
            return row;
        }
    }).then(function(rows) {
        const linked = d3.merge([links.map(k => k.source),links.map(k => k.target)]);
        const nodes = rows.filter(n => +n.State === 1 && linked.indexOf(n.Id) >= 0);

        color.domain([0, nodes.length]);

        ui.sankey.graph = ui.sankey({nodes: nodes, links: links});
        console.log(ui.graph);

        draw();
        drawFade();
    });

    function drawFade() {
        for(let i = 0; i < 30; i++) {
            svg.append("rect")
                    .attr("y", margin/2 + i*i/15)
                    .attr("width", width)
                    .attr("height", (1 - i/30) * 8)
                    .style("fill", 'white');
        }

    }

    function draw() {
        const chart = svg.append("g");

        chart.selectAll('path.link')
                .data(ui.sankey.graph.links)
                .join("path").attr("class", "link")
                .attr("d", d3.sankeyLinkHorizontal())
                .style("stroke-opacity", .4)
                .style("stroke-width", d => d.width)
                .style("stroke", d => d.target.Id === 'DEU' ? color(d.source.index) : color(d.target.index))
                .style("fill", 'none')
                .on("mouseover", ui.highlightPath)
                .on("mouseout", ui.fade);

        chart.selectAll('g.node')
                .data(ui.sankey.graph.nodes)
                .join("g").attr("class", 'node')
                .attr("transform", d => `translate(${[d.x0,d.y0]})`)
                .each(function(d,i) {
                    d3.select(this)
                        .append("rect")
                        .attr("y", function() {
                            if(d.y1 - d.y0 < 12) {
                                return (d.y1 - d.y0)/2 - 5;
                            }
                            return 0;
                        })
                        .attr("width", d.x1 - d.x0)
                        .attr("height", function() {
                            if(d.y1 - d.y0 < 12) {
                                return 10;
                            }
                            return d.y1 - d.y0;
                        })
                        .attr("rx", d.y1 - d.y0 < 4?10:0)
                        .attr("ry", d.y1 - d.y0 < 4?5:0)
                        .style("fill", d3.rgb(color(i)).darker(.5))
                        .style('fill-opacity', 1);

                    d3.select(this)
                        .append("text")
                        .attr("x", (d.x1 - d.x0)/2)
                        .attr("y", (d.y1 - d.y0)/2 + 1)
                        .text(d.Country)
                        .style("fill", contrast(d3.rgb(color(i)).darker(.5)))
                        .style("text-anchor", 'middle')
                        .style("font-size", function(d) {
                            if(d.y1 - d.y0 < 15) {
                                return 10;
                            }
                            return 16;
                        });
                })
                .on("mouseover", ui.highlightNode)
                .on("mouseout", ui.fade)
                .call(d3.drag()
                        .on('start', ui.dragStart)
                        .on('drag', ui.dragging)
                        .on('end', ui.dragEnd)
                );
    }

    function contrast(color) {
        const c = d3.hsl(color);
        return c.l > .5 ? 'black' : 'white';
    }

</script>

</body>
</html>
