<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom force - a minimal custom force</title>
    <link rel="stylesheet" href="../css/force-examples.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {drawReferenceBackgroundGrid, updateChart, drawChart} from "../js/force-examples.js";
    import * as cfx from "./js/custom-force.js";

    export const nodes = [
        {node: 'A', value: 79},
        {node: 'B', value: 15},
        {node: 'C', value: 24},
        {node: 'D', value: 44},
        {node: 'E', value: 125},
        {node: 'F', value: 22},
        {node: 'G', value: 20},
        {node: 'H', value: 64},
        {node: 'I', value: 69},
    ];

    drawReferenceBackgroundGrid(nodes);

    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    sim.force("random", cfx.forceRandom().strength(10))
       .force("center", d3.forceCenter(0,-100));

    // Update on ticks
    sim.on("tick", updateChart);

    // Results
    drawChart(nodes);
</script>
</body>
</html>
