<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple simulation with one force</title>
    <link rel="stylesheet" href="css/force.css">
</head>
<body>
<div id="label">Ticks</div>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {nodes, draw, redraw} from "./js/force.js";

    // See nodes, page and drawing code in force.js

    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    sim.force("manybody", d3.forceManyBody());
    sim.on("tick", ticked);
    draw();

    let ticks = 0;
    function ticked() {
        d3.select("#label").text('Tick: ' + ++ticks);
        redraw();
    }

</script>
</body>
</html>
