<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chord layout - highlighting nodes and ribbons</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .faded {
            opacity: .2 !important;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {chords, draw} from "./js/chord-example.js"; // code from previous examples was placed here

    draw(chords);

    // Add interactive highlighting
    d3.select(".chart").selectAll('path.arc')
        .on("mouseover", highlightNode)
        .on("mouseout", reset);

    d3.select(".chart").selectAll('path.ribbon')
        .on("mouseover", highlightRibbon)
        .on("mouseout", reset);

    function highlightNode(evt, node) {
        d3.selectAll("path.arc").classed("faded", d => !(d === node));
        d3.selectAll("path.ribbon")
            .classed("faded", edge => !(edge.source.index === node.index));
    }
    function highlightRibbon(evt, edge) {
        d3.selectAll("path.arc")
            .classed("faded", node => !(node.index === edge.source.index
                || node.index === edge.target.index))
        d3.selectAll("path.ribbon").classed("faded", d => !(d === edge));
    }
    function reset() {
        d3.selectAll("path").classed("faded", false);
    }
</script>

</body>
</html>
