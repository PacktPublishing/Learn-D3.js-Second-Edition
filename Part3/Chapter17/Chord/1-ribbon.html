<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chord layout - generating ribbons</title>
</head>
<body>
<h1>Chord layout - generating ribbons</h1>
<p>See commented source code and JavaScript console for details.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    const dim = {width: 800, height: 800, margin: 100};
    const chart = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height)
                    .append("g").attr("transform", `translate(${[dim.margin/2 + dim.width/2, dim.margin/2 + dim.height/2]})`);

    // DATA
    const matrix = [
        [0,3,3,3,0,0,0,2,4],
        [3,0,5,0,0,0,0,0,0],
        [8,5,0,6,0,0,4,0,0],
        [9,0,8,0,9,0,0,0,0],
        [0,0,0,9,0,8,0,0,0],
        [0,0,0,0,9,0,7,8,0],
        [0,0,9,0,0,7,0,7,0],
        [3,0,0,0,0,8,6,0,7],
        [4,0,0,0,0,0,0,9,0]
    ];

    // Create a chord layout generator and apply to the data.
    const chord = d3.chord().padAngle(.3);

    // Transform the matrix into a chord layout data structure. This converts it into a link format
    // (objects with 'source' and 'target' nodes), where each node contains the following
    // properties: value (the original value from the matrix), index (the index of the node in the matrix),
    // startAngle (the angle at which the node starts), endAngle (the angle at which the node ends).
    const chords = chord(matrix);
    console.log('chords', chords); // inspect

    // Create a ribbon generator function (to pass to the path element's 'd' attribute).
    // It will use generated indexed, angles and radii to draw the ribbons.
    const radius = dim.height/2 - dim.margin;
    const ribbon = d3.ribbon().radius(radius);

    const color = d3.scaleSequential(d3.interpolateRainbow).domain([0,matrix.length]);

    // Draw the ribbons
    chart.selectAll('path.ribbon')
         .data(chords)
            .join("path").attr("class",'ribbon')
               .attr("d", ribbon)
               .style("opacity", .3)
               .style("fill", d => color(d.source.index));

</script>

</body>
</html>
