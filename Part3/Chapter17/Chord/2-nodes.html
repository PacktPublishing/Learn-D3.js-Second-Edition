<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chord layout - generating group nodes</title>
    </style>
</head>
<body>
<h1>Chord layout - generating group nodes</h1>
<p>See commented source code and JavaScript console for details.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const dim = {width: 800, height: 800, margin: 100};
    const chart = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height)
        .append("g").attr("transform", `translate(${[dim.margin/2 + dim.width/2, dim.margin/2 + dim.height/2]})`);

    // DATA
    const matrix = [
        [0,3,3,3,0,0,0,2,4],
        [3,0,5,0,0,0,0,0,0],
        [8,5,0,6,0,0,4,0,0],
        [9,0,8,0,9,0,0,0,0],
        [0,0,0,9,0,8,0,0,0],
        [0,0,0,0,9,0,7,8,0],
        [0,0,9,0,0,7,0,7,0],
        [3,0,0,0,0,8,6,0,7],
        [4,0,0,0,0,0,0,9,0]
    ];

    const chords = d3.chord().padAngle(.3)(matrix);
    const radius = dim.height/2 - dim.margin;
    const ribbon = d3.ribbon()
                     .radius(radius);

    // Calling d3.chord() also generates the groups data, which are nodes with
    // start and end angles for the arcs
    console.log('chords.groups', chords.groups); // inspect the groups data

    const color = d3.scaleSequential(d3.interpolateRainbow)
                    .domain([0,matrix.length]);

    // Drawing ribbons
    chart.selectAll('path.ribbon')
         .data(chords)
            .join("path").attr("class",'ribbon')
                .attr("d", ribbon)
                .style("opacity", .3)
                .style("fill", d => color(d.source.index));

    // Drawing nodes (using chords.groups to obtain data for the arcs)
    const arc = d3.arc()
                  .innerRadius(radius+2)   // added 2 pixels from the ribbon radius
                  .outerRadius(radius+30); // added 30 pixels from the ribbon radius

    chart.selectAll('path.arc')
         .data(chords.groups)
            .join("path").attr("class",'arc')
                .attr("d", arc)
                .style("fill", d => color(d.index));

</script>

</body>
</html>
