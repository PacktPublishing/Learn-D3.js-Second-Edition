<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 17.3: Adding images and collision detection</title>
    <style>
        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 10px;
            alignment-baseline: central;
            text-anchor: middle;
            fill: white;
        }

        line {
            fill: none;
            stroke: black;
        }
        image, circle {
            opacity: 1;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    const dataFile = "../../data/planets.json";
    const imgDir = "../../data/images/planets";

    const dim = { width: 800, height: 600, margin: 40 };
    const offsetX = dim.margin / 2 + dim.width / 2;
    const offsetY = dim.margin / 2 + dim.height / 2;
    const svg = d3.select("body").append("svg")
                    .attr("width", dim.width + dim.margin)
                    .attr("height", dim.height + dim.margin)
        .style("background-color", "#000");
    const chart = svg.append("g")
                     .attr("transform", `translate(${[offsetX, offsetY]})`);

    // Get the data
    const data = await d3.json(dataFile);

    console.log(data)

    // Prepare the nodes array
    const nodes = [];

    // Populate the nodes array with planets and satellites that are at least 1000 km in diameter
    data.planets.forEach(planet => {
        if(planet.diameterKm >= 500) {
            nodes.push({
                id: planet.id,
                name: planet.name,
                diameter: planet.diameterKm,
                parent: null
            });
        }
        if(planet.satellites) {
            planet.satellites.forEach(satellite => {
                if(satellite.diameterKm >= 500) {
                    nodes.push({
                        id: satellite.id,
                        name: satellite.name,
                        diameter: satellite.diameterKm,
                        parent: planet.name
                    });
                }
            });
        }
    });
    nodes.sort((a, b) => d3.descending(a.diameter, b.diameter));

    // A scale for planetary diameters
    const diameterScale = d3.scaleLinear()
                            .range([0, 500])
                            .domain([0, d3.max(nodes, d => d.diameter)]);

    // Get images
    const imagePromises = nodes.map( node =>
        d3.image(`${imgDir}/${node.name}.png`)
            .then(img => node.image = img.src) // preload image if URL exists
            .catch(() => {}) // do nothing if file not found
    );
    await Promise.all(imagePromises);

    // The simulation
    const sim = d3.forceSimulation(nodes);
    sim.force("manybody", d3.forceManyBody().strength(-50))
    sim.force("y", d3.forceY().strength(.02));
    sim.force("x", d3.forceX().strength(.005));
    sim.on("tick", redraw);

    draw();

    function draw() {
        chart.selectAll("g.node")
             .data(nodes, d => d.id)
             .join(
                enter => {
                    const nodeEnter = enter.append("g")
                        .attr("class", "node");
                    nodeEnter.append("circle")
                        .attr("r", d => diameterScale(d.diameter)/2)
                        .attr("fill", "#aaa");
                    nodeEnter.append("image")
                        .attr("class", "node-image")
                        .attr("href", d => d.image)
                        .attr("width", d => d.name === "Saturn" ? 2.35 * diameterScale(d.diameter): diameterScale(d.diameter))
                        .attr("height", d => diameterScale(d.diameter))
                        .attr("x", d => d.name === "Saturn" ? 2.35 * -diameterScale(d.diameter)/2 : -diameterScale(d.diameter)/2)
                        .attr("y", d => -diameterScale(d.diameter)/2);
                    nodeEnter.append("text")
                        .text(d => d.name)
                        .attr("y", (d,i) => i > 6 ? -diameterScale(d.diameter)/2 - 6 : 0);
                    return nodeEnter;
                },
                update => update,
                exit => exit.remove()
             );
        d3.selectAll(".node").filter(d => d.image).select("circle").remove();
    }

    function redraw() {
        chart.selectAll("g.node")
             .attr("transform", d => `translate(${[d.x, d.y]})`);
    }
</script>

</body>
</html>
