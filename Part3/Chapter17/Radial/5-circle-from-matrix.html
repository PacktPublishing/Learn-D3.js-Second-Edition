<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Radial network: circle diagram - from a matrix of values</title>
    <style>
        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 20px;
            alignment-baseline: central;
            text-anchor: middle;
            fill: white;
            font-weight: bold;
            pointer-events: none;
        }
        .faded {
            opacity: .3;
        }
        .active {
            opacity: 1;
        }
    </style>
</head>
<body>
<h1>Radial network: circle diagram - from a matrix of values</h1>
<p>This chart uses a custom layout generator available in the <code>js/network-utils.js</code> module.</p>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import * as nwu from "../js/network-utils.js";

    const dim = {width: 600, height: 600, margin: 50};
    const chart = d3.select("body").append("svg").attr("width", dim.width).attr("height", dim.height)
                    .append("g").attr("transform", `translate(${[dim.width/2, dim.height/2]})`);

    const color = d3.scaleOrdinal(d3.schemeCategory10);

    const matrix = [
        [0,3,3,3,0,0,0,2,4],
        [3,0,5,0,0,0,0,0,0],
        [8,5,0,6,0,0,4,0,0],
        [9,0,8,0,9,0,0,0,0],
        [0,0,0,9,0,8,0,0,0],
        [0,0,0,0,9,0,7,8,0],
        [0,0,9,0,0,7,0,7,0],
        [3,0,0,0,0,8,6,0,7],
        [4,0,0,0,0,0,0,9,0]
    ];

    const nodes = ['A','B','C','D','E','F','G','H','I'];

    const edges = nwu.matrixToLinks(nodes, matrix);

    const circleLayout = nwu.circleDiagram()
                            .size([dim.width - dim.margin, dim.height - dim.margin]);

    const data = circleLayout(nodes, edges);

    color.domain([0, d3.max(edges, d => d.value)]);

    const widthScale = d3.scaleLinear()
                         .range([2,10])
                         .domain([0, d3.max(edges, d => d.value)]);

    const radialLink = d3.linkRadial().angle(d => d.angle).radius(d => d.radius);

    chart.selectAll("path")
         .data(data.links())
            .join("path")
                .attr("d", radialLink)
                .style("stroke-width", d => widthScale(d.value))
                .style("stroke", d => color(d.source.index))
                .style("stroke-opacity", .3)
                .style("fill", 'none');

    chart.selectAll("g.node")
         .data(data.nodes())
            .join("g")
                .attr("class", "node")
                .attr("transform", d => `translate(${d3.pointRadial(d.angle, d.radius)})`)
                .each(function(d,i) {
                    d3.select(this).append("circle")
                        .attr("r", 15)
                        .style("fill", color(d.index))
                    d3.select(this).append("text")
                        .text(nodes[i]);
        });

    d3.selectAll("g.node")
        .on("mouseover", highlight)
        .on("mouseout", () => d3.selectAll("path, circle").classed('faded', false));

    function highlight(evt, d) {
        d3.selectAll("path")
            .classed('faded', s => !(s.source === d || s.target === d));
        d3.selectAll("circle")
            .classed('faded', n => !(n === d || n.sources.filter(s => s.target === d).length > 0
                                             || n.targets.filter(s => s.source === d).length > 0));
    }
</script>
</body>
</html>
