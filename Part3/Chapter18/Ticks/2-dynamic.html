<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple simulation with one force</title>
    <link rel="stylesheet" href="css/force.css">
</head>
<body>
<div id="label">Ticks</div>
<p>Open your console and inspect the <code>nodes</code> array to see the added properties.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {nodes, draw, redraw} from "./js/force.js";

    // The nodes, page and drawing code (draw and redraw) were moved to force.js

    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    sim.force("manybody", d3.forceManyBody());  // Added a force to make the nodes repel each other
    sim.on("tick", ticked);
    draw();

    let ticks = 0;
    function ticked() {
        d3.select("#label").text('Tick: ' + ++ticks);
        redraw();
    }

    // For access in the console
    window.nodes = nodes;
</script>
</body>
</html>
