<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Static simulation controlling ticks programmatically</title>
    <link rel="stylesheet" href="css/force.css">
</head>
<body>
<div id="label">Ticks</div>
<p>Open your console and inspect the <code>nodes</code> array to see the added properties.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {nodes, draw, redraw} from "./js/force.js";

    // See nodes, page and drawing code in force.js

    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    sim.force("manybody", d3.forceManyBody());
    sim.stop();
    draw();

    const interval = d3.interval(ticked, 500);

    let ticks = 0;
    const maxTicks = 50;

    function ticked() {
        if(ticks < maxTicks) {
            sim.tick();
            d3.select("#label").text('Tick: ' + ++ticks + ' of ' + maxTicks);
            redraw();
        } else {
            interval.stop();
        }
    }

    // For access in the console
    window.nodes = nodes;
</script>
</body>
</html>
