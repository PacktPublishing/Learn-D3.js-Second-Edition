<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Static simulation with user-controlled ticks</title>
    <link rel="stylesheet" href="css/force.css">
</head>
<body>
<div id="label">Ticks</div>
<p>Open your console and inspect the <code>nodes</code> array, between ticks, to see the added properties changing.</p>
<div>
    <button id="tickerBtn">Click to tick()</button>
</div>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {nodes, draw, redraw} from "./js/force.js";

    // See nodes, page and drawing code in force.js

    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    console.log(nodes)
    sim.force("manybody", d3.forceManyBody());
    sim.stop();
    draw();

    d3.select("#tickerBtn").on('click', ticked)

    let ticks = 0;
    function ticked() {
        sim.tick();
        d3.select("#label").text('Tick: ' + ++ticks);
        redraw();
    }

    // For access in the console
    window.nodes = nodes;
</script>
</body>
</html>
