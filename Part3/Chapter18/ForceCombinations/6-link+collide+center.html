<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiple forces: link+collide+center</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {nodes, links, draw, redraw} from "./js/combinations.js";

    const sim = d3.forceSimulation(nodes);

    sim.force("center", d3.forceCenter()) // without center, the forces will pull the nodes out of view
       .force("link", d3.forceLink(links).iterations(100))
       .force("collide", d3.forceCollide(20).iterations(10))
       .on("tick", redraw);

    draw(nodes);
</script>
</body>
</html>
