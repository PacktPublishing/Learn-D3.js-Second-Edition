<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiple forces: manybody+attract+collide with different node radius</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {nodes, links, draw, redraw} from "./js/combinations.js";

    const radius = d3.scaleLinear()
                     .range([10,50])
                     .domain(d3.extent(nodes, d => d.value));

    const sim = d3.forceSimulation(nodes);

    const manyBody = d3.forceManyBody();
    sim.force("manybody", manyBody);

    for(let i = 0; i < 45; i++) {
        sim.tick();
    } // start separated

    manyBody.strength(100);
    sim.force("collide", d3.forceCollide(d => radius(d.value)).iterations(10));

    manyBody.strength(100);
    sim.force("collide", d3.forceCollide(15).iterations(10));
    sim.on("tick", redraw);

    draw(nodes);
</script>
</body>
</html>
