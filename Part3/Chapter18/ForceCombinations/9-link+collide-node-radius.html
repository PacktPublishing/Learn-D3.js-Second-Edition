<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiple forces: link+collide with different node radius</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {nodes, links, draw, redraw} from "./js/combinations.js";

    const radius = d3.scaleLinear()
                     .range([10,50])
                     .domain(d3.extent(nodes, d => d.value));

    d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).iterations(10).strength(.95))
        .force("collide", d3.forceCollide(d => radius(d.value)).iterations(20))
        .on("tick", redraw);

    draw(nodes, links, d => radius(d.value));
</script>
</body>
</html>
