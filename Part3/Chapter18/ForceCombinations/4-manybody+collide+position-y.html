<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiple forces: manybody+collide+positionY</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {nodes, links, draw, redraw} from "./js/combinations.js";

    links.splice(links.length - 4, 4);
    links.filter((d, i) => i < 4).forEach(d => d.value = 2);
    console.log(links)

    d3.forceSimulation(nodes)
        .force("center", d3.forceCenter())
        .force("manybody", d3.forceManyBody().strength(30))
        .force("collide", d3.forceCollide(15).iterations(50))
        .force("y", d3.forceY(0).strength(.9))
        .on("tick", redraw);

    draw(nodes);
</script>
</body>
</html>
