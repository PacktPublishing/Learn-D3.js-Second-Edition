<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid with no force</title>
    <link rel="stylesheet" href="../css/force-examples.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {drawReferenceBackgroundGrid, updateChart, drawChart} from "../js/force-examples.js";

    const nodes = [
        {node: 'A', value: 79},
        {node: 'B', value: 15},
        {node: 'C', value: 24},
        {node: 'D', value: 44},
        {node: 'E', value: 125},
        {node: 'F', value: 22},
        {node: 'G', value: 20},
        {node: 'H', value: 64},
        {node: 'I', value: 69},
    ];
    drawReferenceBackgroundGrid(nodes);

    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    // no force

    // Update on ticks
    sim.on("tick", updateChart);

    // Dragging behavior
    const nodeDragged = d3.drag()
        .on('drag', function(evt, d) {
            d.x = evt.x;
            d.y = evt.y;
            if(sim.alpha() < .05) {
                sim.alpha(.05);
                sim.restart();
            }
        });

    const chart = drawChart(nodes);
    chart.selectAll("g.simulation").call(nodeDragged);

</script>
</body>
</html>
