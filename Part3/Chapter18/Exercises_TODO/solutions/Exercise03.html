<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 17.1: a simple force-directed graph using data from a CSV file</title>
    <style>
        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 10px;
            alignment-baseline: central;
            text-anchor: middle;
        }

        line {
            fill: none;
            stroke: black;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    const dataFile = "../../data/cities15000.csv";

    const dim = { width: 1000, height: 800, margin: 40 };
    const offsetX = dim.margin / 2 + dim.width / 2;
    const offsetY = dim.margin / 2 + dim.height / 2;
    const svg = d3.select("body").append("svg")
                    .attr("width", dim.width + dim.margin)
                    .attr("height", dim.height + dim.margin);
    const chart = svg.append("g")
                     .attr("transform", `translate(${[offsetX, offsetY]})`);

    // Get the data
    const data = await d3.dsv(";", dataFile);

    // Prepare the nodes array
    const nodes = [];

    // A color scale
    const color = d3.scaleOrdinal(d3.schemeCategory10);

    // Populate the nodes array with cities with at least 4 million inhabitants
    data.forEach(city => {
        if(city.population >= 4000000) {
            nodes.push({
                name: city.asciiname,
                population: +city.population,
                continent: city.timezone.split("/")[0]
            });
        }
    });

    nodes.sort((a, b) => d3.descending(a.population, b.population));

    const continents = Array.from(new Set(nodes.map(d => d.continent)));
    color.domain(continents);

    // A scale for populations
    const popScale = d3.scaleSqrt()
                        .range([0, 60])
                        .domain([0, d3.max(nodes, d => d.population)]);

    // The simulation
    const sim = d3.forceSimulation(nodes);
    sim.force("collide", d3.forceCollide(d => popScale(d.population) + 3));
    sim.force("manybody", d3.forceManyBody().strength(.05));
    sim.force("y", d3.forceY(0).strength(0.05));
    sim.on("tick", redraw);

    draw();

    function draw() {
        chart.selectAll("g.node")
             .data(nodes, d => d.id)
             .join(
                enter => {
                    const nodeEnter = enter.append("g")
                        .attr("class", "node");
                    nodeEnter.append("circle")
                        .attr("r", d => popScale(d.population))
                        .attr("fill", d => color(d.continent))
                        .attr("stroke", "black");
                    nodeEnter.append("text")
                        .text(d => d.name)
                        .attr("fill", d => contrast(color(d.continent)));
                },
                update => update,
                exit => exit.remove()
             );
    }

    function redraw() {
        chart.selectAll("g.node")
             .attr("transform", d => `translate(${[d.x, d.y]})`);
    }

    function contrast(color, darker = false) {
        const c = d3.hsl(darker ? color : d3.color(color).darker());
        return c.l > .3 ? 'black' : 'white';
    }
</script>

</body>
</html>
