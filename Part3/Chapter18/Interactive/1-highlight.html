<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Highlighting nodes and connections</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        text {
            pointer-events: none;
        }
        .faded {
            opacity: .2;
        }
        .highlight {
            stroke-width: 3;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {links, nodes, chart, dim, draw, redraw} from "./js/alphabet.js";

    const offsetX = dim.margin/2 + dim.width/2;
    const offsetY = dim.margin/2 + dim.height/2;
    chart.attr("transform", `translate(${[offsetX,offsetY]})`);

    const sim = d3.forceSimulation(nodes)
                  .force("center", d3.forceCenter())
                  .force("link", d3.forceLink(links).iterations(15))
                  .force("collide", d3.forceCollide(30).iterations(10));
    sim.on("tick", redraw);
    draw();

    // Highlighting setup
    chart.selectAll('g.node')
         .on("mouseover", highlightNode)
         .on("mouseout", fade);

    // Highlighting functions
    // Highlight selected node, connected links and connected nodes
    function highlightNode(evt, node) { console.log("node")
        d3.selectAll("g.node").classed('highlight', d => d === node);
        d3.selectAll("g.node").classed('faded', d => !(d === node
                                || links.filter(k => k.source === node).filter(m => m.target === d).length > 0
                                || links.filter(k => k.target === node).filter(m => m.source === d).length > 0));
        d3.selectAll("line").classed('faded', edge => !(edge.source === node || edge.target === node ));
    }
    // Fade all highlights
    function fade() {
        d3.selectAll("g.node, line").classed('faded highlight', false);
    }

</script>
</body>
</html>
