<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find and highlight nearest node</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .highlight circle {
            stroke-width: 5;
            stroke: pink;
            fill: black;
            r: 25px;
        }
        .highlight text {
            font-size: 150%;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {links, nodes, chart, dim, draw, redraw} from "./js/alphabet.js";

    const offsetX = dim.margin/2 + dim.width/2;
    const offsetY = dim.margin/2 + dim.height/2;
    chart.attr("transform", `translate(${[offsetX,offsetY]})`);

    // Simulation setup
    const sim = d3.forceSimulation(nodes)
        .force("center", d3.forceCenter())
        .force("link", d3.forceLink(links).iterations(15))
        .force("manybody", d3.forceManyBody().strength(-30))
        .force("collide", d3.forceCollide(30));
    sim.on("tick", redraw);

    draw();

    // Attach handler to highlight nearest node on click
    d3.select("svg")
        .on('click', function(evt) {
            const nearest = findNearestNode(evt);
            d3.selectAll('.node').classed('highlight', d => d === nearest);
        });

    draw();

    function findNearestNode(evt) {
        const [px, py] = d3.pointer(evt);
        return sim.find(px - offsetX, py - offsetY);
    }

</script>
</body>
</html>
