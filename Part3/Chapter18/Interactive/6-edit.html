<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adding and removing nodes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {links, nodes, chart, dim, draw, redraw} from "./js/alphabet.js";

    const offsetX = dim.margin/2 + dim.width/2;
    const offsetY = dim.margin/2 + dim.height/2;
    chart.attr("transform", `translate(${[offsetX,offsetY]})`);

    // Simulation setup
    const sim = d3.forceSimulation(nodes)
                  .force("center", d3.forceCenter())
                  .force("link", d3.forceLink(links).iterations(15))
                  .force("manybody", d3.forceManyBody().strength(-30))
                  .force("collide", d3.forceCollide(30));
    sim.on("tick", redraw);

    // Handle click events on the background (not nodes) to ADD NODES
    d3.select("svg").on('click', function(evt) {
       addNode.call(this, evt);
    });

    draw();

    // Handle click events on nodes to REMOVE NODES
    chart.selectAll("g.node").on('click', removeNode);

    // Add dragging behavior to nodes - this is also called in addNode for new nodes
    const nodeDragged = d3.drag()
        .on('drag', function(evt, d) {
            d.fx = evt.x;
            d.fy = evt.y;
        })
        .on('start', function() {
            if(sim.alpha() <= sim.alphaMin()) {
                sim.restart();
            }
            sim.alphaTarget(sim.alphaMin() + .1)
        })
        .on('end', () => sim.alphaTarget(0));
    chart.selectAll('g.node').call(nodeDragged);

    // Add zooming behavior to the SVG
    d3.select("svg").call(d3.zoom()
        .on('zoom', function(evt) {
            chart.attr("transform",
                evt.transform.translate(offsetX, offsetY));
        }));

    // Find the nearest node to the given event coordinates.
    // Since we are using zoom in this example, the coordinates need to be transformed.
    function findNearestNode(evt) {
        const [px, py] = d3.pointer(evt);
        const t = d3.zoomTransform(d3.select("svg").node());
        const [lx, ly] = t.invert([px, py]);
        return sim.find(lx - offsetX, ly - offsetY);
    }

    function reheatSimulation() {
        if (sim.alpha() < .05) {
            sim.alpha(.05);
            sim.restart();
        }
    }

    // Remove a node and its associated links
    function removeNode(evt, d) {
        evt.stopPropagation();

        const idx = nodes.indexOf(d);
        if (idx === -1) return;
        nodes.splice(idx, 1); // Remove node from data

        // Remove associated links
        for (let i = links.length - 1; i >= 0; i--) {
            if (links[i].source.index === idx || links[i].target.index === idx) {
                links.splice(i, 1);
            }
        }

        // Update simulation
        sim.nodes(nodes);
        sim.force("link").links(links).initialize(nodes);

        // Update DOM and reheat simulation
        draw();
        reheatSimulation();
    }

    // Add a new node connected to the nearest existing node
    function addNode(evt) {
        const nearest = findNearestNode(evt);
        if (!nearest) return;

        // Node name = source node's name + count of existing links from it + 1
        const newNode = { node: nearest.node + (links.filter(n => n.source === nearest).length + 1)};
        nodes.push(newNode);

        // create link connecting the newly added node
        const newLink = { source: nearest.index, target: nodes.length-1, value: 1 };
        links.push(newLink);

        sim.nodes(nodes);
        sim.force("link").links(links).initialize(nodes);

        draw();  // update DOM

        // Add dragging and node removal behavior to new node
        d3.select(`#${newNode.node}`)
            .on('click', removeNode)
            .call(nodeDragged);

        reheatSimulation();
    }

</script>
</body>
</html>
