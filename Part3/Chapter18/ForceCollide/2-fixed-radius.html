<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>forceCollide - fixed radius</title>
    <link rel="stylesheet" href="../css/force-examples.css">
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import {drawReferenceBackgroundCenter, updateChart, drawChart, setup} from "../js/force-examples.js";

    setup(800, 400);

    const nodes = [
        {node: 'A', value: 50},
        {node: 'B', value: 45},
        {node: 'C', value: 40},
        {node: 'D', value: 35},
        {node: 'E', value: 30},
        {node: 'F', value: 25},
        {node: 'G', value: 20},
        {node: 'H', value: 15},
        {node: 'I', value: 10},
    ];

    drawReferenceBackgroundCenter(nodes);


    // SIMULATION
    const sim = d3.forceSimulation(nodes);
    sim.force("collide", d3.forceCollide(15));

    // Update on ticks
    sim.on("tick", updateChart);

    // Results
    drawChart(nodes);  // Using fixed default radius for circles (15 pixels)

</script>
</body>
</html>
