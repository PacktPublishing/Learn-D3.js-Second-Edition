<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="https://d3js.org/d3-geo-projection.v2.min.js"></script>
    <style>
        text {
            font-family: "Yanone Kaffeesatz", sans-serif;
        }
        text.parallels, text.meridians {
            font-size: 12px;
            fill-opacity: .4
        }
        .highlight, .highlight path {
            fill: lightgreen;
            fill-opacity: 1;
        }
        .country {
            stroke-width: .1;
            stroke: white;
        }
        svg {
            border: solid 1px
        }
    </style>
</head>
<body>
<script>
    const width = 450;
    const height = 450;

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);
    const projection = d3.geoChamberlinAfrica().scale(300).translate([200,225]).center([13,3]);
    const geoPath = d3.geoPath().projection(projection);

    const data = {}

    d3.json('Data/world2.geojson')
    d3.json('Data/ne_10m_admin_0_countries.json')
    .then(countries => {
        data.features = countries.features.filter(d => d.properties.CONTINENT == "Africa");
        svg.append("path").attr("class","country").style("fill-opacity", .4)
        drawCountries();

        // merge not africa
        // africa topojson
    });

    function drawCountries() {
        svg.selectAll("g.country")
                .data(data.features)
                .enter()
                .append("g")
                .attr("class","country")
                .style("fill-opacity", .4)
                .append("path")
                    .attr('d', geoPath)
    }
</script>

</body>
</html>
