<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 7.4 - Apply date/time formatting</title>
    <style>
        path.line {
            stroke-width: .5px;
            fill: none;
        }
        h1, p {
            font-family: sans-serif;
        }
        svg {
            border: solid 1px #ccc;
            position: absolute;
        }
        button {
            position: relative;
            top: 10px;
            left: 10px;
        }
    </style>
</head>
<body>
<h1>Global temperature anomaly from 1915 to 2024</h1>
<p>Based on the NASA GISS reference (https://data.giss.nasa.gov/gistemp/)</p>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const data = [[new Date(1915, 1, 27),-0.14],[new Date(1916, 1, 27),-0.36],[new Date(1917, 1, 27),-0.46],[new Date(1918, 1, 27),-0.29],[new Date(1919, 1, 27),-0.28],[new Date(1920, 1, 27),-0.27],[new Date(1921, 1, 27),-0.18],[new Date(1922, 1, 27),-0.28],[new Date(1923, 1, 27),-0.26],[new Date(1924, 1, 27),-0.27],[new Date(1925, 1, 27),-0.22],[new Date(1926, 1, 27),-0.10],[new Date(1927, 1, 27),-0.21],[new Date(1928, 1, 27),-0.20],[new Date(1929, 1, 27),-0.36],[new Date(1930, 1, 27),-0.15],[new Date(1931, 1, 27),-0.09],[new Date(1932, 1, 27),-0.16],[new Date(1933, 1, 27),-0.28],[new Date(1934, 1, 27),-0.12],[new Date(1935, 1, 27),-0.19],[new Date(1936, 1, 27),-0.14],[new Date(1937, 1, 27),-0.03],[new Date(1938, 1, 27),0.00],[new Date(1939, 1, 27),-0.02],[new Date(1940, 1, 27),0.13],[new Date(1941, 1, 27),0.19],[new Date(1942, 1, 27),0.07],[new Date(1943, 1, 27),0.09],[new Date(1944, 1, 27),0.21],[new Date(1945, 1, 27),0.09],[new Date(1946, 1, 27),-0.07],[new Date(1947, 1, 27),-0.02],[new Date(1948, 1, 27),-0.10],[new Date(1949, 1, 27),-0.11],[new Date(1950, 1, 27),-0.17],[new Date(1951, 1, 27),-0.07],[new Date(1952, 1, 27),0.01],[new Date(1953, 1, 27),0.08],[new Date(1954, 1, 27),-0.13],[new Date(1955, 1, 27),-0.14],[new Date(1956, 1, 27),-0.19],[new Date(1957, 1, 27),0.05],[new Date(1958, 1, 27),0.06],[new Date(1959, 1, 27),0.03],[new Date(1960, 1, 27),-0.02],[new Date(1961, 1, 27),0.06],[new Date(1962, 1, 27),0.03],[new Date(1963, 1, 27),0.05],[new Date(1964, 1, 27),-0.20],[new Date(1965, 1, 27),-0.11],[new Date(1966, 1, 27),-0.06],[new Date(1967, 1, 27),-0.02],[new Date(1968, 1, 27),-0.08],[new Date(1969, 1, 27),0.05],[new Date(1970, 1, 27),0.03],[new Date(1971, 1, 27),-0.08],[new Date(1972, 1, 27),0.01],[new Date(1973, 1, 27),0.16],[new Date(1974, 1, 27),-0.07],[new Date(1975, 1, 27),-0.01],[new Date(1976, 1, 27),-0.10],[new Date(1977, 1, 27),0.18],[new Date(1978, 1, 27),0.07],[new Date(1979, 1, 27),0.16],[new Date(1980, 1, 27),0.25],[new Date(1981, 1, 27),0.32],[new Date(1982, 1, 27),0.14],[new Date(1983, 1, 27),0.31],[new Date(1984, 1, 27),0.15],[new Date(1985, 1, 27),0.12],[new Date(1986, 1, 27),0.18],[new Date(1987, 1, 27),0.32],[new Date(1988, 1, 27),0.39],[new Date(1989, 1, 27),0.27],[new Date(1990, 1, 27),0.45],[new Date(1991, 1, 27),0.40],[new Date(1992, 1, 27),0.22],[new Date(1993, 1, 27),0.23],[new Date(1994, 1, 27),0.31],[new Date(1995, 1, 27),0.44],[new Date(1996, 1, 27),0.33],[new Date(1997, 1, 27),0.46],[new Date(1998, 1, 27),0.61],[new Date(1999, 1, 27),0.38],[new Date(2000, 1, 27),0.39],[new Date(2001, 1, 27),0.53],[new Date(2002, 1, 27),0.63],[new Date(2003, 1, 27),0.61],[new Date(2004, 1, 27),0.53],[new Date(2005, 1, 27),0.68],[new Date(2006, 1, 27),0.64],[new Date(2007, 1, 27),0.66],[new Date(2008, 1, 27),0.54],[new Date(2009, 1, 27),0.65],[new Date(2010, 1, 27),0.72],[new Date(2011, 1, 27),0.61],[new Date(2012, 1, 27),0.65],[new Date(2013, 1, 27),0.68],[new Date(2014, 1, 27),0.75],[new Date(2015, 1, 27),0.89],[new Date(2016, 1, 27),1.01],[new Date(2017, 1, 27),0.92],[new Date(2018, 1, 27),0.85],[new Date(2019, 1, 27),0.97],[new Date(2020, 1, 27),1.01],[new Date(2021, 1, 27),0.84],[new Date(2022, 1, 27),0.89],[new Date(2023, 1, 27),1.17],[new Date(2024, 1, 27),1.29]];
    const dim = { width: 800, height: 800, margin: {x: 75, y: 25} };
    const svg = d3.select("body").append("svg").attr("height", dim.height).attr("width", dim.width);
    const view = svg.append("g").attr("transform", `translate(${dim.margin.x}, ${dim.margin.y})`);

    // EXERCISE 4: Change the date format.
    // Replace new Date(d) with a function that returns a shorter string (the year, a short date - decide what is best).
    // Use a function from the d3-time-format library:
    const dateString = d => new Date(d);
    ////////////////////////////////////////////////////

    // Scales
    const scale = {
        date: d3.scaleLinear()
                .range([dim.margin.y, dim.height - dim.margin.y * 2])
                .domain([new Date(1915,1,27), new Date(2024,12,27)]),
        temp: d3.scaleLinear()
                .range([dim.margin.x, dim.width - dim.margin.x / 2])
                .domain([-1, 2])
    }

    // Line function
    const line = d3.line().y(d => scale.date(d[0]))
                          .x(d => scale.temp(d[1]));

    // Render temperature line
    view.append("path").attr("class", "line")
        .datum(data)
           .attr("d", line)
        .style("stroke-width", 2)
           .style("stroke", "red");

    // The x-axis
    const xAxis = view.append("g");
    const xTicks = d3.ticks(-1, 1.5, 10);
    xAxis.selectAll("line")
         .data(xTicks)
             .join("line")
                 .attr("y1", 0)
                 .attr("y2", dim.height - dim.margin.y * 2)
                 .attr("x1", d => scale.temp(d))
                 .attr("x2", d => scale.temp(d))
                 .style("stroke", "#ccc");
    xAxis.selectAll("text")
         .data(xTicks)
             .join("text")
                 .attr("y", dim.height - dim.margin.y * 2 + 5)
                 .attr("x", d => scale.temp(d))
                 .style("text-anchor", "middle")
                 .style("alignment-baseline", "hanging")
                 .text(d => d3.format(".1f")(d));

    // The y-axis
    const yAxis = view.append("g");
    const yTicks = d3.ticks(new Date(1880,1,15), new Date(2024,12,15), 20);
    yAxis.selectAll("line")
         .data(yTicks)
             .join("line")
                 .attr("x1", 0)
                 .attr("x2", dim.width - dim.margin.x * 2)
                 .attr("y1", d => scale.date(d))
                 .attr("y2", d => scale.date(d))
                 .style("stroke", "#ccc");
    yAxis.selectAll("text")
         .data(yTicks)
             .join("text")
                 .attr("x", -dim.margin.x * .6)
                 .attr("y", d => scale.date(d))
                 .style("text-anchor", "start")
                 .style("alignment-baseline", "middle")
                 .text(dateString);
</script>

</body>
</html>
