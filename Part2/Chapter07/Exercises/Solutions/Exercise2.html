<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 7.2 - Generating grid coordinates</title>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    // Datasets
    const rows =[1,2,3,4,5,6,7,8];
    const cols = ['a','b','c','d','e','f','g','h'];

    // EXERCISE 2:
    // a) Cross rows and columns to obtain all combinations
    // and return an array of objects. Each object should
    // have name, row and col properties (e.g. {name: 'a1', row: 1, col: 'a'} )
    const data = d3.cross(rows, cols, (row,col) => (
            { name: col+row,
              col: col,
              row: row,
            }));

    // b) Inspect the result in the console
    console.log(data);

    // c) When the data array is populated, the rest of the code renders a chessboard

    // Render the result with SVG rectangles
    const size = 50;
    const svg = d3.select("body")
                    .append("svg")
                    .attr("width", size * cols.length)
                    .attr("height", size * rows.length);

    // Utility functions
    const color = d => (rows.indexOf(d.row) + cols.indexOf(d.col)) % 2 === 0 ? 'burlywood' : d3.color('saddlebrown').darker();
    const xPos = d => cols.indexOf(d.col) * size;
    const yPos = d => (8 - rows.indexOf(d.row)) * size - size;

    // Draws the squares
    svg.selectAll("rect")
       .data(data)
         .join("rect")
          .attr("x", xPos)
          .attr("y", d => yPos(d))
          .attr("width", size)
          .attr("height", size)
          .style("fill", color)
          .style("stroke", "white");

    // Places text labels on the squares
    svg.selectAll("text")
         .data(data)
              .join("text")
                .attr("x", d => xPos(d) + size/2)
                .attr("y", d => yPos(d) + size/2)
                .style("text-anchor", "middle")
                .style("alignment-baseline", "central")
                .style("font-size", "20px")
                .style("fill", d => d3.hsl(color(d)).l > 0.5 ? 'black' : 'white')
                .style("font-family", "Arial")
                .text(d => d.name);

    // For testing in the console
    window.d3 = d3;
    window.data = data;

</script>

</body>
</html>
