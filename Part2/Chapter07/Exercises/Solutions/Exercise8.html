<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 7.8 - Creating a histogram</title>
    <style>
        svg {
            border: solid 1px #ccc;
        }

        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 9px;
        }
        text.count {
            alignment-baseline: central;
        }
        text.bins {
            text-anchor: start;
            alignment-baseline: hanging;
        }
    </style>
</head>
<body>
<h3>Distribution of asteroid diameters, by size in km</h3>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const dataFile = "../../data/sol_2019.json"; // check file location

    const rawData = await d3.json(dataFile);
    console.log(rawData);

    // Asteroids dataset
    const data = rawData.asteroids.map(d => ({ name: d.name, diameter: d.diameterKm }));
    console.log(data);

    const dim = {
        width: 900,
        height: 400,
        margin: { top: 20, right: 20, bottom: 50, left: 20 }
    };

    const svg = d3.select("body")
                  .append("svg")
                    .attr("width", dim.width)
                    .attr("height", dim.height);

    // EXERCISE 7.8 - Create a histogram for the diameters of the asteroids
    // 1) Create the bins
    const numBins = 50;
    const bins = d3.bin()
                  .thresholds(numBins)
                  .value(d => d.diameter)(data);
    console.log(data.bins);

    // 3) Draw the chart
    // a) Scales
    const scale = {
        x: d3.scaleBand()
              .domain(bins.map(d => d.x0)) // bin start values
              .range([dim.margin.left, dim.width - dim.margin.right])
              .padding(0.1),
        y: d3.scaleLinear()
              .domain([0, d3.max(bins, d => d.length)]) // max count in bins
              .range([dim.height - dim.margin.bottom, dim.margin.top])
    }

    // b) Bars
    svg.selectAll("rect")
       .data(bins)
         .join("rect")
           .attr("x", d => scale.x(d.x0))
           .attr("y", d => scale.y(d.length))
           .attr("width", scale.x.bandwidth())
           .attr("height", d => scale.y(0) - scale.y(d.length))
           .attr("fill", "orange");

    // Label below the bars for the diameter ranges
    svg.selectAll("text.bins")
       .data(bins)
         .join("text").attr("class", "bins")
           .attr("x", d => scale.x(d.x0) + scale.x.bandwidth() / 2)
           .attr("y", scale.y(0) + 2)
           .attr("transform", d => `rotate(45, ${scale.x(d.x0) + scale.x.bandwidth() / 2}, ${scale.y(0) + 2})`)
           .text(d => d.length > 0 ? `${d.x0}-${d.x1}` : "");

    // Label above the bars for the counts, and the name of the asteroid if only one
    svg.selectAll("text.count")
         .data(bins)
           .join("text")
             .attr("class", "count")
             .attr("x", d => scale.x(d.x0) + scale.x.bandwidth() / 2)
             .attr("y", d => scale.y(d.length) - 5)
             .style("text-anchor", d => d.length === 1 ? "start" : "middle")
             .attr("transform", d => d.length === 1 ? `rotate(-90, ${scale.x(d.x0) + scale.x.bandwidth() / 2}, ${scale.y(d.length) - 5})` : "")
             .text(d => d.length === 1 ? `${d[0].name} (${d[0].diameter} km)` : d.length > 1 ? d.length : "");

    // For testing in the console
    window.d3 = d3;
</script>

</body>
</html>
