<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spline interpolation</title>
    <style>
        text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 24px;
            text-anchor: middle;
            alignment-baseline: middle;
            fill: navy;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    const height=500, width=700;

    const points = [300,0,600];
    const inter = d3.interpolateBasis(points);

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);
    const text = svg.append("text")
            .attr("x", width/2)
            .attr("y", height/2)
            .text('');

    const color = d3.scaleSequential(d3.interpolateSinebow).domain(points);

    const format = d3.format('.0f');
    const percent = d3.format('.0%');

    // The circle will show the smooth zooming effect
    svg.transition()
            .duration(5000)
            .delay(500)
            .tween("position", function(d) {
                return function(t) {
                    const v = inter(t);

                    text.text(`t: ${percent(t)}, v: ${format(v)}`);

                    svg.append("circle")
                            .style("fill", color(v))
                            .attr("r", 25)
                            .attr("cx", v + 50)
                            .attr("cy", (t * 400) + 50);
                }
            })

</script>
</body>
</html>
