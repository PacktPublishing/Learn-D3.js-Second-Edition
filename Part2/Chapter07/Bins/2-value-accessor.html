<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bins - An example using object arrays</title>
</head>
<body>
<h3>Open console to see results</h3>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const dataFile = "../data/sol_2019.json"; // check file location

    // Load and parse the data
    const data = await d3.json(dataFile);
    console.log(data.asteroids); // check

    // Use value() to determine which property to bin on
    const bin2 = d3.bin().value(d => d.diameterKm);
    const bins = bin2(data.asteroids);
    console.log(bins);

    // For testing in the console
    window.d3 = d3;
</script>
</body>
</html>
