<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bins</title>
</head>
<body>
<h3>Open console to see results</h3>
<svg width="100%" height="100%" viewBox="0 0 500 300"/>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const bin1 = d3.bin()

    const data = [15, 9, 2, 13, 20, 7, 19, 6, 21, 3, 0, 1, 5]   // Array(13)
    const bins = bin1(data);

    // Initial bins (using Sturges' formula to compute thresholds, which is the default)
    console.log("bins", bins);  		                    // A 5-element array. Each element is a bin (array)

    console.log("bins[1]", bins[1]);			            // [9,7,6,5]
    console.log("bins[1].length", bins[1].length);		    // 4
    console.log("bins[1].x0", bins[1].x0);			        // 5
    console.log("bins[1].x1", bins[1].x1);			        // 10

    console.log("Thresholds:", bins.map(d => d.x0));   // [0, 5, 10, 15, 20]

    // Using domain to restrict the input data
    bin1.domain([5,10])
    console.log("After bin1.domain([5,10])", bin1(data)) // [[5],[6],[7],[],[9]]



    window.d3 = d3;
    window.bin1 = bin1;

</script>

</body>
</html>
