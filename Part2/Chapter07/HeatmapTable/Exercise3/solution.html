<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Step-by-step: creating a heatmap</title>
</head>
<body>
<h1>Rainfall in São Paulo, Brazil (in mm) from 1984 to 2017</h1>
<svg height="500" width="1400">
    <g id="heatmap" transform="translate(40,20)"></g>
</svg>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    const dataFile = "../../data/rain_sao_paulo_tidy.csv"; // check file location

    // Step 1 - Load and parse the data
    const data = await d3.csv(dataFile, d3.autoType);

    // Step 2 - Nest by month, then year
    const nested = d3.rollups(data, v => v[0].Rain,   // reduce function
                                    d => d.Month,     // first key
                                    d => d.Year);     // second key

    // Step 3 - Create the main group
    const table = d3.select("#heatmap");

    // bind months to groups ()
    const tr = table.selectAll(".month")
                    .data(nested)  // contains 12 arrays
                       .join("g").attr("class", "month")
                            .attr("transform", m => `translate(0,${m[0] * 20})`) // space out the rows
    tr.append("title", m => m[0]) // a title tag indicating the month

    // bind years to columns
    const td = tr.selectAll(".year")
                  .data(m => m[1])    // m = [month, Array(34)]
                     .join("g").attr("class", "year");

    td.attr("title", y => y[0])  // y = [year, rain]
    td.append("rect")
        .attr("rx", 10)
        .attr("ry", 10)
        .attr("width", 40)
        .attr("height", 20)
        .attr("x", (d,i) => i * 40) // space out the rectangles
        .attr("stroke", "white");
    td.append("text")
        .attr("x", (d,i) => i * 40 + 20) // center the text in the rectangle
        .attr("y", 14) // center the text in the rectangle
        .attr("text-anchor", "middle")
        .text(y => y[1]);          // the data-value (rain in mm)

    // Step 4 - add headers

    const fmt = d3.timeFormat("%b");

    // insert a column for month labels
    const th = tr.append("g")
                    .attr("class", "month-label")
                        .append("text")
                            .attr("x", -20) // center the text in the rectangle
                            .attr("y", 14) // center the text in the rectangle
                            .attr("text-anchor", "middle")
                            .text(m => fmt(new Date().setMonth(m[0]-1))) // Jan, Feb, etc.

    // insert a row for year labels
    const header = table.append("g")
                        .attr("class", "header-row");

    // get any month to retrieve the years
    header.selectAll("g.year-label")
          .data(nested[0][1]) // any month
            .join("g").attr("class", "year-label")
                .append("text")
                    .attr("x", (d,i) => i * 40 + 20) // center the text in the rectangle
                    .attr("y", 14) // center the text in the rectangle
                    .attr("text-anchor", "middle")
                    .text(y => y[0]) // the year

    // Step 5 - heatmap
    const color = d3.scalePow().exponent(.5) // color function for the heatmap
                    .domain(d3.extent(data, d => +d.Rain));

    // Creates a heatmap
    const y = d3.selectAll(".year")
    y.select("rect")
        .style("fill", y => d3.interpolateYlGnBu(color(y[1])))
    y.select("text")
        .style("fill", y => color(y[1]) > .5 ? 'white' : 'black');

    // Footer
    table.append("text")
         .attr("x", 0)
         .attr("y", 280)
         .text("source: inmet.gov.br")
         .attr("font-size", "12px");

</script>
</body>
</html>
