<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced joins with separate enter, update and exit steps</title>
    <style>
        svg { border: solid gray 1px }
    </style>
</head>
<body>

<svg height="100" width="600"></svg>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    apply("Initial update", [5,10,15,20,25])
    setTimeout(apply, 2000, "Removing update", [19,15,26])
    setTimeout(apply, 4000, "Adding update", [12,15,9,3,15,18])

    function apply(label, data) {
        d3.select("svg")
          .selectAll("circle")
            .data(data)
              .join(
                 enter => enter.append("circle")
                               .attr("fill", "green")   // new elements are green
                               .attr("cy", 50),         // this is a static attribute (best in enter)
                 update => update.attr("fill", "blue"), // existing elements change to blue
                 exit => exit.transition()              // wait 250ms to change the color
                             .attr("fill", "red")     // exiting elements change to red
                             .transition()              // more 250ms to shrink and remove
                                .attr("r", 0)
                                .remove()               // remove it!
              ) // from here, everything applies to merged enter+update
              .transition()
                .attr("cx", (d,i) => i * 100 + 50)  // update position
                .attr("r", d => d);                 // update radius
    }

    // This will allow apply() to be called from the console.
    window.apply = apply;

    // This will allow D3 functions to be called from the console.
    window.d3 = d3;
</script>

</body>
</html>
