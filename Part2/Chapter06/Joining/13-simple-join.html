<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Join example</title>
    <style>
        svg { border: solid gray 1px }
    </style>
</head>
<body>
<h1>Simple join example</h1>
<h3>See code for a concise and typical implementation.</h3>
<p></p>
<svg height="100" width="600"></svg>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    apply("Initial update", [5,10,15,20,25])
    setTimeout(apply, 2000, "Removing update", [19,15,26])
    setTimeout(apply, 4000, "Adding update (Reload to restart)", [12,15,9,3,15,18])

    // This example is the same as the previous one, but the contents
    // of the update() function were moved to the same method chain.
    function apply(label, data) {
        d3.select("svg")
          .selectAll("circle")
            .data(data)
              .join("circle")
                .attr("cy", 50)
                .transition()
                  .attr("cx", (d,i) => i*100+50)
                  .attr("r", d => d);
        d3.select("p").text(label);
    }

    // This will allow apply() to be called from the console.
    window.apply = apply;

    // This will allow D3 functions to be called from the console.
    window.d3 = d3;
</script>

</body>
</html>
