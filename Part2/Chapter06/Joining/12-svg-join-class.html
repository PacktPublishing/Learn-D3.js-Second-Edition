<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Best practices using join</title>
    <style>
        svg { border: solid gray 1px }
    </style>
</head>
<body>

<svg height="100" width="600"></svg>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    import update from "./js/update.js";

    // Step 1: initial enter operation - adds 5 elements
    apply([5,10,15,20,25]);
    // Step 2: exit operation - removes 2 elements
    setTimeout(apply, 2000, [19,15,26]);
    // Step 3: new enter operation - adds +3 new elements
    setTimeout(apply, 4000, [12,15,9,3,15,18]);

    // Use class selectors instead of element selectors - this will avoid
    // inadvertently selecting other circles your SVG.
    function apply(data) {
        d3.select("svg").selectAll(".dot")
          .data(data)
            .join("circle")
               .attr("class", "dot");   // don't forget this
        update();
    }

    // This will allow update() and apply() to be called from the console.
    window.update = update;
    window.apply = apply;

    // This will allow D3 functions to be called from the console.
    window.d3 = d3;
</script>

</body>
</html>
