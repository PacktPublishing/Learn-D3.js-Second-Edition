<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The enter selection - console view</title>
    <style>
        svg { border: solid gray 1px }
    </style>
</head>
<body>
<h1>Use JavaScript console to follow examples</h1>

<svg height="100" width="600"></svg>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import {update} from "./js/update.js";

    // Previous selections
    d3.select("svg").selectAll("circle").data([5,10,15,20,25]).join("circle");
    d3.select("svg").selectAll("circle").data([19,15,26]).join("circle");

    const upd3 = d3.select("svg").selectAll("circle").data([12,15,9,3,15,18])
    console.log('upd3 = d3.select("svg").selectAll("circle").data([12,15,9,3,15,18])', upd3);

    const merged3 = upd3.join("circle");
    console.log('merged3 = upd3.join("circle")', merged3);

    // call update() to see the effect.

    // This will allow update() to be called from the console.
    window.update = update;

    // This will allow D3 functions to be called from the console.
    window.d3 = d3;
</script>

</body>
</html>
