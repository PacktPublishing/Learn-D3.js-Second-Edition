<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The exit selection - console view</title>
    <style>
        svg { border: solid gray 1px }
    </style>
</head>
<body>
<h1>Use JavaScript console to follow examples</h1>

<svg height="100" width="600"></svg>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import {update} from "./js/update.js";

    // Initial selection and join
    const sel = d3.select("svg").selectAll("circle").data([5,10,15,20,25]).join("circle");

    // A new join (with less data): it will remove 2 elements
    const upd2 = sel.data([19,15,26]);
    console.log('upd2 = sel.data([19,15,26])', upd2);

    const merged2 = upd2.join("circle");
    console.log('merged2 = upd2.join("circle")', merged2);

    // call update() to see the effect.

    // This will allow update() to be called from the console.
    window.update = update;

    // This will allow D3 functions to be called from the console.
    window.d3 = d3;
</script>

</body>
</html>
