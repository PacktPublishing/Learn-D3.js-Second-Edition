<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using append and remove</title>
    <style>
        div {
            margin: 2px 25px;
            padding: 5px;
            width: 300px;
            border: solid 1px blue;
        }
        p {
            border: solid 1px red;
            width: 200px;
        }
    </style>
</head>
<body>

<div></div>
<div></div>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    let count = 0;

    // Selecting all <div> elements
    const sel = d3.selectAll("div");

    // Appending six child <p> elements to each <div>
    sel.append("p").text(++count);
    sel.append("p").text(++count);
    sel.append("p").text(++count);
    sel.append("p").text(++count);
    sel.append("p").text(++count);
    sel.append("p").text(++count);

    // Removing every second <p> element from the first <div>
    const removed = d3.select("div")
                      .selectAll(":nth-child(2n)").remove();
    console.log(removed)

    // Reattaching the second removed node to the second <div>
    removed.selectAll("p").text("Removed");
    d3.select("body").append(() => removed.nodes()[1]);

    // Uncomment to allow access to the D3 functions via the console
    window.d3 = d3;
</script>

</body>
</html>
