<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filters</title>
    <style>
        h1 {font-size: 24px}
        div {width: 200px}
        canvas {
            height: 100px;
            border: 1px solid lightgray;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
<h1>See console for results</h1><p id="n1">Before</p>
<div class="abc">
    <p id="n2">A</p>
    <p id="n3">B</p>
    <p id="n4">C</p>
</div>
<div class="xy">
    <p id="n5">X</p>
    <p id="n6">Y</p>
</div>
<p id="n7">After</p>
<canvas></canvas>
<svg>
    <circle id="c1" cx="50" cy="50" r="40" fill="red" />
    <circle id="c2" cx="150" cy="50" r="20" fill="orange" />
</svg>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    // data-based filter
    const f1 = d3.selectAll("p")
                 .data([9,6,5,4,3,2,1])
                    .filter(d => d%3 === 0);
    console.log('f1', f1);

    // data-based filter using select
    const f2 = d3.selectAll("p")
                 .data([9,6,5,4,3,2,1])
                     .select((d,i,n) => d%3 === 0 ? n[i] : null);
    console.log('f1', f2);

    // selector-based filter
    const f3 = d3.selectAll("p")
                 .filter("p:nth-child(2n+1)");
    console.log('f2', f3);

    // selector-based filter directly in selectAll
    const f4 = d3.selectAll("p:nth-child(2n+1)");
    console.log('f3', f4);

    // Uncomment to allow access to the D3 functions via the console
    window.d3 = d3;
</script>

</body>
</html>
