<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Using classed</title>
    <style>
        h1 {font-size: 24px}
        div {width: 200px}
        canvas {
            height: 100px;
            border: 1px solid lightgray;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
<h1>See console for results</h1>
<p id="n1">Will wait 2 seconds and add the "hidden" attribute to some elements.</p>
<div class="abc">
    <p id="n2">A</p>
    <p id="n3">B</p>
    <p id="n4">C</p>
</div>
<div class="xy">
    <p id="n5">X</p>
    <p id="n6">Y</p>
</div>
<p id="n7">After</p>
<canvas></canvas>
<svg>
    <circle id="c1" cx="50" cy="50" r="40" fill="red" />
    <circle id="c2" cx="150" cy="50" r="20" fill="orange" />
</svg>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    setTimeout(() => {
        d3.selectAll("p")
            .data([77,33,18,24,55,63,10])
            .property("hidden", d => d < 50)
    }, 2000);

    // Uncomment to allow access to the D3 functions via the console
    window.d3 = d3;
</script>

</body>
</html>
