<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comparing style and text</title>
    <style>
        h1 {font-size: 24px}
        div {width: 200px}
        canvas {
            height: 100px;
            border: 1px solid lightgray;
            margin-top: 10px;
            display: block;
        }
        circle {
            strokey: blue;
        }
        #c1 {fill: orange}
        #c2 {fill: red}
    </style>
</head>
<body>
<h1>See console for more results</h1>
<p id="n1">Before</p>
<div class="abc">
    <p id="n2">A</p>
    <p id="n3">B</p>
    <p id="n4">C</p>
</div>
<div class="xy">
    <p id="n5">X</p>
    <p id="n6">Y</p>
</div>
<p id="n7">After</p>
<canvas></canvas>
<svg>
    <circle id="c1" cx="50" cy="50" r="40" />
    <circle id="c2" cx="150" cy="50" r="20" />
</svg>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    // Applying styles using CSS or attributes using XML syntax
    // Both methods work, but using CSS syntax is preferred, since CSS has
    // precedence over XML attributes
    d3.select("#c1").attr("stroke", "black").attr("stroke-width", 4)	// XML
    d3.select("#c2").style("stroke", "black").style("stroke-width", 4)	// CSS

    // Applying the same transforms using CSS or attributes using XML syntax to both circles
    // Both methods work, but in this case the XML syntax is preferred, since it is easier
    // to generate the attribute value from data
   // d3.select("#c1").attr("transform", "translate(50,-25) rotate(45)")		    // XML
   // d3.select("#c2").style("transform", "translate(50px,-25px) rotate(45deg)")  // CSS

    // Uncomment to allow access to the D3 functions via the console
    window.d3 = d3;
</script>

</body>
</html>
