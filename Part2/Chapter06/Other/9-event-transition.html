<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events and transitions</title>
    <style>
        h1 {font-size: 24px}
        div {width: 200px}
        canvas {
            height: 100px;
            border: 1px solid lightgray;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
<h1>See console for more results</h1>
<p id="n1">Before</p>
<div class="abc">
    <p id="n2">A</p>
    <p id="n3">B</p>
    <p id="n4">C</p>
</div>
<div class="xy">
    <p id="n5">X</p>
    <p id="n6">Y</p>
</div>
<p id="n7">After</p>
<canvas></canvas>
<svg>
    <circle id="c1" cx="50" cy="50" r="40" fill="red" />
    <circle id="c2" cx="150" cy="50" r="20" fill="orange" />
</svg>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

    // Attach an event listener to all <p> elements within <div> elements.
    // When mouse is over a <p> element, shows the item number and <p> text in <h1>.
    // When the mouse leaves the <p> element, resets the <h1> text.
    const data = [1,2,3,4,5];
    d3.selectAll("div p")
        .data(data)
        .on("mouseover", (event, d) => {
            const text = d3.select(event.target).text(); 	// get text from <p>
            d3.select("h1").text(`Item ${d}: ${text}`);	// set new text for <h1>
        })
        .on("mouseout" , () => d3.select("h1").text("Select an item"));

    // Attach event listeners to all circles to change their radius and color when mouse hovers them.
    // The transition() method animates the change.
    d3.selectAll("circle")
        .on("mouseover", function() {
           d3.select(this)
             .transition()
               .attr("r", 10)
               .style("fill", "black")
        })
        .on("mouseout", function() {
           const c = d3.select(this);
           c.transition()
               .attr("r", c.attr("id") === "c1" ? 40 : 20)
               .style("fill", c.attr("id") === "c1" ? "red" : "orange")
        });


    // Uncomment to allow access to the D3 functions via the console
    window.d3 = d3;
</script>

</body>
</html>
