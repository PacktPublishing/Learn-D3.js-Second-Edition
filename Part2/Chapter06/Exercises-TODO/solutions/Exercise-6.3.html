<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 6.3</title>
</head>
<body>
<script type="module">
    import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';

    const size = 220;
    const svg = d3.select("body")
        .append("svg")
        .attr("width", size)
        .attr("height", size)
        .attr("viewBox", `${-size} -${size} ${size*2} ${size*2}`);

    const coords = [
            [[200,0],[162,118]],
            [[162,118],[62,190]],
            [[62,190],[-62,190]],
            [[-62,190],[-162,118]],
            [[-162,118],[-200,0]],
            [[-200,0],[-162,-118]],
            [[-162,-118],[-62,-190]],
            [[-62,-190],[62,-190]],
            [[62,-190],[162,-118]],
            [[162,-118],[200,0]]
        ];

    svg.selectAll("line")
        .data(coords)
        .join("line")
        .attr("x1", d => d[0][0])
        .attr("y1", d => d[0][1])
        .attr("x2", d => d[1][0])
        .attr("y2", d => d[1][1])
        .attr("stroke", "black")

    // Add a bypass to use D3 functions at the console prompt
    window.d3 = d3;
</script>

</body>
</html>
