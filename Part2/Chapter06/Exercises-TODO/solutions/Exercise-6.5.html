<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 6.5</title>
    <style>
        line { stroke-width: 4; stroke-linecap: round; }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const size = 220;
    const svg = d3.select("body")
        .append("svg")
        .attr("width", size)
        .attr("height", size)
        .attr("viewBox", `${-size} -${size} ${size*2} ${size*2}`);

    const set1 = [
        [[200,0],[62,190]],
        [[62,190],[-162,118]],
        [[-162,118],[-162,-118]],
        [[-162,-118],[62,-190]],
        [[62,-190],[200,0]]
    ];

    const set2 = [
        [[200,0],[162,118]],
        [[162,118],[62,190]],
        [[62,190],[-62,190]],
        [[-62,190],[-162,118]],
        [[-162,118],[-200,0]],
        [[-200,0],[-162,-118]],
        [[-162,-118],[-62,-190]],
        [[-62,-190],[62,-190]],
        [[62,-190],[162,-118]],
        [[162,-118],[200,0]]
    ];

    svg.selectAll("line")
        .data(set1)
        .join("line")
        .attr("x1", d => d[0][0])
        .attr("y1", d => d[0][1])
        .attr("x2", d => d[1][0])
        .attr("y2", d => d[1][1])
        .attr("stroke", "black")

    svg.selectAll("line")
        .data(set2)
        .join(
            enter => enter.append("line").attr("stroke", "red")
        )
        .transition(2000).delay((d,i) => i*200)
        .attr("x1", d => d[0][0])
        .attr("y1", d => d[0][1])
        .attr("x2", d => d[1][0])
        .attr("y2", d => d[1][1])

    // Add a bypass to use D3 functions at the console prompt
    window.d3 = d3;
</script>

</body>
</html>
