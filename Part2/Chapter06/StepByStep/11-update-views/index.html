<!DOCTYPE html>
<html lang="en">
<head>
    <title>Moons: Step 11 - Update views</title>
    <link rel="stylesheet" href="css/main-1.1.css">
</head>
<body>

<h1>The <span id="titleNumber">largest moons</span> of <span id="planetName"></span></h1>
<div id="container" width="500" height="300">
    <svg height="100%" width="100%" id="moons"></svg>
</div>
<form></form>

<script type="module">
    // Step 11 - Updating views - refer to code in view-1.4.js (drawPlanet), config-1.5.js
    import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";
    import { dim } from "./js/common-1.0.js";
    import { load } from "./js/data-1.2.js";
    import { init } from "./js/page-1.0.js";

    // GRAPHICS CONTEXT
    const svg = d3.select("#moons")
                  .attr("viewBox", `0 0 ${dim.width} ${dim.height}`);
    const plane = svg.append("g")
                     .attr("transform", `translate(${[dim.margin.planet, dim.height/2]})`);

    // Add circle for the planet on the orbital plane - changed in this step
    plane.append("circle")
         .attr("class", "planet");

    load().then(() => {
        init(plane);
    });

</script>


</body>
</html>
