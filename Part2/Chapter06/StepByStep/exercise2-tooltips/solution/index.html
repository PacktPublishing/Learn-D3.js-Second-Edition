<!DOCTYPE html>
<html lang="en">
<head>
    <title>Comparing the largest natural satellites of the Solar System</title>
    <link rel="stylesheet" href="css/main-1.2.css">
    <!-- EXERCISE 2: (1) Link tooltips.css style sheet for the tooltips or import it from main.css -->
    <link rel="stylesheet" href="css/tooltips-1.0.css">
</head>
<body>

<h1>The <span id="titleNumber"></span> of <span id="planetName"></span></h1>
<div id="container" width="500" height="300">
    <svg height="100%" width="100%" id="moons"></svg>
</div>
<form></form>

<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    import { dim } from "./js/common-1.1.js";
    import { load } from "./js/data-1.2.js";
    import { init } from "./js/page-1.1.js";

    // FOR EXERCISE 2: make changes in the following files:
    // a. this file (index.html) - import tooltips.css using <link> (1) and add tooltip box (2)
    // b. in css/tooltips.css (declare styles)
    // c. in js/tooltips.js (implement and export functions)
    // d. in js/view.js (import tooltips.js and call functions)
    // e. in css/main.css - import stylesheet using @import (optional, if imported using <link> in HTML)

    const svg = d3.select("#moons")
                  .attr("viewBox", `0 0 ${dim.width} ${dim.height}`);
    const plane = svg.append("g")
                     .attr("transform", `translate(${[dim.margin.planet, dim.height/2]})`);
    plane.append("circle")
         .attr("class", "planet");

    // EXERCISE 2:
    // (2) Add a tooltip box here
    // - Append a <g> element to the plane and assign it the class "tooltip".
    // - Append a <rect> element to the tooltip.
    // - Append a <text> element to the tooltip.
    const tooltip = plane.append("g")
                         .attr("class", "tooltip");
    tooltip.append("rect");
    tooltip.append("text");

    await load();
    init(plane);

</script>


</body>
</html>
