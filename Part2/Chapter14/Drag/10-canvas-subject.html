<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Example: dragging with Canvas</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<h3>Dragging with Canvas</h3>
<p>Drag the squares around the canvas.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const dim = {w: 300, h: 300};
    const canvas = d3.select("body").append("canvas").attr("width", dim.w).attr("height", dim.h);
    const ctx = canvas.node().getContext("2d");

    const data = [{x: 30, y: 40, w: 200, h: 50, color: 'red'},
                  {x: 70, y: 30, w: 75, h: 175, color: 'green'},
                  {x: 100, y: 120, w: 100, h: 50, color: 'blue'}];

    const drag = d3.drag()
                   .subject(getSubject)
                   .on("start", () => canvas.style("cursor", "move"))
                   .on("drag", function(evt) {
                        evt.subject.x = evt.dx + evt.subject.x;
                        evt.subject.y = evt.dy + evt.subject.y;
                        reorder(evt.subject);
                        render();
                   })
                   .on("end", () => canvas.style("cursor", null));

    // Reorder the data array to bring the dragged object to the front
    function reorder(object) {
        const i = data.findIndex(d => d === object);
        data.push(data.splice(i,1)[0]);    // extract object and append at the end of array
    }

    // Get the subject of the drag event (the square, if the user clicks on it).
    function getSubject(evt) {
        const i = data.findLastIndex(d => { // search backwards, to get shape that is on top first
            const polygon = [[d.x, d.y],[d.x + d.w, d.y],[d.x + d.w, d.y + d.h],[d.x, d.y + d.h]];
            return d3.polygonContains(polygon, d3.pointer(evt));
        });
        console.log(data[i])
        return i >= 0 ? data[i] : null;  // returns a {color, x, y, w, h} object
    }

    // Whenever the squares move, redraw the canvas.
    function render() {
        ctx.clearRect(0, 0, dim.w, dim.h);
        data.forEach(d => {
            ctx.fillStyle = d.color;
            ctx.fillRect(d.x, d.y, d.w, d.h);
        });
    }

    // Bind the drag behavior for interaction.
    canvas.call(drag);

    // Render the initial canvas.
    render();

</script>
</body>
</html>
