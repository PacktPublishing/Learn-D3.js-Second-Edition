<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drag and drop using relative position</title>
    <style>
        circle {fill: red}
        rect {fill: blue}
        svg {border: 1px solid black}
    </style>
</head>
<body>
<h3>Drag and drop using relative position</h3>
<p>You can only drag the circle.</p>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const dim = {w: 500, h: 250};
    const svg = d3.select("body")
                  .append("svg")
                  .attr("width", dim.w)
                  .attr("height", dim.h);

    // Drags at clicked point (uses difference from original point)
    const drag = d3.drag()
        .on('start', () => d3.select("svg").style("cursor", "grabbing"))
        .on('drag', function(e) {
            const obj = d3.select(this);
            const [x0, x1] = [+obj.attr("cx"), +obj.attr("cy")]; // must convert to number!
            const [x,y] = [x0 + e.dx, x1 + e.dy];
            obj.attr("cx", x).attr("cy", y);
        })
        .on('end', () => d3.select("svg").style("cursor", null));

    svg.append("rect")
        .attr("width", 100)
        .attr("height", 100)
        .call(drag);

    svg.append("circle")
       .attr("r", 50)
       .call(drag);

</script>

</body>
</html>
