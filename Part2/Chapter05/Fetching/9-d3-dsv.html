<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV fetching and parsing</title>
</head>
<body>

<h1>Open JavaScript console to see results</h1>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";

    const cities = "../data/cities15000.csv";

    d3.dsv(";", cities)
        .then(function(data) {
            console.log(data);
        });

    // You may prefer to use await (when in a module or async function)
    // See 10-d3-dsv-async.html
</script>
</body>
</html>
