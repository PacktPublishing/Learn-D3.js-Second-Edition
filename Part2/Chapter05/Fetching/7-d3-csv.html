<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fetching and reading a text file</title>
</head>
<body>
<h1>Fetching and reading a text file using <code>d3.text()</code></h1>
<p>View source and open JavaScript console to see the results.</p>
<script type="module">
  import * as d3 from "https://cdn.skypack.dev/d3@7.9.0";

  const medals = "../data/Paris2024-Top10.csv";

  d3.csv(medals)
      .then(data => console.log(data)); // Inspect the data array in the console!

  // You may prefer to use await (when in a module or async function)
  // See 8-d3-csv-async.html

</script>
</body>
</html>
