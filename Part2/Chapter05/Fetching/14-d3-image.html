<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image fetching</title>
    <style>
        img, svg, canvas {
            border: 1px solid black;
            display: inline-block;
            margin: 5px;
        }
    </style>
</head>
<body>
<h3>Loading and using an image</h3>
<p>Open JavaScript console to see results</p>
<div>
    <h4>HTML</h4>
    <div id="html-div"></div>
</div>
<div>
    <h4>SVG</h4>
    <div id="svg-div"></div>
</div>
<div>
    <h4>Canvas</h4>
    <div id="canvas-div"></div>
</div>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    // Load an image and creates a new HTMLImageElement
    const data = await d3.image("../data/images/Moon.png");

    // This is an HTMLImageElement
    console.log("What object is this? It's " + data.constructor.name);

    // Get and update some properties
    console.log("URL: " + new URL(data.src).pathname);
    data.width = data.width/4
    data.height = data.height/4
    console.log("Width: " + data.width + " pixels (resized)");
    console.log("Height: " + data.height + " pixels (resized)");

    // Use the image
    showTheImageInHTML(data);
    showTheImageInSVG(data);
    showTheImageInCanvas(data);

    // Appends a HTML <img> element.
    function showTheImageInHTML(img) {
        document.querySelector("#html-div").appendChild(img);
    }

    // Uses the URL (src) to generate and append an SVG <image> element
    function showTheImageInSVG(image) {
        const svg = d3.select("#svg-div").append("svg")
                      .attr("width", image.width)
                      .attr("height", image.height);

        svg.append("image")
            .attr("href", image.src)
            .attr("width", image.width)
            .attr("height", image.height);
    }

    // Renders the image in a <canvas> element
    function showTheImageInCanvas(image) {
        const canvas = document.createElement("canvas");
        document.querySelector("#canvas-div").appendChild(canvas);
        canvas.width = image.width;
        canvas.height = image.height;
        const context = canvas.getContext("2d");
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        document.body.appendChild(canvas);
    }


</script>
</body>
</html>
