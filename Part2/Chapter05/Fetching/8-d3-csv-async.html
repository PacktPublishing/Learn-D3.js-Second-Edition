<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fetching and reading a text file</title>
</head>
<body>
<h1>Fetching and reading a text file using <code>d3.text()</code></h1>
<p>View source and open JavaScript console to see the results.</p>
<script type="module">
  import * as d3 from "https://cdn.skypack.dev/d3@7";

  const medals = "../data/Paris2024-Top10.csv";

  const data = await d3.csv(medals);
  console.log(data);
  console.log("Headers: " + data.columns);

  // You can also use the then() method to obtain the response in a callback function
  // See 8-d3-csv.html

</script>
</body>
</html>
