<!DOCTYPE html>
<html lang="en">
<head>
    <title>Multifetch - text files</title>
</head>
<body>

<h1>Fetching multiple text files - using the data</h1>
<p>View source and open JavaScript console to see the results.</p>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const shapesFile = '../data/world-lowres.geojson';
    const pointsFile  = '../data/cities15000.csv';

    const shapesPromise = d3.json(shapesFile);
    const pointsPromise = d3.dsv(';', pointsFile,
        row => ({
            name: row.asciiname,
            coords: [+row.longitude, +row.latitude],
            pop: +row.population
        })
    );

    const [shapes, points] = await Promise.all([shapesPromise, pointsPromise]);
    console.log("Shapes", shapes);
    console.log("Points", points);

    // Now we can use the data...

    // Draw the map
    const width = 960, height = 500;
    const svg = d3.select("body").append("svg")
        .attr("width", width)
        .attr("height", height);
    const projection = d3.geoMercator();
    const path = d3.geoPath().projection(projection);
    svg.append("g")
        .selectAll("path")
        .data(shapes.features)
        .join("path")
        .attr("d", path)
        .attr("fill", "#dfefee")
        .attr("stroke", "#ccc");

    // Draw the points
    svg.append("g")
        .selectAll("circle")
        .data(points)
        .join("circle")
        .attr("cx", d => projection(d.coords)[0])
        .attr("cy", d => projection(d.coords)[1])
        .attr("r", d => Math.sqrt(d.pop) / 1000) // radius based on population
        .attr("fill", "red")
        .attr("opacity", 0.6)
        .append("title") // tooltip
        .text(d => `${d.name}: ${d.pop.toLocaleString()} people`);

</script>


</body>
</html>
