<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="https://d3js.org/d3-geo-projection.v2.min.js"></script>
    <style>
        text {
            font-family: "Yanone Kaffeesatz", sans-serif;
        }
        text.parallels, text.meridians {
            font-size: 12px;
            fill-opacity: .4
        }
        .highlight, .highlight path {
            fill: lightgreen;
            fill-opacity: 1;
        }
        .country {
            stroke-width: .1;
            stroke: white;
        }
        svg {
            border: solid 1px
        }
        .sep {
            stroke-width: 1;
            stroke: black;
        }
    </style>
</head>
<body>
<script>
    const width = 540;
    const height = 9700;

    const marginX = 20;
    const marginY = 0;

    const svg = d3.select("body").append("svg")
            .attr("width", width).attr("height", height);

    const projection = d3.geoChamberlinAfrica().scale(1200).translate([200,225]).center([13,3]);
    const geoPath = d3.geoPath().projection(projection);

    const data = {}

    //d3.json('Data/world.geojson')
    d3.json('Data/ne_10m_admin_0_countries.json')
    .then(countries => {

        const islands = ['MDG', 'CPV', 'STP', 'COM', 'MUS', 'SYC']; // islands

        data.features = countries.features
                    .filter(d => d.properties.CONTINENT == "Africa")
                    .filter(d => !islands.some(island => d.properties.SOV_A3 == island)); // exclude islands

        // exclude eq. guinea small islands
        console.log(data.features.filter(d => d.properties.SOV_A3 == "GNQ")[0].geometry.coordinates.splice(1,2))

        // exclude south africa small islands
        console.log(data.features.filter(d => d.properties.SOV_A3 == "ZAF")[0].geometry.coordinates.splice(1,2))



        data.features.sort( (a,b) => d3.ascending(d3.geoArea(a), d3.geoArea(b)));
        data.features.forEach(function(d, i, nodes) {
            d.x = marginX - geoPath.bounds(d)[0][0];
            d.h = geoPath.bounds(d)[1][1] - geoPath.bounds(d)[0][1];
            d.w = geoPath.bounds(d)[1][0] - geoPath.bounds(d)[0][0];
        });

        let sum = 0;

        data.features.forEach(function(d, i, nodes) {
            let prevH = 0;
            if (i > 0) prevH = nodes[i-1].h
            sum = sum + prevH;
            d.y = marginY + sum;
        });

        drawCountries();

    });

    // order by area
    // save list of bounds, x, y, height, width, name, area

    function drawCountries() {
        svg.selectAll("text.num")
                .data(data.features)
                .enter()
                .append("text").attr("class","num")
                .attr("x", d => 5)
                .attr("transform", (d,i) => `translate(${[0, 20 + 20 * i + d.y]})`)
                .attr("text-anchor","start")
                .text((d,i) => i+1);

        svg.selectAll("g.country")
                .data(data.features)
                .enter()
                .append("g")
                .attr("class","country")
                .style("fill-opacity", .4)
                .append("path")
                    .attr('d', geoPath)
                .attr("transform", (d,i) => `translate(${[d.x, 10 + 20 * i + d.y - geoPath.bounds(d)[0][1]]})`)

        svg.selectAll("line.sep")
                .data(data.features)
                .enter()
                .append("line").attr("class","sep")
                .attr("x1", 0).attr("y1", 0).attr("y2", 0)
                .attr("x2", 540)
                .attr("transform", (d,i) => `translate(${[0, 20 * i + d.y]})`)

        svg.selectAll("text.name")
                .data(data.features)
                .enter()
                .append("text").attr("class","name")
                .attr("x", d => 520)
                .attr("transform", (d,i) => `translate(${[0, 20 + 20 * i + d.y]})`)
                .attr("text-anchor","end")
                .text(d => d.properties.NAME);
    }
</script>

</body>
</html>
