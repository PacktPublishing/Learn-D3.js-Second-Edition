<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A bar chart with atomic symbols</title>
    <style>
        path {pointer-events: none}
    </style>
</head>
<body>
<h1>Bar chart with whole symbols (discrete)</h1>
<div id="symbol-bar"></div>
<script type="module">
    import * as d3 from "https://cdn.skypack.dev/d3@7";
    // Display a list of 10 symbols, side by side
    // This example uses circles

    const dim = {width: 500};

    // Sample values
    const values = [25, 42.5, 90, 33, 10];  // sample values
    const data = values.map((d,i) => ({id: i, value: d})); // so that bars can be identified

    const cells = d3.range(10);     // number of symbols in each bar
    const scale = d3.scaleLinear()
                    .domain([0, d3.max(values)])
                    .range([0, dim.width - 100])
                    .clamp(true);
    const colors = d3.schemeCategory10;

    const unit = d3.max(values) / cells.length;

    const svg = d3.select("#symbol-bar")
                  .append("svg")
                  .attr("width", dim.width)
                  .attr("height", data.length * 60);

    // Drag function to resize the filled bars
    const drag = d3.drag()
        .on("start", function() {
            svg.style("cursor", "ew-resize");
        })
        .on("drag", function(e,d) {
            d.value = scale.invert(e.x);    // data values are saved without rounding
            d3.selectAll("rect")
              .data(data)
                .attr("width", d => scale(unit * Math.round(d.value/d3.max(values) * 10)));
        })
        .on("end", function() {
            svg.style("cursor", "auto");
        });

    // Rectangle that will clip the circles
    svg.selectAll("rect")
        .data(data)
            .join("rect")
                .attr("id", (d,i) => `data-bar-${i}`)  // id for clipPath
                .attr("y", 30).attr("height", 40)
                .attr("width", d => scale(unit * Math.round(d.value/d3.max(values) * 10)))
                .style("fill", "white").style("opacity", 0.01)
                .attr("transform", (d,i) => `translate(0, ${i * 50})`)
                .call(drag);

    // Create the bars
    data.forEach((d,i) => {
        createBar(i*50, `url(#clip-${i})`, colors[i], d3.color(colors[i]).copy({opacity: 0.1}));
    })

    // Create clipping paths linked to the bars
    const defs = svg.append("defs");
    data.forEach((d,i) => {
        defs.append("clipPath")
            .attr("id", `clip-${i}`)
            .append("use").attr("transform", `translate(0, ${i * -50})`)
            .attr("xlink:href", `#data-bar-${i}`);
    });

    // Create a bar with symbols
    function createBar(y, clip, fill, stroke) {
        const bar = svg.append("g")
                       .attr("transform", `translate(0, ${y})`);
        const symbols = bar.append("g")
                           .attr("clip-path", clip);
        addSymbols(symbols, cells, fill, "none");
        //addSymbols(bar.append("g"), cells, "none", stroke); // add guides
    }

    // Add the bar symbols (circles)
    function addSymbols(container, data, fill, stroke) {
        container.selectAll("path")
                 .data(data)
                    .join("path")
                        .attr("d", d3.symbol().size(1250))
                        .attr("transform", (d, i) => `translate(${i * 40 + 20}, 50)`)
                        .style("fill", fill)
                        .style("stroke", stroke);
    }

</script>


</body>
</html>
