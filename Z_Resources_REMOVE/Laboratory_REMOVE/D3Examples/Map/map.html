<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../d3/d3.min.js"></script>
    <script src="../d3/queue.js"></script>
    <script src="../d3/colorbrewer.js"></script>
    <style>
        svg {
            height: 500px;
            width: 800px;
            border: 1px solid gray;
        }

        .countries {
            fill: red;
            fill-opacity: .5;
            stroke: black;
            stroke-width: 1px;
        }
    </style>
</head>
<body>

<div id="viz">
    <svg>
    </svg>
</div>

<script>

    queue()
            .defer(d3.json, "world.geojson")
            //.defer(d3.csv, "cities.csv")
            .defer(d3.tsv, "cities5000.tsv")
            .await(function(error, file1, file2) { createMap(file1, file2); });

    function createMap(countries, allCities) {

        // Only big cities
        var visibleCities = allCities.filter(function(d) {
            return parseFloat(d.population) > 1000000;
        });
    //visibleCities = allCities;

        expData = countries;
        width = 800;
        height = 500;
        projection = d3.geo.mercator()
                .scale(130)
                .translate([width / 2, height / 2]);
        geoPath = d3.geo.path().projection(projection);

        var mapZoom = d3.behavior.zoom()
                .translate(projection.translate())
                .scale(projection.scale()).on("zoom", zoomed);
        d3.select("svg").call(mapZoom);

        function zoomed() {
            var currentRotate = projection.rotate()[0];

            projection.scale(mapZoom.scale());
            console.log(mapZoom.scale());

            if(mapZoom.scale() > 1000) {
                visibleCities = allCities;
                cities.exit().remove();
                cities.data(allCities)
                        .enter()
                        .append("circle").attr("class", "cities")
            } else {
                if(visibleCities === allCities) {
                    visibleCities = allCities.filter(function(d) {
                        return parseFloat(d.population) > 1000000;
                    });
                    cities.exit().remove();
                    cities.data(allCities)
                            .enter()
                            .append("circle").attr("class", "cities")
                }

            }

            d3.selectAll("path.graticule").attr("d", geoPath);
            d3.selectAll("path.countries").attr("d", geoPath);

            cities
                    .attr("cx", function(d) {
                        return projection([d.longitude,d.latitude])[0]
                    })
                    .attr("cy", function(d) {
                        return projection([d.longitude,d.latitude])[1]
                    })
                    .style("display",
                            function(d) {
                                return parseInt(d.longitude)
                                + currentRotate < 90 && parseInt(d.longitude)
                                + currentRotate > -90 ? "block" : "none"
                            })
        }

        featureSize = d3.extent(countries.features, function(d) {
            return geoPath.area(d)
        });
        countryColor = d3.scale.quantize()
                .domain(featureSize)
                .range(colorbrewer.Reds[7]);

        var graticule = d3.geo.graticule();

        d3.select("svg").append("path")
                .datum(graticule)
                .attr("class", "graticule line")
                .attr("d", geoPath)
                .style("fill", "none")
                .style("stroke", "lightgray")
                .style("stroke-width", "1px");

        d3.select("svg").selectAll("path.countries").data(countries.features)
                .enter()
                .append("path")
                .attr("d", geoPath)
                .attr("class", "countries")
                .style("fill", function(d) {
                    return countryColor(geoPath.area(d))
                })
                .style("stroke-width", 1)
                .style("stroke", "black")
                .style("opacity", .5)

        var cities = d3.select("svg").selectAll("circle").data(visibleCities)
        cities.enter()
                .append("circle")
                .attr("class", "cities")
                .style("fill", "blue")
                .style("stroke-width", 1)
                .attr("r", 1)
                .attr("cx", function(d) {
                    return projection([d.longitude,d.latitude])[0]
                })
                .attr("cy", function(d) {
                    return projection([d.longitude,d.latitude])[1]
                })

    }

</script>

</body>
</html>
