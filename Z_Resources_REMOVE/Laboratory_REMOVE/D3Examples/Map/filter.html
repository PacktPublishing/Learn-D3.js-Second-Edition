<script>
    d3.tsv("cities1000.tsv",function(error,data) {

        data.sort(function(a,b) {
            return d3.descending(+a.population,+b.population);
        });
        data = data.filter(function(d) {
              return +d.latitude && +d.longitude && +d.population > 0;
        });

        var c1000 = d3.nest()
                .key(function(d) {return d.geonameid;})
                .rollup(function(d) {
                    return {name: d[0].name, latitude: d[0].latitude, longitude: d[0].longitude, population: d[0].population};
                })
                .map(data);

        d3.tsv("cities15000.tsv",function(error,data2) {

            data2.sort(function (a, b) {
                return d3.descending(+a.population, +b.population);
            });

            data2 = data2.filter(function (d) {
                return +d.latitude && +d.longitude && +d.population > 0;
            });

            var c15000 = d3.nest()
                    .key(function(d) {return d.geonameid;})
                    .rollup(function(d) {
                        return {name: d[0].name, latitude: d[0].latitude, longitude: d[0].longitude, population: d[0].population};
                    })
                    .map(data2);

            for (var key in c15000) {
                if(!(key in c1000)) {
                    c1000[key] = c15000[key];
                }
            }



            console.log(c1000)

            var cities = d3.entries(c1000).map(function(d) { return d;});




        });

    });

</script>
  </footer>
