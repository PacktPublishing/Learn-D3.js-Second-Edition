<html>
<head>
  <title>List example</title>
  <meta charset="utf-8" />
<script src="../d3/d3.min.js" type="text/JavaScript"></script>
</head>
<style>
</style>
<body>

<div>
</div>
</body>
  <footer>
    
<script>
    d3.tsv("cities15000.tsv",function(error,data) {dataViz(data)});
    function dataViz(incomingData) {

        incomingData.sort(function(a,b) {
            return d3.descending(+a.population,+b.population);
        })
        console.log(incomingData)

        d3.select("body").selectAll("div.cities")
                .data(incomingData)
                .enter()
                .append("div")
                .attr("class","cities")
                .html(function(d,i) {return d.name + ": " + d.population})
    }

</script>
  </footer>

</html>
