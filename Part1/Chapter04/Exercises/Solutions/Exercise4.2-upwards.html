<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 4.2</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .value, .category {
            text-anchor: middle;
        }
    </style>
</head>
<body>
<h1>Area in millions of km<sup>2</sup> per continent</h1>
<script type="module">
  import * as d3 from 'https://cdn.skypack.dev/d3@7.9.0';
  /*
  4.2.	Make this a vertical bar chart instead of a horizontal one.
  Hint: you need to swap the x and y axes, and also the width and height
  attributes of the rectangles.
  You also need to adjust the position of the text labels.
  */
  const data = [
      {continent: "North America", population: 579024000, areakm2: 24490000},
      {continent: "Asia", population: 4436224000,  areakm2: 3820000},
      {continent: "Europe", population: 738849000, areakm2: 10180000},
      {continent: "Africa", population: 1216130000, areakm2: 30370000},
      {continent: "South America", population: 422535000, areakm2: 17840000},
      {continent: "Oceania", population: 39901000, areakm2: 9008500},
      {continent: "Antarctica", population: 1106, areakm2: 13720000}
  ];

  const dim = {
        width: 800,
        height: 500,
        margin: {left: 10, right: 10, top: 50, bottom: 50}
  };

  const svg = d3.select('body')
                .append('svg')
                .attr('width', dim.width)
                .attr('height', dim.height);

  // The scales have been swapped compared to the horizontal version and the band width is now the bar width
  const yScale = d3.scaleLinear()
                   .domain([0, d3.max(data, d => d.areakm2)])
                   .range([0, dim.height - (dim.margin.bottom + dim.margin.top)]);
  const xScale = d3.scaleBand()
                   .domain(data)
                   .range([dim.margin.left, dim.width - dim.margin.right])
                   .padding(0.1);
  const barWidth = xScale.bandwidth();
  const fmt = d3.format(",.3f");
  const color = d3.scaleOrdinal(d3.schemeCategory10);

  data.sort((a, b) => d3.descending(a.areakm2, b.areakm2));

  const entries = svg.selectAll('g.entry')
                     .data(data)
                       .join('g')
                         .attr("class", "entry")
                         .attr('transform', d => `translate(${xScale(d)}, 0)`);

  // To move the bars upwards, we need to adjust the y position of the rectangles
  // and also calculate the height from the top of the bar to the bottom of the chart
  entries.append("rect")
         .attr('y', d => - yScale(d.areakm2) + dim.height - dim.margin.bottom)
         .attr('height', d => yScale(d.areakm2))
         .attr('width', barWidth)
         .attr('fill', (_,i) => color(i));

  // Adjust the position of the category labels to be below the bars
  entries.append("text")
         .attr("x", barWidth/2)
         .attr('y', dim.height - dim.margin.bottom + 10)
         .attr('class', "category")
         .text(d => d.continent);

  // Adjust the position of the value labels to be above the bars
  entries.append("text")
         .attr("x", barWidth/2)
         .attr('class', "value")
         .attr('y', d => - yScale(d.areakm2) + dim.height - dim.margin.bottom - 10)
         .text(d => fmt(d.areakm2/1000000));

</script>

</body>
</html>
