<!DOCTYPE html>
<html lang="en">
<head>
    <title>Step 6: Scaling to accomodate more data</title>
    <style>
        #bar-chart {
            border: solid 1px gray;
        }
        .bar {
            fill: orange;
        }
        .category {
            text-anchor: end;
        }
        text {
            font-size: 10pt;
            alignment-baseline: central;
        }
    </style>
</head>
<body>
<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const dim = {width: 600, height: 300};
    const dataset = [225, 425, 125, 50, 450, 75, 325];

    const xscale = d3.scaleLinear()
                     .range([0, dim.width-100])
                     .domain([0, d3.max(dataset)]);

    const yscale = d3.scaleBand()
                     .range([0, dim.height])   // The range is the height of the chart
                     .domain(dataset)          // Domain contains all the data values
                     .padding(0.1)             // 10% padding between the bars

    const barHeight = yscale.bandwidth(); // The bandwidth method determines the space available for each bar
    console.log('barHeight', barHeight)

    // Using yscale()
    console.log('yscale(255)', yscale(dataset[0]));
    console.log('yscale(425)', yscale(dataset[1]));
    console.log('yscale(325)', yscale(dataset[6]));

    const body = d3.select("body");

    body.append("h1")
        .text("Bar chart");

    const svg = body.append("svg")
                    .attr("id", "bar-chart")
                    .attr("width", dim.width)
                    .attr("height", dim.height);

    const entries = svg.selectAll(".entry")
                       .data(dataset)
                          .join("g")
                             .attr("class", "entry")
                             .attr("transform", d => `translate(50, ${yscale(d)})`);

    entries.append("rect")
            .attr("class", "bar")
            .attr("height", barHeight)
            .attr("width", d => xscale(d));

    entries.append("text")
            .attr("class", "category")
            .attr("x", -5)
            .attr("y", barHeight/2)
            .text((d,i) => `Item ${1 + i}`);

    entries.append("text")
            .attr("class", "value")
            .attr("x", d => xscale(d) + 5)
            .attr("y", barHeight/2)
            .text(d => d);

    // DEBUGGING
    // Uncomment the following lines to be able to call d3 tools and scale functions from the console
    window.d3 = d3;
    window.xscale = xscale;
    window.yscale = yscale;
</script>

</body>
</html>
