<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 4.5</title>
    <style>
        svg {
            background-color: #cceaff;
        }
        polygon {
            stroke: white;
            stroke-width: .2px;
        }
    </style>
</head>
<body>
<!-- Exercise: 1) remove the viewBox and transform attributes -->
<svg id="world-map"
     width="800" height="400"></svg>

<script type="module">
    import * as d3 from 'https://cdn.skypack.dev/d3@7';

    const url = "../../data/world-lowres.geojson";
    const rand = d3.randomUniform(256);

    // 2) Create two scale functions. One for longitude (domain -180 to 180)
    // and one for latitude (domain -90 to 90) that will map the coordinates
    // to the svg dimensions. The vertical range is (height to 0) because in
    // SVG the y values increase from top to bottom. The horizontal range is
    // (0 to width).
    const lonScale = d3.scaleLinear().domain([-180,180]).range([0,800]);
    const latScale = d3.scaleLinear().domain([-90,90]).range([400,0]);   // inverted directions

    d3.json(url)
      .then(function(data) {
          console.log(data.features)
          drawMap(data.features);
      });

    // 3) Create a function that will scale the data points (it needs to check if
    // the GeoJSON geometry type is a MultiPolygon and flatten the array if it is).
    // This function will be called from the data() method when creating the polygons,
    // in place of s.geometry.coordinates. It should take receive a data.feature object (shape)
    // and return an array of scaled [[lon, lat], ...] points.
    function getPoints(d) {
        const points = d.geometry.type === 'MultiPolygon'
            ? d.geometry.coordinates.flat()
            : d.geometry.coordinates;

        return points.map(pts =>
            pts.map( ([a,b]) => [lonScale(a), latScale(b)] )
        )
    }

    function drawMap(countries) {
        const shapes = d3.select("#world-map")
                         .selectAll(".country")
                             .data(countries) // many countries
                                .join("g")
                                .attr("class", "country");

        shapes.selectAll("polygon")
              .data(s => getPoints(s)) // 4) Call the function here (s is a single feature)
                  .join("polygon")
                      .attr("points", d => d)
                      .style("fill", () => `rgb(${rand()},${rand()},${rand()})`);
    }
</script>

</body>
</html>
