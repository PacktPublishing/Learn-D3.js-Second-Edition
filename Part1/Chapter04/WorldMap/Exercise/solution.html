<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>World map with SVG polygons - alternative scaling</title>
    <style>
        svg {
            background-color: #cceaff;
        }
        polygon {
            stroke: black;
            stroke-width: .2px;
        }
    </style>
</head>
<body>
<!-- The viewBox and transform attributes are removed,
     and the lat/lon scaling is applied to the coordinates in the GeoJSON data -->
<svg id="world-map" width="800" height="400"></svg>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const url = "../../data/world-lowres.geojson";
    const rand = d3.randomUniform(256);

    const data = await d3.json(url);

    // Setting up linear scales for latitude and longitude to map them to SVG coordinates
    const lat = d3.scaleLinear().domain([-90, 90]).range([400, 0]);
    const lon = d3.scaleLinear().domain([-180, 180]).range([0, 800]);

    // Need to apply the lat/lon scaling to the coordinates in the GeoJSON data
    // Depending on the geometry type, we need to handle Polygon and MultiPolygon differently
    data.features.forEach(feature => {
        if (feature.geometry.type === "Polygon") {
            feature.geometry.coordinates =
                feature.geometry.coordinates.map(pg => pg.map(pt => [lon(pt[0]), lat(pt[1])]));
        } else if (feature.geometry.type === "MultiPolygon") {
            feature.geometry.coordinates =
                feature.geometry.coordinates.map(mpg => mpg.map(pg => pg.map(pt => [lon(pt[0]), lat(pt[1])])));
        }
    });

    // Now that the coordinates are scaled, we can draw the map as before

    drawMap(data.features);

    function drawMap(countries) {
        const shapes = d3.select("#world-map")
                         .selectAll(".country")
                             .data(countries) // many countries
                                .join("g")
                                .attr("class", "country");

        shapes.selectAll("polygon")
              .data(s => s.geometry.coordinates) // many points
                  .join("polygon")
                      .attr("points", d => d)
                      .style("fill", () => `rgb(${rand()},${rand()},${rand()})`);
    }
</script>

</body>
</html>
